# prescriptor_rules.yaml — FUENTE AUTORADA de reglas del Prescriptor (P3+)
#
# Esta es la ÚNICA fuente de la lógica de validación cross-param que el motor JS
# no podía expresar declarativamente antes de P3. El compilador
# (tools/rule_compiler.py::compile_rules) la consume y produce:
#   - compiled/compiled_rules.yaml  (artefacto normalizado, derivado, NO editar)
#   - la inyección JS en prescriptor.html (closures applies/test/msg/sugg)
#
# CONTRATO (docs/P3_0_CONTRACT.md):
#   - El FLAG es autoridad de su ficha: severity / level / applies_at /
#     detail_schema / message_template / suggestion_template se COPIAN de
#     flag_catalog.yaml al compilar (no se repiten aquí).
#   - Aquí se autora SOLO la lógica de la regla: id, tier, scope, when,
#     emits, fidelity (+ bindings opcionales para placeholders computados).
#   - `emits` es obligatorio (E1 imposible por construcción).
#   - El compilador valida emits contra flag_catalog (E2) y applies_at ∈
#     {block, session} (E3) en compile-time.
#
# Gramática de `when` (T1–T3, §3 del contrato). En P3.1.1 el traductor cubre el
# subconjunto que la regla piloto necesita; crece con .3 (18 reglas T1).
#
# tier: gobierna qué puede invocar `when`. Es el HOGAR DURABLE del roster de
# tiers (cierra la MARCA de la lista no persistida de sesión 4).

version: "1.0"

# ---- P3.4 — TABLA DE AFINIDAD intent↔método (config del motor) ----
# Vocabulario intrínseco de cada método/variante. Migrada VERBATIM desde las
# tablas hardcoded INTENT_AFFINITY/COMPLEX_AFFINITY del template (P3.4). El build
# la embebe como DATA.intent_affinity; el helper __H.intent_off_method la lee.
# Métodos sin entrada (p.ej. straight) son universales. 'complex' resuelve por
# variant bajo la sub-tabla 'complex'. Esta es ahora su ÚNICA fuente de verdad.
intent_affinity:
  cluster:    [max_strength, strength, power]
  drop:       [hypertrophy, strength_endurance]
  rest_pause: [hypertrophy, strength_endurance]
  amrap:      [strength, hypertrophy, strength_endurance, conditioning]
  pyramid:    [max_strength, strength, hypertrophy]
  emom:       [conditioning, strength_endurance, power, technique]
  contrast:   [potentiation, power, max_strength, strength]
  complex:
    olympic_complex:         [power, technique, strength]
    strongman_complex:       [strength, conditioning, power]
    kb_flow:                 [conditioning, technique, strength_endurance]
    mace_flow:               [conditioning, technique, strength_endurance]
    giant_set:               [hypertrophy, strength_endurance]
    accessory_complex:       [hypertrophy, prehab, strength_endurance]
    peripheral_heart_action: [conditioning, hypertrophy, strength_endurance]
    superset:                [hypertrophy, strength_endurance]
    antagonist_giant_set:    [hypertrophy, strength_endurance]
    fixed_round_circuit:     [conditioning, strength_endurance]
    time_capped_circuit:     [conditioning, strength_endurance]
    chipper:                 [conditioning, strength_endurance]
    tabata:                  [conditioning]

rules:
  # ---- PILOTO P3.1.1 — prueba del round-trip fuente→compilado→motor→suite ----
  - id: drop_rest_too_long
    tier: T1
    origin: rules/prescriptor_rules.yaml
    scope:
      method: drop
      variant: null            # cualquier variante de drop
    when:
      - "rest_between_drops_sec > 15"
    emits: drop_rest_too_long
    fidelity: implemented

  # ---- P3.1.3 familia aritmética (computadas/estructurales, sin solape de rangos) ----
  - id: emom_ascending_exceeds_1rm
    tier: T1
    scope: {method: emom, variant: ascending_load}
    bindings:
      # n_intervals = floor(duración / intervalo); incrementos aplicados = floor((n-1)/cada_n)
      final_load_pct: "starting_load_pct_1rm + load_increment_pct * floor((floor(total_duration_min * 60 / interval_sec) - 1) / increment_every_n_intervals)"
    when: ["final_load_pct > 100"]
    emits: emom_ascending_exceeds_1rm
    fidelity: implemented

  - id: emom_ascending_terminal_load_too_high
    tier: T1
    scope: {method: emom, variant: ascending_load}
    bindings:
      final_load_pct: "starting_load_pct_1rm + load_increment_pct * floor((floor(total_duration_min * 60 / interval_sec) - 1) / increment_every_n_intervals)"
    when: ["final_load_pct > 95", "final_load_pct <= 100"]   # 95<final≤100 (no solapa con exceeds_1rm)
    emits: emom_ascending_terminal_load_too_high
    fidelity: implemented

  - id: pyramid_inverse_relation_violated
    tier: T1
    scope: {method: pyramid, variant_in: [ascending, descending]}   # double/wave (array) → T4
    when:
      - "(last_set_load_pct_1rm >= first_set_load_pct_1rm AND last_set_reps >= first_set_reps) OR (last_set_load_pct_1rm <= first_set_load_pct_1rm AND last_set_reps <= first_set_reps)"
    emits: pyramid_inverse_relation_violated
    fidelity: partial

  - id: mep_reps_not_monotonic_inverse
    tier: T1
    scope: {method: pyramid, variant: multi_exercise_pyramid}
    when:
      - "(last_round_load_pct_1rm >= first_round_load_pct_1rm AND last_round_reps >= first_round_reps) OR (last_round_load_pct_1rm <= first_round_load_pct_1rm AND last_round_reps <= first_round_reps)"
    emits: mep_reps_not_monotonic_inverse
    fidelity: partial

  # ---- P3.1.3 umbral escalar simple (autorables; ver MARCA de solape con motor de rangos) ----
  - id: drop_pct_above_maximum
    tier: T1
    scope: {method: drop, variant: null}
    when: ["drop_pct_per_drop > 30"]
    emits: drop_pct_above_maximum
    fidelity: implemented

  - id: contrast_pair_count_excessive
    tier: T1
    scope: {method: contrast, variant: null}
    when: ["total_pairs > 8"]
    emits: contrast_pair_count_excessive
    fidelity: implemented

  - id: pyramid_wave_count_inconsistent
    tier: T1
    scope: {method: pyramid, variant: wave}
    bindings: {actual_value: "sets_per_wave"}
    when: ["sets_per_wave != 3"]
    emits: pyramid_wave_count_inconsistent
    fidelity: implemented

  - id: mep_rounds_count_too_low
    tier: T1
    scope: {method: pyramid, variant: multi_exercise_pyramid}
    bindings: {actual_value: "rounds_count"}
    when: ["rounds_count < 3"]
    emits: mep_rounds_count_too_low
    fidelity: implemented

  # ---- P3.1.3 umbral por-variante (accesor de schema, recomendación ratificada) ----
  - id: complex_rounds_count_excessive
    tier: T1
    scope: {method: complex, variant: null}
    when: ["total_rounds > canonical_max(total_rounds)"]   # umbral = calibración del catálogo
    emits: complex_rounds_count_excessive
    fidelity: implemented

  # ---- P3.1.3 familia contrast (selector component_role, concesión Q2 + campo de editor) ----
  - id: contrast_heavy_load_too_high
    tier: T1
    scope: {method: contrast, variant: null}
    bindings: {load_pct: "component_role('heavy').load_pct_1rm"}
    when: ["load_pct != null", "load_pct > 95"]
    emits: contrast_heavy_load_too_high
    fidelity: implemented

  - id: contrast_heavy_load_too_low
    tier: T1
    scope: {method: contrast, variant: null}
    bindings: {load_pct: "component_role('heavy').load_pct_1rm"}
    when: ["load_pct != null", "load_pct < 80"]
    emits: contrast_heavy_load_too_low
    fidelity: implemented

  - id: contrast_explosive_load_too_high
    tier: T1
    scope: {method: contrast, variant: null}
    bindings: {load_pct: "component_role('explosive').load_pct_1rm"}
    when: ["load_pct != null", "load_pct > 60"]
    emits: contrast_explosive_load_too_high
    fidelity: implemented

  # ==========================================================================
  # P3.2 — T2: helpers de estimación (subconjunto escalar-puro).
  # Frontera (P3.2.0): solo flags computables de params declarados escalares.
  # Los estimate_*duration sobre components[]/work_unit → re-tier T4 (ver
  # `deferred`). aggregate_volume aquí es la variante escalar lineal:
  # reps_promedio × n  (heurística confirmada por usuario; precisión de
  # generador es v3, esto es viability/warning).
  # ==========================================================================

  # ---- familia aggregate_volume (3 flags de volumen movidos en P3.1.0) ----
  - id: pyramid_total_volume_too_high
    tier: T2
    scope: {method: pyramid, variant_in: [ascending, descending]}   # double/wave (array) → T4
    bindings:
      total_reps: "aggregate_volume(first_set_reps, last_set_reps, sets_count)"
    when: ["total_reps > 50"]
    emits: pyramid_total_volume_too_high
    fidelity: implemented

  - id: pyramid_total_volume_too_low
    tier: T2
    scope: {method: pyramid, variant_in: [ascending, descending]}
    bindings:
      total_reps: "aggregate_volume(first_set_reps, last_set_reps, sets_count)"
    when: ["total_reps < 25"]
    emits: pyramid_total_volume_too_low
    fidelity: implemented

  - id: mep_total_volume_excessive
    tier: T2
    scope: {method: pyramid, variant: multi_exercise_pyramid}
    bindings:
      # multi-exercise: reps_promedio × rondas × ejercicios_por_ronda
      total_reps: "aggregate_volume(first_round_reps, last_round_reps, rounds_count) * exercises_per_round"
    when: ["total_reps > 100"]
    emits: mep_total_volume_excessive
    fidelity: partial      # exercises_per_round asume reps homogéneas por ejercicio

  # ---- estimación escalar pura (sin components[]) ----
  - id: rp_mini_tandas_unrealistic
    tier: T2
    scope: {method: rest_pause, variant: null}
    bindings:
      load_pct: "load_pct_1rm"
      actual_value: "mini_tandas_count_target"
      # a mayor carga, menos mini-tandas sostenibles.
      # curva floor((100-load)/6): 60%→6, 70%→5, 80%→3, 90%→1. Divisor calibrado
      # para NO contradecir el default validado de myo_reps (4 @ 70%).
      # CONFIRMADA por Martin (sesión 7, 2026-06-14). Recalibrable si llega data FV.
      expected_value: "floor((100 - load_pct_1rm) / 6)"
    when: ["mini_tandas_count_target > expected_value"]
    emits: rp_mini_tandas_unrealistic
    fidelity: partial      # umbral proxy, pendiente calibración FV (como MDI)

  - id: emom_collapsed_to_amrap_timecapped
    tier: T2
    scope: {method: emom, variant: null}
    bindings:
      n_intervals: "floor(total_duration_min * 60 / interval_sec)"
    when: ["n_intervals == 1"]
    emits: emom_collapsed_to_amrap_timecapped
    fidelity: implemented

  # ==========================================================================
  # P3.3 (T3) — zona/viabilidad. Helpers escalar-puros (Grupos 2-3):
  # epley_inverse, viability_level, zone_max_reps. Frontera escalar ratificada en
  # P3.3.0: 4 implementables-ya; no_coherent_zone y pyramid_top_set_outside_zone
  # re-tier a T4 (iteran sets/componentes). Tabla Epley y umbrales: "tal cual".
  # ==========================================================================
  # Viabilidad sobre el bloque escalar (straight/default declara reps_target +
  # load_pct_1rm). viability_level → {-1 underloaded, 0 ok, 1 mild, 2 strong, 3 hard}.
  - id: overprescribed_or_load_too_high
    tier: T3
    scope: {method: straight, variant: default}
    bindings:
      load_pct: "load_pct_1rm"
      reps_max_teorico: "epley_inverse(load_pct_1rm)"
      vlevel: "viability_level(reps_target, load_pct_1rm)"
      # delta_pct para el mensaje (entero aproximado; el level ya viene del helper).
      delta_pct: "round(((reps_target - epley_inverse(load_pct_1rm)) / epley_inverse(load_pct_1rm)) * 100)"
      suggested_load: "load_pct_1rm"
      suggested_reps: "reps_max_teorico"
    when: ["reps_max_teorico != null", "vlevel >= 1"]
    emits: overprescribed_or_load_too_high
    fidelity: implemented

  - id: underloaded_for_rep_range
    tier: T3
    scope: {method: straight, variant: default}
    bindings:
      load_pct: "load_pct_1rm"
      reps_max_teorico: "epley_inverse(load_pct_1rm)"
      vlevel: "viability_level(reps_target, load_pct_1rm)"
      delta: "reps_target - epley_inverse(load_pct_1rm)"
      suggested_load: "load_pct_1rm"
    when: ["reps_max_teorico != null", "vlevel == -1"]
    emits: underloaded_for_rep_range
    fidelity: implemented

  # Informational: emite cuando hay MARGEN BAJO (delta in [-4,0], code 0 = ok-pero-cerca).
  # MARCA P3.3.0: usa el mismo helper que los viability pero NO afecta overall_coherent.
  - id: near_max_effort
    tier: T3
    scope: {method: straight, variant: default}
    bindings:
      reps_max_teorico: "epley_inverse(load_pct_1rm)"
      vlevel: "viability_level(reps_target, load_pct_1rm)"
      delta: "reps_target - epley_inverse(load_pct_1rm)"
    when: ["reps_max_teorico != null", "vlevel == 0", "delta >= -1"]
    emits: near_max_effort
    fidelity: partial      # margen "near" acotado a delta>=-1 (proxy; calibrable)

  # cluster: classify_zone sobre el primer cluster. RIR no declarado → asumido 2
  # (opción B, P3.3.0): trabajo de calidad, RIR 2 es el default real; rir_assumed.
  - id: cluster_size_exceeds_zone_reps
    tier: T3
    scope: {method: cluster, variant: null}
    bindings:
      zone_max_reps: "zone_max_reps(load_pct_1rm, reps_per_cluster, 2)"
      zone: "zone_id(load_pct_1rm, reps_per_cluster, 2)"
    when: ["zone_max_reps != null", "reps_per_cluster > zone_max_reps"]
    emits: cluster_size_exceeds_zone_reps
    fidelity: partial      # zona vía RIR asumido (rir_assumed); zona mostrada = max_reps proxy

  # ==========================================================================
  # P3.4 — MIGRACIÓN de reglas hardcoded al compilador (9 escalares-puras).
  # Las que iteran components[] → deferred (retier_T4). Las 2 EMOM-density del
  # hardcode también → T4: su input real es work_per_interval (array<work_unit>),
  # NO un escalar reps_per_interval (que NO existe en ningún schema/default —
  # eran dead code en v0.1). El motor de rangos genérico (param_*) → engine_rules
  # (mapping-only, no es declarativo).
  # El FLAG sigue siendo autoridad de severity/msg/sugg: donde la severidad del
  # flag difiere del hardcode v0.1, GANA el flag (ver MARCA de severidad).
  # bindings: computan los placeholders que el message_template del flag espera.
  # ==========================================================================

  # ---- DRIFT (4): intent declarado vs params escalares. Tres comparten el flag
  # genérico intent_declared_inconsistent_with_parameters; el cuarto es propio.
  - id: drift_strength_load_low
    tier: T1
    scope: {method: null}          # aplica a cualquier método (gate por intent)
    bindings:
      declared_value: intent_declared
      expected_value: "'load >= 80% 1RM'"
    when:
      - "intent_declared == 'max_strength'"
      - "load_pct_1rm != null"
      - "load_pct_1rm < 80"
    emits: intent_declared_inconsistent_with_parameters
    fidelity: partial      # un flag genérico cubre 3 derivas distintas (msg uniforme)

  - id: drift_hypertrophy_reps_low
    tier: T1
    scope: {method: null}
    bindings:
      declared_value: intent_declared
      expected_value: "'reps 6-15'"
    when:
      - "intent_declared == 'hypertrophy'"
      - "reps_target != null"
      - "reps_target < 5"
    emits: intent_declared_inconsistent_with_parameters
    fidelity: partial

  - id: drift_power_load_high
    tier: T1
    scope: {method: null}
    bindings:
      declared_value: intent_declared
      expected_value: "'load <= 70% 1RM'"
    when:
      - "intent_declared == 'power'"
      - "method != 'contrast'"
      - "load_pct_1rm != null"
      - "load_pct_1rm > 70"
    emits: intent_declared_inconsistent_with_parameters
    fidelity: partial

  - id: rest_insufficient_heavy
    tier: T1
    scope: {method: null}
    bindings:
      load_pct: load_pct_1rm
    when:
      - "load_pct_1rm != null"
      - "rest_inter_set_sec != null"
      - "load_pct_1rm >= 85"
      - "rest_inter_set_sec < 120"
    emits: rest_insufficient_heavy
    fidelity: implemented

  # ---- COMPAT (1): drift de afinidad intent↔método vía helper P3.4.
  - id: drift_intent_method_mismatch
    tier: T1
    scope: {method: null}
    bindings:
      declared_value: intent_declared
      expected_value: "'vocabulario intrínseco del método'"
    when:
      - "intent_declared != null"
      - "intent_off_method(intent_declared, method, variant)"
    emits: intent_declared_inconsistent_with_parameters
    fidelity: partial      # afinidad → flag genérico; 1 de 4 emisores del mismo flag

  # ---- STRUCT escalares (6) ----
  - id: cluster_rest_inversion
    tier: T1
    scope: {method: cluster, variant: null}
    when:
      - "rest_intra_set_sec != null"
      - "rest_inter_set_sec != null"
      - "rest_intra_set_sec >= rest_inter_set_sec"
    emits: cluster_rest_inversion
    fidelity: implemented      # hard; ya estaba en Sección V

  - id: rest_pause_activation_light
    tier: T1
    scope: {method: rest_pause, variant: null}
    bindings:
      actual_value: activation_rir
    when:
      - "activation_rir != null"
      - "activation_rir >= 3"
    emits: rp_activation_rir_above_threshold
    fidelity: partial      # hardcode usaba >=3; flag dice >2. Umbral del flag respetado abajo

  - id: drop_pct_below_minimum
    tier: T1
    scope: {method: drop, variant: null}
    when:
      - "drop_pct_per_drop != null"
      - "drop_pct_per_drop > 0"
      - "drop_pct_per_drop < 15"
    emits: drop_pct_below_minimum
    fidelity: implemented   # MARCA: >0 exime a mechanical_drop (drop canónico=0: reduce por
                            # mecánica/leverage, no por %carga). Hardcode v0.1 era hard@<=0
                            # (gate roto: leía param 'drop_pct' inexistente); flag es viability@<15.

  # ==========================================================================
  # P4.1 — T4 / familia F3 (EXISTS). Migradas desde engine_rules (hardcoded).
  # Iteran components[] vía any(...)/first(...). Prerequisito: editor de
  # work_units v0.2.0 (forma canónica). Sintaxis: contrato P4.0 §3 (estilo A
  # funcional). NINGUNA lee c.reps (espejo de compat): operan sobre la forma
  # canónica work_metric/work_value → DESENGANCHAN c.reps (MARCA P4.0 §6).
  # ==========================================================================
  - id: component_without_exercise
    tier: T4
    scope:
      method_in: [contrast, complex]
    bindings:
      component_index: "first_index(components where exercise == null) + 1"
    when:
      - "any(components where exercise == null)"
    emits: complex_component_exercise_undeclared
    fidelity: implemented

  - id: component_work_undefined
    tier: T4
    scope:
      method_in: [contrast, complex]
    bindings:
      # "sin trabajo" en forma canónica = work_value nulo O vacío (cualquier métrica),
      # solo en componentes que SÍ declaran ejercicio (igual que el hardcode, que
      # chequeaba c.reps==='' || c.reps==null). El default de newWorkUnit es '' (no null).
      component_index: "first_index(components where exercise != null AND (work_value == null OR work_value == '')) + 1"
    when:
      - "any(components where exercise != null AND (work_value == null OR work_value == ''))"
    emits: circuit_component_work_metric_missing
    fidelity: implemented

  - id: contrast_explosive_reps_high
    tier: T4
    scope:
      method: contrast
    when:
      - "any(components where role == 'explosive' AND ((work_metric == 'reps' AND work_value > 6) OR (work_metric == 'duration_sec' AND work_value > 9) OR (work_metric == 'distance_m' AND work_value > 30)))"
    emits: contrast_explosive_reps_high
    fidelity: partial   # multi-métrica (reps>6 O dur>9s O dist>30m, decisión Martin
                        # P4.1). MARCA de wording RESUELTA en P4.3: el message_template
                        # del flag es ahora métrica-agnóstico (binding reps_actual retirada).

  - id: slc_component_reps_atypical
    tier: T4
    scope:
      method: complex
      variant: olympic_complex
    when:
      - "any(components where (work_metric == 'reps' AND work_value > 6) OR (work_metric == 'duration_sec' AND work_value > 9) OR (work_metric == 'distance_m' AND work_value > 30))"
    emits: slc_component_reps_atypical
    fidelity: partial   # MARCA de wording RESUELTA en P4.3 (template métrica-agnóstico).

  - id: contrast_heavy_low_demand
    tier: T4
    scope:
      method: contrast
    bindings:
      component_name: "first(components where role == 'heavy' AND catalog(c).mdi < 3).cat_name"
      mdi_value: "first(components where role == 'heavy' AND catalog(c).mdi < 3).cat_mdi"
    when:
      - "any(components where role == 'heavy' AND catalog(c).mdi < 3)"
    emits: contrast_heavy_low_demand
    fidelity: implemented

  - id: contrast_explosive_low_demand
    tier: T4
    scope:
      method: contrast
    bindings:
      component_name: "first(components where role == 'explosive' AND catalog(c).mdi < 2.5).cat_name"
      mdi_value: "first(components where role == 'explosive' AND catalog(c).mdi < 2.5).cat_mdi"
    when:
      - "any(components where role == 'explosive' AND catalog(c).mdi < 2.5)"
    emits: contrast_explosive_low_demand
    fidelity: implemented

  # ==========================================================================
  # P4.2 — T4 / familias F1 (COUNT), F2 (COUNT-WHERE), F4 (ROLE-PRESENCE ≡
  # COUNT>0), F5 (DISTINCT). Migradas desde engine_rules (hardcode STRUCT/COMPAT).
  # Operadores nuevos del traductor: count(<array> [where <pred>]),
  # distinct_count(<array>.<field>) (campo de item o de catálogo cat_*), y el
  # scope variant_not_in. Contrato P4.0 §2-4. Todas leen forma canónica (jamás
  # c.reps). El FLAG es autoridad de severity/msg; bindings llenan placeholders.
  # ==========================================================================

  # ---- F1 COUNT — components_insufficient SPLIT por método: contrast y complex
  # tienen flags distintos; un solo emit forzaría wording incorrecto para uno.
  # La unión de emits cubre los 3 flags que acreditaba el engine_rule. Umbral < 2
  # FIEL al hardcode (NO el min_length por variante del schema: migrar a eso sería
  # ampliación que rompe Invariante A — fixtures con 2 comps en variantes min 3.
  # MARCA P4.2: tensar al schema cuando se corrijan las fixtures, v0.2.x).
  - id: contrast_components_insufficient
    tier: T4
    scope:
      method: contrast
    bindings:
      expected_value: "'≥2'"
      actual_value: "count(components)"
    when:
      - "count(components) < 2"
    emits: contrast_exercise_count_invalid
    fidelity: partial      # umbral plano <2 (hardcode); schema declara min por variante

  - id: complex_components_insufficient
    tier: T4
    scope:
      method: complex
    bindings:
      expected_value: "'≥2'"
      actual_value: "count(components)"
    when:
      - "count(components) < 2"
    emits: [complex_exercise_count_invalid, complex_components_count_invalid]
    fidelity: partial

  # ---- F1 COUNT — estructura de variante incompleta. Fiel al hardcode
  # VARIANT_STRUCT (solo french_contrast, < min). El flag dice "exactly 4"; el
  # chequeo es < 4 (demasiado pocos), como el hardcode (>4 lo cubriría el schema).
  - id: variant_structure_incomplete
    tier: T4
    scope:
      method: contrast
      variant: french_contrast
    bindings:
      actual_value: "count(components)"
    when:
      - "count(components) < 4"
    emits: french_contrast_components_count_wrong
    fidelity: partial

  # ---- F4 ROLE-PRESENCE (≡ COUNT-WHERE > 0) — contrast requiere heavy Y explosive.
  - id: contrast_pairing_invalid
    tier: T4
    scope:
      method: contrast
      variant_in: [heavy_light, complex_pairs, wave_contrast]
    bindings:
      expected_value: "'heavy + explosive'"
      actual_value: "'roles incompletos'"
    when:
      - "NOT (count(components where role == 'heavy') > 0 AND count(components where role == 'explosive') > 0)"
    emits: contrast_roles_inconsistent_with_variant
    fidelity: partial      # el flag espera la lista real de roles; el binding la aproxima.
                           # french_contrast excluido: usa su propio vocabulario de 4 roles
                           # (validado por french_contrast_roles_order_wrong, P5.6).

  # ---- F2 COUNT-WHERE — pares desbalanceados (heavy != explosive, ambos > 0).
  - id: contrast_pairs_unbalanced
    tier: T4
    scope:
      method: contrast
      variant_in: [heavy_light, complex_pairs, wave_contrast]
    bindings:
      heavy_count: "count(components where role == 'heavy')"
      explosive_count: "count(components where role == 'explosive')"
    when:
      - "count(components where role == 'heavy') > 0"
      - "count(components where role == 'explosive') > 0"
      - "count(components where role == 'heavy') != count(components where role == 'explosive')"
    emits: contrast_pairs_unbalanced
    fidelity: implemented

  # ---- F5 DISTINCT — ejercicio repetido en la cadena. Variantes circuito exentas
  # (un mismo movimiento repetido en un circuito es legítimo) vía variant_not_in.
  - id: component_exercise_duplicated
    tier: T4
    scope:
      method_in: [contrast, complex]
      variant_not_in: [fixed_round_circuit, time_capped_circuit, chipper]
    when:
      - "distinct_count(components.exercise) < count(components where exercise != null)"
    emits: component_exercise_duplicated
    fidelity: implemented

  # ---- F5 DISTINCT (+catálogo) — cadena de carga compartida con implementos
  # heterogéneos. CASE 1 del hardcode (distinct(implemento de catálogo) > 1) =
  # núcleo de imposibilidad física (una sola carga compartida). CASE 2 del
  # hardcode (homogéneo PERO implemento != el requerido por la variante) → re-tier:
  # exige una tabla de constante requerida-por-variante, fuera de F5 DISTINCT
  # (ver deferred). component_index/name: primer componente con ejercicio (proxy).
  - id: slc_implement_heterogeneous
    tier: T4
    scope:
      method: complex
      variant_in: [olympic_complex, strongman_complex, kb_flow, mace_flow]
    bindings:
      component_index: "first_index(components where exercise != null) + 1"
      component_name: "first(components where exercise != null).cat_name"
    when:
      - "distinct_count(components.cat_implement) > 1"
    emits: slc_load_metric_inappropriate_for_component
    fidelity: partial      # case 2 (implemento != requerido) re-tier; ver deferred

  # ==========================================================================
  # P4.3 — T4 / familia F6 (REDUCE/AGG): EMOM density. Primer helper-sobre-array
  # (estimate_work_duration recibe work_per_interval e ITERA). Reescribe las 3
  # reglas que el hardcode evaluaba sobre el dead `reps_per_interval` (param
  # inexistente en schema/default); el input REAL es work_per_interval (array<
  # work_unit> en v0.2.0). Scope variant_not_in [alternating] (alternating usa
  # exercises_rotation → P4.5). Umbral density_high = 85% (lo que declara el flag
  # emom_work_exceeds_interval; resuelve la discrepancia 80/85 a favor del flag).
  # ==========================================================================
  - id: emom_work_undefined
    tier: T4
    scope:
      method: emom
      variant_not_in: [alternating]
    when:
      - "count(work_per_interval where work_value != null AND work_value != '') == 0"
    emits: emom_work_undefined
    fidelity: implemented

  - id: emom_density_impossible
    tier: T4
    scope:
      method: emom
      variant_not_in: [alternating]
    bindings:
      estimated_work_sec: "round(estimate_work_duration(work_per_interval))"
    when:
      - "estimate_work_duration(work_per_interval) > 0"
      - "estimate_work_duration(work_per_interval) >= interval_sec"
    emits: emom_work_exceeds_interval
    fidelity: partial      # tpr*reps heurístico; distance_m no modelado (MARCA)

  - id: emom_density_high
    tier: T4
    scope:
      method: emom
      variant_not_in: [alternating]
    bindings:
      estimated_work_sec: "round(estimate_work_duration(work_per_interval))"
    when:
      - "estimate_work_duration(work_per_interval) < interval_sec"
      - "estimate_work_duration(work_per_interval) > 0.85 * interval_sec"
    emits: emom_work_exceeds_interval
    fidelity: partial

  # ==========================================================================
  # P4.4 — T4 / familia F6 (estimación de duración). NETO-NUEVO: estos
  # estimate_*_duration NUNCA se hardcodearon (T2→T4 diferidos, spec Grupo 7);
  # no hay equivalencia que mantener — los goldens son de CARACTERIZACIÓN. Usan
  # los block-helpers __H.estimate_total_duration(b) / __H.estimate_rounds(b)
  # (forma sin-args). Modelo de tiempo: spec Grupo 7. Scope preciso por variante;
  # cada regla exige (en when) el param que su modelo necesita (sin él no estima).
  # Primera AMPLIACIÓN de cobertura en P4 (8 flags missing → partial).
  # ==========================================================================
  - id: emom_work_too_light_for_interval
    tier: T4
    scope:
      method: emom
      variant_not_in: [alternating]
    bindings:
      estimated_work_sec: "round(estimate_work_duration(work_per_interval))"
    when:
      - "estimate_work_duration(work_per_interval) > 0"
      - "estimate_work_duration(work_per_interval) < 0.2 * interval_sec"
    emits: emom_work_too_light_for_interval
    fidelity: partial

  - id: complex_estimated_duration_excessive
    tier: T4
    scope:
      method: complex
      variant_not_in: [time_capped_circuit, chipper, tabata, fixed_round_circuit]
    bindings:
      estimated_total_min: "round(estimate_total_duration() / 60)"
    when:
      - "total_rounds != null AND total_rounds != ''"
      - "estimate_total_duration() > 2700"
    emits: complex_estimated_duration_excessive
    fidelity: partial

  - id: complex_estimated_duration_too_short
    tier: T4
    scope:
      method: complex
      variant_not_in: [time_capped_circuit, chipper, tabata, fixed_round_circuit]
    bindings:
      estimated_total_sec: "round(estimate_total_duration())"
    when:
      - "total_rounds != null AND total_rounds != ''"
      - "estimate_total_duration() > 0"
      - "estimate_total_duration() < 60"
    emits: complex_estimated_duration_too_short
    fidelity: partial

  - id: chipper_estimated_duration_exhaustive
    tier: T4
    scope:
      method: complex
      variant: chipper
    bindings:
      estimated_total_min: "round(estimate_total_duration() / 60)"
    when:
      - "(time_cap_min == null OR time_cap_min == '')"
      - "estimate_total_duration() > 1800"
    emits: chipper_estimated_duration_exhaustive
    fidelity: partial

  - id: chipper_estimated_exceeds_cap
    tier: T4
    scope:
      method: complex
      variant: chipper
    bindings:
      estimated_total_sec: "round(estimate_total_duration())"
      time_cap_sec: "time_cap_min * 60"
    when:
      - "time_cap_min != null AND time_cap_min != ''"
      - "estimate_total_duration() >= time_cap_min * 60"
    emits: chipper_estimated_exceeds_cap
    fidelity: partial

  - id: tcc_rounds_too_few
    tier: T4
    scope:
      method: complex
      variant: time_capped_circuit
    bindings:
      estimated_rounds: "estimate_rounds()"
    when:
      - "estimate_rounds() != null"
      - "estimate_rounds() < 3"
    emits: tcc_rounds_too_few
    fidelity: partial

  - id: tcc_target_rounds_mismatch_estimate
    tier: T4
    scope:
      method: complex
      variant: time_capped_circuit
    bindings:
      estimated_rounds: "estimate_rounds()"
    when:
      - "target_rounds != null AND target_rounds != ''"
      - "estimate_rounds() != null"
      - "abs(estimate_rounds() - target_rounds) > 3"
    emits: tcc_target_rounds_mismatch_estimate
    fidelity: partial

  - id: circuit_duration_mismatch_target
    tier: T4
    scope:
      method: complex
      variant: fixed_round_circuit
    bindings:
      estimated_total_min: "round(estimate_total_duration() / 60)"
    when:
      - "target_total_duration_min != null AND target_total_duration_min != ''"
      - "total_rounds != null AND total_rounds != ''"
      - "abs(estimate_total_duration() / 60 - target_total_duration_min) > 0.3 * target_total_duration_min"
    emits: circuit_duration_mismatch_target
    fidelity: partial

  # P5.1 (D4) — F6 monotonía. Chipper front-loads high reps: la secuencia de reps
  # de los componentes debe ser NO CRECIENTE. Usa el array `components` ya capturado
  # por el editor v0.2.0 (sin editor nuevo). `components.reps` resuelve canónico
  # (work_metric=='reps'?work_value:null); estaciones por tiempo/distancia se omiten
  # (is_monotonic descarta nulos) — correcto para un flag informational sobre reps.
  - id: chipper_reps_progression_unusual
    tier: T4
    scope:
      method: complex
      variant: chipper
    when:
      - "NOT monotonic_decreasing(components.reps)"
    emits: chipper_reps_progression_unusual
    fidelity: implemented

  # P5.1 (D2) — pyramid_load_not_monotonic. Solo NO-vacuo en custom: linear/geometric
  # generan rampa monótona por construcción (y la dirección la cubre
  # pyramid_inverse_relation_violated). 2 reglas (asc=inc, desc=dec), ambas emiten el
  # flag. component_index = primer set que rompe (1-based, 0 si monótona).
  - id: pyramid_load_not_monotonic_asc
    tier: T4
    scope:
      method: pyramid
      variant: ascending
    bindings:
      component_index: "monotonic_break_increasing(set_ramp.load_pct_1rm)"
    when:
      - "load_progression == 'custom'"
      - "NOT monotonic_increasing(set_ramp.load_pct_1rm)"
    emits: pyramid_load_not_monotonic
    fidelity: implemented

  - id: pyramid_load_not_monotonic_desc
    tier: T4
    scope:
      method: pyramid
      variant: descending
    bindings:
      component_index: "monotonic_break_decreasing(set_ramp.load_pct_1rm)"
    when:
      - "load_progression == 'custom'"
      - "NOT monotonic_decreasing(set_ramp.load_pct_1rm)"
    emits: pyramid_load_not_monotonic
    fidelity: implemented

  # P5.1 (D3) — pyramid_top_set_outside_zone. Top set = endpoint pico (asc: last_set;
  # desc: first_set). Lectura robusta: "fuera de zona" = top set NO VIABLE (sobre-
  # prescrito) vía viability_level (helper escalar T3), evitando la fragilidad de
  # `reps > zone_max_reps` (classify_zone pesa reps 0.5 → la zona envuelve las reps,
  # casi nunca dispara — MARCA P3.3). Dispara con vlevel>=2 (strong/hard_fail). RIR=1
  # implícito en el endpoint pico (no usado por viability_level, que es reps×load).
  # {zone} = zona inferida (puede ser null si incoherente). Viability, partial.
  - id: pyramid_top_set_outside_zone_asc
    tier: T3
    scope:
      method: pyramid
      variant: ascending
    bindings:
      top_set_load: "last_set_load_pct_1rm"
      top_set_reps: "last_set_reps"
      zone: "zone_id(last_set_load_pct_1rm, last_set_reps, 1)"
    when:
      - "viability_level(last_set_reps, last_set_load_pct_1rm) >= 2"
    emits: pyramid_top_set_outside_zone
    fidelity: partial

  - id: pyramid_top_set_outside_zone_desc
    tier: T3
    scope:
      method: pyramid
      variant: descending
    bindings:
      top_set_load: "first_set_load_pct_1rm"
      top_set_reps: "first_set_reps"
      zone: "zone_id(first_set_load_pct_1rm, first_set_reps, 1)"
    when:
      - "viability_level(first_set_reps, first_set_load_pct_1rm) >= 2"
    emits: pyramid_top_set_outside_zone
    fidelity: partial

  # P5.1 (D5) — mep_load_not_monotonic_across_rounds. MEP es ascendente (first_round
  # → last_round, carga sube). round_plan por-ronda en custom. Mismo patrón que D2.
  - id: mep_load_not_monotonic_across_rounds
    tier: T4
    scope:
      method: pyramid
      variant: multi_exercise_pyramid
    bindings:
      component_index: "monotonic_break_increasing(round_plan.load_pct_1rm)"
    when:
      - "load_progression == 'custom'"
      - "NOT monotonic_increasing(round_plan.load_pct_1rm)"
    emits: mep_load_not_monotonic_across_rounds
    fidelity: implemented

  # P5.2 — mechanical_drop (método drop / variante mechanical_drop). Captura
  # mechanical_progression: array<mechanical_step> {exercise, variation_descriptor,
  # difficulty_index_override}. Demanda efectiva = override ?? MDI catálogo.
  - id: mechanical_drop_no_progression_declared
    tier: T4
    scope:
      method: drop
      variant: mechanical_drop
    when:
      - "count(mechanical_progression) == 0"
    emits: mechanical_drop_no_progression_declared
    fidelity: implemented

  - id: mechanical_drop_progression_length_mismatch
    tier: T4
    scope:
      method: drop
      variant: mechanical_drop
    bindings:
      actual_value: "count(mechanical_progression)"
      expected_value: "drops_count + 1"
    when:
      - "count(mechanical_progression) > 0"
      - "count(mechanical_progression) != drops_count + 1"
    emits: mechanical_drop_progression_length_mismatch
    fidelity: implemented

  - id: mechanical_drop_demand_not_decreasing
    tier: T4
    scope:
      method: drop
      variant: mechanical_drop
    when:
      - "count(mechanical_progression) > 0"
      - "NOT monotonic_decreasing(mechanical_progression.effective_demand)"
    emits: mechanical_drop_demand_not_decreasing
    fidelity: implemented

  - id: mechanical_drop_rom_changes_exercise
    tier: T4
    scope:
      method: drop
      variant: mechanical_drop
    when:
      - "mechanism == 'range_of_motion'"
      - "distinct_count(mechanical_progression.exercise) > 1"
    emits: mechanical_drop_rom_changes_exercise
    fidelity: implemented

  - id: mechanical_drop_step_not_in_catalog
    tier: T4
    scope:
      method: drop
      variant: mechanical_drop
    bindings:
      component_index: "first_index(mechanical_progression where exercise != null AND catalog(c).name == null) + 1"
      component_name: "first(mechanical_progression where exercise != null AND catalog(c).name == null).exercise"
    when:
      - "any(mechanical_progression where exercise != null AND catalog(c).name == null)"
    emits: mechanical_drop_step_not_in_catalog
    fidelity: partial

  # ==========================================================================
  # P5.3 — AGS (antagonist_giant_set). Estructura de PAREO declarada explícita
  # (decisión P5 nº2): cada componente lleva pair_index (0-based) + role_in_pair
  # (agonist/antagonist). count()/first_index()/any() para los chequeos escalares;
  # block-helpers ags_* para los group-by (balance de pareo, antagonismo por
  # movement_pattern de catálogo) que comparan items entre sí o contra pairs_count.
  # ==========================================================================
  - id: ags_components_count_invalid
    tier: T4
    scope: {method: complex, variant: antagonist_giant_set}
    bindings:
      actual_value: "count(components)"
    when:
      - "pairs_count != null"
      - "count(components) != pairs_count * 2"
    emits: ags_components_count_invalid
    fidelity: implemented

  - id: ags_role_in_pair_undeclared
    tier: T4
    scope: {method: complex, variant: antagonist_giant_set}
    bindings:
      component_index: "first_index(components where role_in_pair == null OR role_in_pair == '') + 1"
    when:
      - "any(components where role_in_pair == null OR role_in_pair == '')"
    emits: ags_role_in_pair_undeclared
    fidelity: implemented

  - id: ags_pair_index_invalid
    tier: T4
    scope: {method: complex, variant: antagonist_giant_set}
    bindings:
      component_index: "ags_first_bad_pair_index()"
      actual_value: "ags_bad_pair_index_value()"
    when:
      - "ags_first_bad_pair_index() > 0"
    emits: ags_pair_index_invalid
    fidelity: implemented

  - id: ags_pair_count_mismatch
    tier: T4
    scope: {method: complex, variant: antagonist_giant_set}
    when:
      - "ags_pairs_unbalanced()"
    emits: ags_pair_count_mismatch
    fidelity: implemented

  - id: ags_pair_not_antagonistic
    tier: T4
    scope: {method: complex, variant: antagonist_giant_set}
    bindings:
      component_index: "ags_first_shared_pattern_pair()"
    when:
      - "ags_first_shared_pattern_pair() > 0"
    emits: ags_pair_not_antagonistic
    fidelity: partial      # antagonismo por movement_pattern (proxy de oposición articular)

  # ==========================================================================
  # P5.4 — EMOM alternating: el trabajo vive en exercises_rotation (array<work_unit>),
  # capturado por el editor unificado vía wuArrayKey(emom/alternating). F1 COUNT.
  # Las reglas de densidad (P4.3) ya excluían alternating (variant_not_in), así que
  # no hay solape. Cierra la MARCA P4.5 (ui_prereq_rotation_editor).
  # ==========================================================================
  - id: emom_alternating_rotation_empty
    tier: T4
    scope: {method: emom, variant: alternating}
    bindings:
      actual_value: "count(exercises_rotation)"
    when:
      - "count(exercises_rotation) < 2"
    emits: emom_alternating_rotation_empty
    fidelity: implemented

  # ==========================================================================
  # P5.5a — zona/PHA/giant_set, los 3 flags "directos" (F5/F6/F3 sobre accesores
  # ya existentes: cat_pattern/cat_segment de catálogo + load_pct_1rm de item +
  # operador monotonic_* de P5.1). Cero piezas de motor nuevas. giant_set y
  # peripheral_heart_action son VARIANTES del método complex (como AGS en P5.3).
  # complex_zone_spread_excessive (el 4º "directo" del plan) se DIFIRIÓ a P5.5c:
  # `components.zone` NO es campo declarado del work_unit (zone solo existe como
  # binding computado zone_id(load,reps,rir) en straight/cluster); inferir zona
  # por componente es el mismo problema del zone scorer de P5.5c — se resuelve allí
  # para no introducir un proxy de zona inconsistente con el scorer real.
  # ==========================================================================
  - id: giant_set_target_muscle_group_inconsistent
    tier: T4
    scope: {method: complex, variant: giant_set}
    bindings:
      actual_value: "distinct_count(components.cat_pattern)"
    when:
      - "count(components) >= 2"
      - "distinct_count(components.cat_pattern) > 1"
    emits: giant_set_target_muscle_group_inconsistent
    fidelity: implemented

  - id: giant_set_load_progression_unusual
    tier: T4
    scope: {method: complex, variant: giant_set}
    bindings:
      component_index: "monotonic_break_decreasing(components.load_pct_1rm)"
    when:
      - "count(components) >= 2"
      - "distinct_count(components.load_metric) == 1"
      - "any(components where load_metric == 'percent_1rm')"
      - "NOT monotonic_decreasing(components.load_pct_1rm)"
    emits: giant_set_load_progression_unusual
    fidelity: partial      # guard de homogeneidad: solo percent_1rm homogéneo;
                           # giant sets en absolute_load NO se chequean (MARCA P5.5a)

  - id: pha_body_segments_undeclared
    tier: T4
    scope: {method: complex, variant: peripheral_heart_action}
    bindings:
      component_index: "first_index(components where catalog(c).segment == null) + 1"
    when:
      - "count(components) >= 1"
      - "any(components where catalog(c).segment == null)"
    emits: pha_body_segments_undeclared
    fidelity: partial      # P5.5b nº3 (auditoría de honestidad): body_segment es
                           # catálogo-derivado (catalog(c).segment), NO campo declarado
                           # por el usuario como exige el spec (work_unit_required_fields).
                           # El proxy detecta "ejercicio fuera de catálogo", no "segmento
                           # sin declarar". MARCA: campo declarado requiere editor v0.2.x.

  # ==========================================================================
  # P5.5b — PHA alternation. pha_alternation_pattern_violated (structural_hard).
  # Proxy declarativo de fn:check_pha_strict_alternation (Group 10, v3) vía
  # block-helpers pha_* (patrón ags_* de P5.3). 3 ramas de alternation_pattern:
  # strict_upper_lower / push_pull_lower / custom (exento). Segmento por componente
  # = cat_segment (catálogo-derivado, decisión P5.5b nº1). El scan se salta si hay
  # segmentos nulos (los cubre pha_body_segments_undeclared). fidelity partial:
  # proxy del fn:, segmento derivado, push_pull_lower con interpretación documentada
  # (ciclo [push,pull,lower]; push={push_h,push_v}, pull={pull_h,pull_v,olympic_pull},
  # lower=cat_segment=='lower').
  # ==========================================================================
  - id: pha_alternation_pattern_violated
    tier: T4
    scope: {method: complex, variant: peripheral_heart_action}
    bindings:
      component_index: "pha_first_alternation_break()"
      component_name: "pha_break_name()"
      actual_value: "pha_break_actual()"
      expected_value: "pha_break_expected()"
      pattern_declared: "alternation_pattern"
    when:
      - "pha_first_alternation_break() > 0"
    emits: pha_alternation_pattern_violated
    fidelity: partial

  # ==========================================================================
  # P5.5c — zona inferida. no_coherent_zone (structural_hard) sobre la prescripción
  # escalar straight/default (reps+load → classify_zone null si max_score<0.70, rir=2
  # asumido). complex_zone_spread_excessive (informational) cuenta zonas inferidas
  # distintas entre componentes (>2 = heterogéneo). Reusa el scorer de P3.3 (rangos
  # DATA.zones + umbral 0.70, ya calibrados). zone_declared_inconsistent_with_inferred
  # NO se implementa: no existe campo de zona declarada (ver deferred).
  # ==========================================================================
  - id: no_coherent_zone
    tier: T3
    scope: {method: straight, variant: default}
    bindings:
      max_score: "zone_score(load_pct_1rm, reps_target, 2)"
    when:
      - "reps_target != null"
      - "load_pct_1rm != null"
      - "zone_id(load_pct_1rm, reps_target, 2) == null"
    emits: no_coherent_zone
    fidelity: partial      # inferencia escalar; rir=2 asumido (straight no declara rir)

  - id: complex_zone_spread_excessive
    tier: T4
    scope: {method: complex}
    bindings:
      zone_spread: "zone_spread()"
    when:
      - "zone_spread() > 2"
    emits: complex_zone_spread_excessive
    fidelity: partial      # zona inferida por componente (rir=2 asumido); umbral >2 recalibrable

  # ==========================================================================
  # P5.6 — contrast same-pattern + french_contrast role order.
  # contrast_components_same_pattern: el spec dice "mismo movement_pattern", pero los
  # fixtures validados usan pares de patrón distinto fisiológicamente válidos
  # (back_squat + box_jump). Operacionalizo "misma musculatura" por cat_segment
  # (partial + MARCA). Excluye french_contrast (cadena multi-patrón por diseño).
  # ==========================================================================
  - id: contrast_components_same_pattern_violated
    tier: T4
    scope: {method: contrast, variant_in: [heavy_light, complex_pairs, wave_contrast]}
    bindings:
      actual_value: "distinct_count(components.cat_segment)"
    when:
      - "count(components) >= 2"
      - "distinct_count(components.cat_segment) > 1"
    emits: contrast_components_same_pattern_violated
    fidelity: partial      # proxy de segmento (el literal movement_pattern marcaría
                           # pares válidos squat+jump). MARCA: calibración de Martin.

  - id: french_contrast_roles_order_wrong
    tier: T4
    scope: {method: contrast, variant: french_contrast}
    bindings:
      component_index: "fc_roles_wrong()"
    when:
      - "fc_roles_wrong() > 0"
    emits: french_contrast_roles_order_wrong
    fidelity: implemented

  # ==========================================================================
  # P5.7 — SLC (single_load_chain family: olympic/strongman/kb/mace). Carga compartida
  # a nivel bloque (shared_load_*); componentes no deben declarar cargas propias.
  # ==========================================================================
  - id: slc_components_have_independent_loads
    tier: T4
    scope: {method: complex, variant_in: [olympic_complex, strongman_complex, kb_flow, mace_flow]}
    when:
      - "distinct_count(components.load_pct_1rm) > 1 OR distinct_count(components.load_value) > 1"
    emits: slc_components_have_independent_loads
    fidelity: partial      # detecta cargas por-componente divergentes; el modelo de
                           # carga compartida vive a nivel bloque (shared_load_*)

  - id: slc_rest_between_components_too_long
    tier: T3
    scope: {method: complex, variant_in: [olympic_complex, strongman_complex, kb_flow, mace_flow]}
    bindings:
      rest_between_components_sec: "rest_between_components_sec"
    when:
      - "rest_between_components_sec != null"
      - "rest_between_components_sec > 10"
    emits: slc_rest_between_components_too_long
    fidelity: implemented

  - id: slc_component_order_technically_unsafe
    tier: T4
    scope: {method: complex, variant_in: [olympic_complex, strongman_complex, kb_flow, mace_flow]}
    bindings:
      first_complexity: "slc_first_tci()"
      avg_rest: "slc_avg_rest_tci()"
    when:
      - "slc_first_tci() != null"
      - "slc_avg_rest_tci() != null"
      - "slc_first_tci() < slc_avg_rest_tci() - 2"
    emits: slc_component_order_technically_unsafe
    fidelity: partial      # margen 2 en TCI (proxy de "primer movimiento trivial antes
                           # de complejos"); recalibrable

  # ==========================================================================
  # P5.7 — time_capped_circuit: rondas estimadas excesivas = componentes muy ligeros.
  # ==========================================================================
  - id: tcc_components_too_light
    tier: T4
    scope: {method: complex, variant: time_capped_circuit}
    bindings:
      estimated_rounds: "estimate_rounds()"
    when:
      - "estimate_rounds() > 15"
    emits: tcc_components_too_light
    fidelity: partial      # modelo de tiempo heurístico (Grupo 7); umbral 15 del flag

  # ==========================================================================
  # P5.8 — T5 (datos de fuerza). slc_load_exceeds_weakest_link es ESCALAR: el load
  # se declara como shared_load_pct_1rm_of_weakest (ya es % del 1RM del eslabón más
  # débil), así que "excede 85% del weakest" = ese valor > 85. NO requiere el grafo
  # de fuerza. Los otros 3 flags T5 (weakest_link_misidentified / low_confidence /
  # ratio_composition_possibly_imprecise) son vacuos en v2 (sin ancla declarada que
  # contradecir) → ver deferred. Scope: variantes con métrica pct_of_weakest.
  # ==========================================================================
  - id: slc_load_exceeds_weakest_link
    tier: T4
    scope: {method: complex, variant_in: [olympic_complex, strongman_complex]}
    bindings:
      load_pct: "shared_load_pct_1rm_of_weakest"
    when:
      - "shared_load_pct_1rm_of_weakest != null"
      - "shared_load_pct_1rm_of_weakest > 85"
    emits: slc_load_exceeds_weakest_link
    fidelity: implemented

  # ==========================================================================
  # V3.6 — DRIFT HEURÍSTICO DIFUSO (auto-clasificador). Los 4 flags difuso-difuso
  # diferidos en P5 (disposition fuzzy_classifier_v3). Todos informational/block/
  # drift_pattern: OBSERVAN que un bloque "se parece" a otro método/familia que la
  # declarada; NUNCA bloquean (el flag es autoridad de severidad, P3.4). Tres son
  # detección de patrón casi-booleana (umbral duro, como el resto del validador);
  # el cuarto (misclassified_as_family) es un argmax sobre familias → score difuso
  # reusando el motor de pertenencia de classify_zone (P3.3). El generador NO los
  # reusa (produce bloques correctos por construcción) → validador puro; el test
  # de invariante del generador atestigua que no produce drift, sin autochequeo
  # (estos flags no son v3_constraint — a diferencia del drift de MODELO de V3.4).
  # ==========================================================================

  # V3.6.1 — single_load_chain (3 comps, carga compartida, ~2s rest) con SOLO 2
  # componentes y descanso 15+ s ya no es una cadena: es un par de contraste
  # (heavy + explosive con pausa PAP). Umbral duro: count==2 AND rest>=15. Un SLC
  # correcto (3 comps, rest default 2) nunca dispara. count() es F1; el rest es
  # param directo → sin block-helper.
  - id: slc_resembles_contrast_heavy_light
    tier: T4
    scope: {method: complex, variant_in: [olympic_complex, strongman_complex, kb_flow, mace_flow]}
    bindings:
      component_count: "count(components)"
      rest_between_components_sec: "rest_between_components_sec"
    when:
      - "count(components) == 2"
      - "rest_between_components_sec != null"
      - "rest_between_components_sec >= 15"
    emits: slc_resembles_contrast_heavy_light
    fidelity: implemented

  # V3.6.2 — superset (2 ejercicios alternados del mismo patrón) prescrito en
  # realidad como un par de contraste: mismo movement_pattern + cargas heavy/light
  # (>=80% / <=60%) + descanso en ventana PAP (>=90s). Block-helper (compara los 2
  # componentes entre sí — group-by fuera del alcance de un <pred> de item). Un
  # superset real (cargas parejas hipertróficas, rest corto) nunca dispara.
  - id: superset_resembles_contrast_heavy_light
    tier: T4
    scope: {method: complex, variant: superset}
    bindings:
      resembles: "superset_resembles_contrast()"
    when:
      - "superset_resembles_contrast()"
    emits: superset_resembles_contrast_heavy_light
    fidelity: implemented

  # V3.6.3 — bloque complex con 4 componentes en los roles canónicos de
  # french_contrast (heavy_strength/heavy_plyo/loaded_explosive/unloaded_plyo) está
  # mal etiquetado: es un french_contrast (variante de CONTRAST, no de complex).
  # Block-helper (conjunto de roles sobre 4 comps). french_contrast real es method
  # contrast → fuera de scope; ninguna variante complex usa esos 4 roles por defecto.
  - id: complex_resembles_french_contrast
    tier: T4
    scope: {method: complex}
    bindings:
      resembles: "resembles_french_contrast()"
    when:
      - "resembles_french_contrast()"
    emits: complex_resembles_french_contrast
    fidelity: implemented

  # V3.6.4 — clasificador difuso de familia (el único de los 4 que NO es umbral duro:
  # su mensaje exige NOMBRAR la familia inferida → argmax). family_misclassified()
  # dispara cuando la familia que el bloque más se parece (argmax concluyente sobre
  # SLC/ILC/circuit, score>=0.60 y margen>=0.20 sobre el runner-up) DIFIERE de la
  # declarada. Bindings pueblan {suggested_family}/{current_family} del template.
  # Reusa la mecánica de score ponderado de classify_zone (P3.3). fidelity: partial
  # (heurística de firma estructural; los pesos son MARCA-FIS recalibrables).
  - id: complex_likely_misclassified_as_family
    tier: T4
    scope: {method: complex}
    bindings:
      suggested_family: "family_suggested()"
      current_family: "family_current()"
    when:
      - "family_misclassified()"
    emits: complex_likely_misclassified_as_family
    fidelity: partial

  # ==========================================================================
  # P7.4 — motor de fuerza relativa (engine __H._weakest sobre el grafo embebido en
  # P7.1). Los 3 flags se "consumen" SOLO con ancla declarada (weakest_link_ref): sin
  # ancla no hay validación de weakest-link que hacer, y el motor queda dormido (el
  # fixture default power_clean+push_jerk no dispara → Invariante A limpia).
  #   ratio_composition_possibly_imprecise: la cadena de ratios cruzó 2+ saltos inter-hub.
  #   slc_weakest_link_low_confidence: identificación de baja confianza → salta el check duro.
  #   slc_weakest_link_misidentified: ancla declarada ≠ weakest computado (y conf NO low).
  # ==========================================================================
  - id: ratio_composition_possibly_imprecise
    tier: T4
    scope: {method: complex, variant_in: [olympic_complex, strongman_complex, kb_flow, mace_flow]}
    bindings:
      actual_value: "slc_ratio_max_jumps()"
    when:
      - "slc_ratio_max_jumps() >= 2"
    emits: ratio_composition_possibly_imprecise
    fidelity: partial      # confianza por composición del grafo (calibración Martin #2):
                           # 2+ saltos inter-hub = low. Helper auto-gatea en ancla declarada.

  - id: slc_weakest_link_low_confidence
    tier: T4
    scope: {method: complex, variant_in: [olympic_complex, strongman_complex, kb_flow, mace_flow]}
    when:
      - "slc_weakest_conf_low()"
    emits: slc_weakest_link_low_confidence
    fidelity: partial      # baja confianza = cadena cruza 2+ saltos inter-hub (proxy v3).
                           # Helper auto-gatea en ancla declarada.

  - id: slc_weakest_link_misidentified
    tier: T4
    scope: {method: complex, variant_in: [olympic_complex, strongman_complex, kb_flow, mace_flow]}
    bindings:
      declared_value: "weakest_link_ref"
      computed_value: "slc_weakest_computed()"
    when:
      - "slc_weakest_misidentified()"
    emits: slc_weakest_link_misidentified
    fidelity: implemented  # motor de fuerza relativa + ancla declarada; el helper ya
                           # exige ancla presente y confianza no-low (si low → lo cubre
                           # slc_weakest_link_low_confidence)

  # ==========================================================================
  # P6.1 — campos declarados de bloque (editor v0.2.x). family/zone ahora se capturan
  # (family auto-read-only desde la variante; zone editable). El validador los compara
  # — vale para bloques del editor y de cualquier origen (v3/import). Guard en
  # no-declarado (== '' / null) para no disparar cuando el campo no se declaró.
  # ==========================================================================
  - id: complex_family_mismatch_with_variant
    tier: T4
    scope: {method: complex}
    bindings:
      declared_value: "family"
      computed_value: "variant_family()"
    when:
      - "family != null"
      - "family != ''"
      - "family != variant_family()"
    emits: complex_family_mismatch_with_variant
    fidelity: implemented

  - id: zone_declared_inconsistent_with_inferred
    tier: T3
    scope: {method: straight, variant: default}
    bindings:
      zone_declared: "zone"
      zone_inferred: "zone_id(load_pct_1rm, reps_target, 2)"
    when:
      - "zone != null"
      - "zone != ''"
      - "reps_target != null"
      - "load_pct_1rm != null"
      - "zone != zone_id(load_pct_1rm, reps_target, 2)"
    emits: zone_declared_inconsistent_with_inferred
    fidelity: partial      # zona inferida escalar; rir=2 asumido (straight no declara rir)

  # ==========================================================================
  # P6.2 — tabata: carga por-componente prohibitiva para 20s sostenidos. El work_unit
  # ya captura load_pct_1rm (editor unificado; el deferral defer_editors era prematuro).
  # ==========================================================================
  - id: tabata_load_too_high_for_duration
    tier: T4
    scope: {method: complex, variant: tabata}
    bindings:
      load_pct: "first(components where load_pct_1rm > 50).load_pct_1rm"
    when:
      - "any(components where load_pct_1rm > 50)"
    emits: tabata_load_too_high_for_duration
    fidelity: partial      # umbral 50% 1RM como "prohibitivo" para 20s repetidos —
                           # MARCA: calibración fisiológica de Martin, recalibrable

  # ==========================================================================
  # P6.3 — multi_exercise_pyramid: mismos ejercicios cada ronda. Validador sobre
  # round_exercises (campo opcional poblado por v3/import; el editor usa lista
  # compartida bajo el modelo-invariante → no lo produce → consistente por
  # construcción). DECISIÓN DE DISEÑO: NO se construye un grid 2D en el editor —
  # sería añadir expresividad de error a un caso que el invariante ya previene
  # (valor de diseño negativo). El validador igual chequea bloques de cualquier origen.
  # ==========================================================================
  - id: mep_exercises_inconsistent_across_rounds
    tier: T4
    scope: {method: pyramid, variant: multi_exercise_pyramid}
    when:
      - "mep_rounds_inconsistent()"
    emits: mep_exercises_inconsistent_across_rounds
    fidelity: partial      # chequea round_exercises (v3/import); el editor no lo puebla

# ============================================================================
# DISPOSICIÓN DEL ROSTER T1 (sesión P3.1.3) — registro durable, NO compilado.
# El compilador ignora esta clave (solo procesa `rules`). Es la memoria de por
# qué 5 de los 18 T1 originales no se implementaron en P3.1.
# ============================================================================
deferred:
  # ==========================================================================
  # CIERRE P4.5 → ACTUALIZADO EN P5.1. Las familias MONOTONIC se IMPLEMENTARON al
  # construir el editor multi-set/por-ronda (set_ramp/round_plan) + el operador
  # declarativo monotonic_* (familia F6). El contrato reservaba la monotonía a fn:
  # solo porque el array no estaba capturado, no por necesidad de código: una vez
  # capturado, es un predicado puro que el motor declarativo posee. Quedan diferidos
  # solo los que dependen de captura por-COMPONENTE/ROTACIÓN no construida aún:
  #   · emom_alternating_rotation_empty: exercises_rotation (array<work_unit>) NO lo
  #     captura el editor v0.2.0 ni el de rampa P5.1. Requiere editor de rotación (P5.4).
  #   · mep_exercises_inconsistent_across_rounds: bajo el modelo LIGERO de D5 (P5.1),
  #     `exercises` es una lista COMPARTIDA usada en cada ronda → consistencia por
  #     construcción (invariante del modelo "mismas N cada ronda"). Detectar divergencia
  #     por-ronda exige un grid 2D (ronda×ejercicio) que se recomendó diferir; sin él la
  #     condición es vacua. NO se implementa tautológica.
  #   · mep_exercises_inconsistent_across_rounds: RESUELTO en P6.3 como validador sobre
  #     round_exercises (campo opcional, poblado por v3/import). Decisión de diseño: NO
  #     grid 2D en el editor (añadir expresividad de error a un caso invariante = valor
  #     negativo). El editor sigue con lista compartida; el validador chequea otros orígenes.
  # ==========================================================================
  # (Entrada mep_exercises_inconsistent_across_rounds retirada; resuelta en P6.3.)
  # P5.2 — el grafo de variaciones/regresión del catálogo (variations[] con
  # mechanical_demand_delta, aristas cross-ejercicio) NO está embebido en DATA del
  # prescriptor (solo mdi/tpr/implement/name por ejercicio). Validar que cada
  # transición i→i+1 sea descenso de escalera (misma exercise) o arista de regresión
  # con el mecanismo declarado exige (a) ese grafo embebido y (b) un helper pairwise
  # de grafo. demand_not_decreasing ya cubre el descenso por demanda; el path-check
  # estricto necesita el embedding. Candidato al sub-fase de embedding de catálogo.
  - id: mechanical_drop_progression_invalid_path
    disposition: needs_catalog_graph_embedding
    reason: "grafo de variaciones/regresión (mechanical_demand_delta, aristas) no embebido en DATA; chequeo pairwise de grafo. demand_not_decreasing cubre el descenso por demanda"
  # Diferidos al sub-fase de editores estructurados (v0.2): su INPUT no se captura
  # en v0.1 (carga/rotación viven en work_unit, no en params).
  #   · tabata_load_too_high_for_duration → RESUELTO en P6.2: el work_unit ya captura
  #     load_pct_1rm; regla any(components where load_pct_1rm>50), umbral recalibrable.
  #     (Entrada retirada.)
  - id: emom_alternating_rotation_empty
    disposition: implemented_p54
    reason: "RESUELTO en P5.4: exercises_rotation lo captura el editor unificado vía wuArrayKey(emom/alternating); regla F1 count(exercises_rotation)<2 compilada. (Entrada conservada como registro histórico.)"
  # Drop/wont_implement: no mapea al dominio. El 'total de reps' en cluster es
  # DERIVADO (reps_per_cluster × clusters_per_set); no existe declarado independiente.
  # Inventar un param sería crear segunda fuente de verdad para algo derivado.
  - id: cluster_total_reps_inconsistent
    disposition: wont_implement
    reason: "total derivado por definición; sin declarado, la condición es tautológica"

  # ==========================================================================
  # P5.5–P5.8 — cierre de los flags missing restantes. Tres categorías honestas:
  #
  # (1) VACUOS POR FALTA DE CAMPO DECLARADO → RESUELTOS EN P6.1 (editor v0.2.x).
  #     family y zone ahora SÍ se capturan (family auto-read-only desde variante; zone
  #     editable-con-default). complex_family_mismatch_with_variant (impl) y
  #     zone_declared_inconsistent_with_inferred (partial) quedaron IMPLEMENTADOS.
  #     (Entradas retiradas; conservado el registro histórico de por qué eran vacuos.)
  #
  # (2) DRIFT HEURÍSTICO DIFUSO — RESUELTO EN V3.6 (sesión 24). Los 4 flags de
  #     'los parámetros SUGIEREN otra familia/variante' se implementaron: 3 como
  #     detección de patrón con umbral duro (slc_resembles / superset_resembles /
  #     complex_resembles_french_contrast) y 1 (complex_likely_misclassified_as_family)
  #     como argmax difuso sobre familias reusando el scorer de classify_zone (P3.3).
  #     Son validador puro (informational, NO v3_constraint): observan el drift, no
  #     lo bloquean; el generador no los produce por construcción (atestiguado por
  #     el test de invariante del generador, sin autochequeo).
  #     (Entradas retiradas; el registro histórico de por qué se difirieron queda en
  #     §5m del PROJECT_STATE.)
  #
  # (3) MOTOR DE FUERZA RELATIVA T5 — RESUELTO EN P7 (sesión 15). slc_load_exceeds_weakest_link
  #     ya era escalar (P5.8). Los otros 3 (slc_weakest_link_misidentified / low_confidence,
  #     ratio_composition_possibly_imprecise) SE IMPLEMENTARON: P7.1 embebió el grafo de
  #     fuerza en DATA, P7.2 construyó el motor (__H._weakest/_rel1rm), P7.3 añadió el ancla
  #     declarada (weakest_link_ref), P7.4 cableó los 3 flags (gateados en ancla declarada).
  #     Entradas de deferral retiradas. (Registro histórico: antes vacuos por falta de motor
  #     + ancla; ambos ya existen.)


  # ==========================================================================
  # DISPOSICIÓN DEL ROSTER T2 (P3.2.0 → cerrada en P3.3 y P4.4) — registro durable.
  # T2 nominal=12: 5 escalares implementadas en P3.2; cluster_size_exceeds_zone_reps
  # en P3.3 (re-tier T3); y las 7 de estimación de duración (chipper/complex/tcc/
  # circuit) + emom_work_too_light en P4.4 (F6, block-helpers de duración). Todas
  # sus entradas retier se RETIRARON al implementarse. El roster T2 queda cerrado.
  # (tabata_load_too_high_for_duration sigue en el roster T1 arriba: defer_editors.)

  # ==========================================================================
  # DISPOSICIÓN DE LA MIGRACIÓN (P3.4.0 → actualizada en P4.1, P4.2 y P4.3).
  # 30 reglas hardcoded. P3.4 migró 9 escalares-puras. P4.1 las 6 F3 (EXISTS),
  # P4.2 las F1/F2/F4/F5 (COUNT/COUNT-WHERE/ROLE-PRESENCE/DISTINCT), P4.3 las 3
  # EMOM-density (F6, helper-sobre-array). Sus entradas retier_T4 se RETIRARON al
  # implementarse. Queda diferido solo el case 2 de slc (constante por-variante).
  # ==========================================================================
  # --- slc_implement_heterogeneous CASE 2 (P4.2): homogéneo pero implemento !=
  # el requerido por la variante (olympic→barbell, kb_flow→kettlebell, mace_flow→mace).
  # El case 1 (heterogéneo) YA se compila (rules). Case 2 exige una tabla de
  # constante requerida-por-variante (o 3 reglas variant-scoped → proliferación
  # 4 reglas→1 flag). Difiere hasta un mecanismo de constante por-variante en el
  # compilador (candidato P4.x); por ahora fidelity:partial del rule compilado.
  - id: slc_implement_required_mismatch
    disposition: defer_const_table
    reason: "homogéneo-pero-implemento-incorrecto: necesita constante requerida-por-variante, fuera de F5 DISTINCT"

# ============================================================================
# ENGINE_RULES (P3.4) — mapping-only. El motor de rangos genérico (rangeFlags)
# itera params_schema y NO es una regla declarativa: NO tiene `when`, NO se
# compila a closure. Existe SOLO para que coverage_report.py derive la cobertura
# de estas 4 emisiones desde YAML (fin del regex sobre COVERAGE_MAP). El
# compilador las valida (E2/E3) y las copia a compiled_rules.yaml::engine_rules.
# ============================================================================
engine_rules:
  - id: param_required_missing
    emits: [amrap_time_cap_missing, amrap_rep_cap_missing]
    fidelity: implemented
  - id: param_type_invalid
    emits: null            # sanitización de input; sin flag de spec (único null legítimo)
    fidelity: implemented
  - id: param_out_of_extended_range
    emits: [cluster_variant_params_inconsistent, drop_variant_params_inconsistent,
            rp_variant_params_inconsistent, amrap_variant_params_inconsistent,
            pyramid_variant_params_inconsistent, emom_variant_params_inconsistent,
            contrast_variant_params_inconsistent, complex_variant_params_inconsistent,
            emom_interval_too_short, contrast_transition_too_short,
            cluster_intra_rest_too_long, rp_rest_too_long]
    fidelity:
      cluster_intra_rest_too_long: partial
      rp_rest_too_long: partial
      _default: implemented
  - id: param_out_of_canonical_range
    emits: [cluster_intra_rest_too_short, cluster_load_too_low_for_quality,
            drop_initial_load_too_low, drop_initial_load_too_high,
            drop_count_excessive, rp_activation_load_too_low,
            rp_activation_load_too_high, rp_rest_too_short,
            amrap_load_too_low, amrap_load_too_high,
            emom_duration_too_long, emom_interval_too_long,
            contrast_transition_too_long]
    fidelity: partial

  # --- Reglas AÚN HARDCODED en el template (emisiones del engine + EMOM density
  # → P4.3). No se compilan (emisiones inline o iteran work_per_interval), pero
  # SIGUEN VIVAS y acreditan cobertura. Mapping-only (mismo mecanismo que el motor
  # de rangos) para que la matriz refleje la realidad sin regex sobre el template.
  # P4.1 migró las 6 F3; P4.2 migró F1/F2/F4/F5 (components_insufficient ×split,
  # contrast_pairing_invalid, contrast_pairs_unbalanced, component_exercise_duplicated,
  # slc_implement_heterogeneous, variant_structure_incomplete); P4.3 migró las 3
  # EMOM density (F6: emom_work_undefined, emom_density_impossible/high) — todas
  # salieron de aquí. Queda el motor de rangos (param_*) + 3 emisiones inline.
  - id: block_without_exercise
