<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prescriptor v2 · taxonomy-v2</title>
<style>
  :root{
    --bg:#16181d; --panel:#1e2127; --raised:#262a31; --border:#32363e; --border-soft:#2a2e35;
    --text:#e8e6e1; --muted:#9a9789; --faint:#6b6a63;
    --accent:#7fb4c9; --accent-dim:#4d7a8c;
    --ok:#5cb176; --info:#d9a430; --hard:#e05252; --viab:#e07a3a;
    --mono:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
    --sans:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px;line-height:1.45;overflow:hidden}
  button{font-family:inherit;cursor:pointer;border:1px solid var(--border);background:var(--raised);color:var(--text);border-radius:4px;padding:5px 10px;font-size:12.5px}
  button:hover{border-color:var(--accent-dim)}
  button:focus-visible,input:focus-visible,select:focus-visible{outline:2px solid var(--accent);outline-offset:1px}
  button.primary{background:var(--accent-dim);border-color:var(--accent-dim);color:#fff}
  button.primary:hover{background:var(--accent);color:#10222b}
  button.ghost{background:transparent;border-color:transparent;color:var(--muted)}
  button.ghost:hover{color:var(--text);border-color:var(--border)}
  input,select,textarea{background:var(--bg);border:1px solid var(--border);color:var(--text);border-radius:4px;padding:5px 8px;font-size:13px;font-family:var(--mono)}
  select{font-family:var(--sans)}
  input[type=number]{width:100%}
  .eyebrow{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--faint);font-weight:600}

  /* ===== Layout ===== */
  #app{display:grid;grid-template-rows:52px 1fr;height:100vh}
  header{display:flex;align-items:center;gap:16px;padding:0 16px;border-bottom:1px solid var(--border);background:var(--panel)}
  header .brand{font-family:var(--mono);font-weight:700;font-size:14px;letter-spacing:.04em}
  header .brand b{color:var(--accent)}
  header .sess{display:flex;align-items:center;gap:8px;flex:1}
  header .sess input[type=text]{font-family:var(--sans);font-weight:600;width:280px}
  main{display:grid;grid-template-columns:280px 1fr 360px;min-height:0}
  .col{overflow-y:auto;min-height:0}
  #col-blocks{border-right:1px solid var(--border);background:var(--panel);padding:12px}
  #col-editor{padding:18px 22px}
  #col-validation{border-left:1px solid var(--border);background:var(--panel);padding:14px;display:flex;flex-direction:column;gap:12px}

  /* ===== Blocks list ===== */
  .block-card{border:1px solid var(--border);border-radius:6px;background:var(--raised);padding:9px 10px;margin-bottom:8px;cursor:pointer;position:relative}
  .block-card:hover{border-color:var(--accent-dim)}
  .block-card.active{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent)}
  .block-card .bc-top{display:flex;align-items:center;gap:7px}
  .block-card .bc-n{font-family:var(--mono);font-size:11px;color:var(--faint)}
  .block-card .bc-method{font-family:var(--mono);font-size:12px;font-weight:700}
  .block-card .bc-ex{font-size:12px;color:var(--muted);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .block-card .bc-dot{width:8px;height:8px;border-radius:50%;margin-left:auto;flex:none}
  .dot-ok{background:var(--ok)} .dot-info{background:var(--info)} .dot-hard{background:var(--hard)} .dot-viab{background:var(--viab)}
  .bc-actions{display:flex;gap:4px;margin-top:6px}
  .bc-actions button{padding:2px 7px;font-size:11px}

  /* ===== Editor ===== */
  .ed-section{margin-bottom:20px}
  .ed-section>.eyebrow{display:block;margin-bottom:8px}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px 14px}
  .grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px 14px}
  .field label{display:block;font-size:11.5px;color:var(--muted);margin-bottom:3px;font-family:var(--mono)}
  .field .hint{font-size:10.5px;color:var(--faint);font-family:var(--mono);margin-top:3px}
  .field .hint b{color:var(--muted);font-weight:600}
  .field select,.field input{width:100%}
  .variant-desc{font-size:12px;color:var(--muted);border-left:2px solid var(--border);padding:4px 10px;margin-top:8px}
  .ex-picker{position:relative}
  .ex-results{position:absolute;z-index:30;top:100%;left:0;right:0;max-height:260px;overflow-y:auto;background:var(--raised);border:1px solid var(--border);border-radius:0 0 6px 6px;display:none}
  .ex-results.open{display:block}
  .ex-item{padding:7px 10px;cursor:pointer;display:flex;gap:8px;align-items:baseline;border-bottom:1px solid var(--border-soft)}
  .ex-item:hover{background:var(--panel)}
  .ex-item .xi-name{font-weight:600;font-size:13px}
  .ex-item .xi-meta{font-family:var(--mono);font-size:10.5px;color:var(--faint);margin-left:auto;white-space:nowrap}
  .ex-chip{display:inline-flex;align-items:center;gap:8px;background:var(--raised);border:1px solid var(--border);border-radius:5px;padding:6px 10px;font-size:13px}
  .ex-chip .xc-meta{font-family:var(--mono);font-size:10.5px;color:var(--faint)}
  .components-list{display:flex;flex-direction:column;gap:8px}
  .comp-row{display:grid;grid-template-columns:1fr 110px 90px 30px;gap:8px;align-items:end;border:1px solid var(--border-soft);border-radius:6px;padding:8px;background:var(--raised)}
  .wu-row{display:grid;grid-template-columns:1fr 92px 1fr 1.2fr 30px;gap:8px;align-items:end;border:1px solid var(--border-soft);border-radius:6px;padding:8px;background:var(--raised)}
  .wu-row .wu-ex{min-width:0}
  .wu-pair{display:flex;gap:4px;align-items:center}
  .wu-pair select{flex:1 1 auto;min-width:0}
  .wu-pair input{flex:1 1 60px;min-width:0}
  .empty-state{color:var(--faint);font-size:13px;border:1px dashed var(--border);border-radius:8px;padding:28px;text-align:center;margin-top:30px}

  /* ===== Validation panel ===== */
  #seal{border:1px solid var(--border);border-radius:8px;padding:14px;text-align:center;background:var(--raised);transition:border-color .25s}
  #seal .s-verdict{font-family:var(--mono);font-weight:800;font-size:16px;letter-spacing:.08em}
  #seal .s-sub{font-size:11px;color:var(--muted);margin-top:3px;font-family:var(--mono)}
  #seal.s-ok{border-color:var(--ok)} #seal.s-ok .s-verdict{color:var(--ok)}
  #seal.s-info{border-color:var(--info)} #seal.s-info .s-verdict{color:var(--info)}
  #seal.s-warn{border-color:var(--viab)} #seal.s-warn .s-verdict{color:var(--viab)}
  #seal.s-hard{border-color:var(--hard)} #seal.s-hard .s-verdict{color:var(--hard)}
  @keyframes pulse{0%{transform:scale(1)}40%{transform:scale(1.018)}100%{transform:scale(1)}}
  #seal.pulse{animation:pulse .3s ease}
  @media (prefers-reduced-motion: reduce){#seal.pulse{animation:none}}
  #flags{display:flex;flex-direction:column;gap:8px;overflow-y:auto}
  .flag{border:1px solid var(--border);border-left-width:3px;border-radius:6px;padding:9px 11px;background:var(--raised)}
  .flag .f-id{font-family:var(--mono);font-size:10.5px;letter-spacing:.05em;margin-bottom:3px}
  .flag .f-msg{font-size:12.5px}
  .flag .f-sugg{font-size:11.5px;color:var(--muted);margin-top:5px;padding-top:5px;border-top:1px dashed var(--border-soft)}
  .flag .f-sugg::before{content:"→ ";color:var(--accent-dim)}
  .flag.sev-informational{border-left-color:var(--info)} .flag.sev-informational .f-id{color:var(--info)}
  .flag.sev-viability{border-left-color:var(--viab)} .flag.sev-viability .f-id{color:var(--viab)}
  .flag.sev-hard{border-left-color:var(--hard)} .flag.sev-hard .f-id{color:var(--hard)}
  .flag .f-scope{float:right;font-family:var(--mono);font-size:10px;color:var(--faint)}
  .no-flags{color:var(--faint);font-size:12.5px;text-align:center;padding:18px;font-family:var(--mono)}

  /* ===== Modal ===== */
  #modal{position:fixed;inset:0;background:rgba(10,11,14,.7);display:none;align-items:center;justify-content:center;z-index:100}
  #modal.open{display:flex}
  #modal .m-box{background:var(--panel);border:1px solid var(--border);border-radius:10px;width:min(760px,92vw);max-height:86vh;display:flex;flex-direction:column}
  #modal .m-head{display:flex;align-items:center;padding:12px 16px;border-bottom:1px solid var(--border)}
  #modal textarea{flex:1;min-height:380px;margin:14px 16px;font-size:12px;line-height:1.5;resize:vertical}
  #modal .m-foot{display:flex;gap:8px;padding:0 16px 14px;justify-content:flex-end}
  .toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);background:var(--raised);border:1px solid var(--accent-dim);border-radius:6px;padding:8px 16px;font-size:12.5px;z-index:200;opacity:0;transition:opacity .25s;pointer-events:none}
  .toast.show{opacity:1}
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="brand">PRESCRIPTOR <b>v2</b> <span style="color:var(--faint);font-weight:400">· v0.1</span></div>
    <div class="sess">
      <span class="eyebrow">Sesión</span>
      <input type="text" id="session-name" value="Sesión sin título" aria-label="Nombre de la sesión">
      <select id="session-intent" aria-label="Intent de la sesión">
        <option value="">intent global —</option>
      </select>
    </div>
    <button id="btn-import" class="ghost">Importar JSON</button>
    <button id="btn-export-json" class="ghost">Exportar JSON</button>
    <button id="btn-export" class="primary">Exportar YAML</button>
  </header>
  <main>
    <div class="col" id="col-blocks">
      <div class="eyebrow" style="margin-bottom:10px">Bloques de la sesión</div>
      <div id="blocks-list"></div>
      <button id="btn-add-block" class="primary" style="width:100%;margin-top:4px">+ Agregar bloque</button>
    </div>
    <div class="col" id="col-editor">
      <div id="editor-empty" class="empty-state">Agrega un bloque para empezar a prescribir.<br><span style="font-family:var(--mono);font-size:11px">método → variante → ejercicio → parámetros</span></div>
      <div id="editor" style="display:none"></div>
    </div>
    <div class="col" id="col-validation">
      <div class="eyebrow">Validación en vivo</div>
      <div id="seal" class="s-ok" role="status">
        <div class="s-verdict">—</div>
        <div class="s-sub">—</div>
      </div>
      <div id="flags"></div>
    </div>
  </main>
</div>
<div id="modal" role="dialog" aria-modal="true">
  <div class="m-box">
    <div class="m-head"><span class="eyebrow" id="m-title">Export</span><button class="ghost" style="margin-left:auto" onclick="closeModal()">✕ Cerrar</button></div>
    <textarea id="m-text" spellcheck="false"></textarea>
    <div class="m-foot">
      <button id="m-action" class="primary">Copiar</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
/*__DATA__*/

/* ================= State ================= */
const S = { name:'Sesión sin título', intent:'', blocks:[], activeIdx:-1 };
const MULTI = new Set(['contrast','complex']);
/* Métodos cuyo TRABAJO vive en arrays de work_units (components / work_per_interval /
   exercises_rotation), NO en el escalar b.exercise. block_without_exercise no aplica a
   ellos: su "ejercicio" se declara por work_unit. emom se suma a contrast/complex aquí
   (su schema no tiene exercise a nivel bloque — V3.1.5). MULTI se mantiene para los usos
   de UI (label de tarjeta / seed de components), que son específicos de contrast/complex. */
const WORK_ARRAY_METHODS = new Set(['contrast','complex','emom']);
/* v0.2.0 — métodos cuyo trabajo es una LISTA de work_units (editor unificado).
   El nombre del array difiere por método; el editor opera sobre b[wuArrayKey(b)]. */
const WU_LIST = new Set(['contrast','complex','emom']);   // tienen lista de work_units
function wuArrayKey(b){
  if (b.method==='emom') return b.variant==='alternating' ? 'exercises_rotation' : 'work_per_interval';
  return 'components';
}
function wuList(b){ return b[wuArrayKey(b)] || []; }
function hasWUList(b){ return WU_LIST.has(b.method); }

/* work_unit canónico (taxonomy_v2.yaml::work_unit.base_fields), subconjunto editable v0.2.0.
   3 métricas de trabajo coexistentes en el schema, pero capturamos UNA (selector); combinación
   multi-métrica → MARCA v0.2.1. load_metric enum de 6 valores con input de carga adaptativo. */
const WU_WORK_METRICS = ['reps','duration_sec','distance_m'];
const WU_LOAD_METRICS = ['percent_1rm','absolute_load','bodyweight','time','distance','none'];
function newWorkUnit(){
  return { exercise:null, role:'',
           work_metric:'reps', work_value:'',
           load_metric:'percent_1rm', load_pct_1rm:null, load_value:null, load_unit:'',
           /* P5.3 — AGS: estructura de pareo (solo se edita/exporta en antagonist_giant_set) */
           pair_index:null, role_in_pair:'' };
}
/* Shim de lectura (decisión 3): work_units viejos con `reps` plano (golden de sesión 5,
   import JSON pre-v0.2) → forma canónica, sin romper round-trip. Idempotente. */
function normalizeWU(c){
  const wu = Object.assign(newWorkUnit(), c||{});
  if (c && c.work_metric === undefined){
    // work_unit viejo/importado: una métrica canónica como campo suelto → work_metric/work_value
    for (const wm of WU_WORK_METRICS){
      if (c[wm]!=='' && c[wm]!=null){ wu.work_metric = wm; wu.work_value = c[wm]; break; }
    }
  }
  if (c && c.exercise===undefined && c.exercise_ref!==undefined) wu.exercise = c.exercise_ref;
  if (!WU_WORK_METRICS.includes(wu.work_metric)) wu.work_metric = 'reps';
  if (!WU_LOAD_METRICS.includes(wu.load_metric)) wu.load_metric = 'percent_1rm';
  // P5.3 — pair_index numérico o null; role_in_pair string ('' = sin declarar)
  wu.pair_index = (wu.pair_index===''||wu.pair_index==null) ? null : Number(wu.pair_index);
  if (wu.role_in_pair==null) wu.role_in_pair = '';
  return wu;
}
function normalizeBlockWUs(b){
  const k = wuArrayKey(b);
  if (Array.isArray(b[k])) b[k] = b[k].map(normalizeWU);
}

/* ===== P5.1 (D2/D5) — editor de RAMPA explícita por-set/por-ronda =====
   Captura la progresión como array PLANO {load_pct_1rm, reps} (decisión P5 nº2:
   estructura de prescripción declarada explícita, no work_unit canónico). Solo
   ACTIVO en load_progression == 'custom': en linear/geometric la rampa se genera
   monótona por construcción y la dirección la cubre pyramid_inverse_relation_violated
   → el flag de monotonía es inerte (Invariante A salvo: defaults son linear).
   - pyramid ascending/descending → b.set_ramp (por-set)
   - pyramid multi_exercise_pyramid → b.round_plan (por-ronda) */
const RAMP_VARIANTS = { set_ramp:['ascending','descending'], round_plan:['multi_exercise_pyramid'] };
function rampKey(b){
  if (b.method!=='pyramid') return null;
  if (RAMP_VARIANTS.set_ramp.includes(b.variant)) return 'set_ramp';
  if (RAMP_VARIANTS.round_plan.includes(b.variant)) return 'round_plan';
  return null;
}
function rampActive(b){ return !!rampKey(b) && b.params && b.params.load_progression === 'custom'; }
function newRampStep(){ return { load_pct_1rm:null, reps:null }; }
function normalizeRampStep(s){
  const r = newRampStep(); if (!s) return r;
  r.load_pct_1rm = (s.load_pct_1rm===''||s.load_pct_1rm==null)?null:Number(s.load_pct_1rm);
  r.reps         = (s.reps===''||s.reps==null)?null:Number(s.reps);
  return r;
}
function normalizeRamp(b){
  const rk = rampKey(b); if (!rk) return;
  if (!Array.isArray(b[rk])) b[rk] = [];
  b[rk] = b[rk].map(normalizeRampStep);
}
/* Semilla: al pasar a custom con rampa vacía, interpola lineal desde los escalares
   first/last + count de la variante (punto de partida monótono, editable). */
function seedRamp(b){
  const rk = rampKey(b); if (!rk) return;
  if (Array.isArray(b[rk]) && b[rk].length) return;
  const p = b.params||{};
  const isRound = rk==='round_plan';
  const n  = Number(isRound ? p.rounds_count : p.sets_count) || 0;
  const lo = Number(isRound ? p.first_round_load_pct_1rm : p.first_set_load_pct_1rm);
  const hi = Number(isRound ? p.last_round_load_pct_1rm  : p.last_set_load_pct_1rm);
  const rlo= Number(isRound ? p.first_round_reps : p.first_set_reps);
  const rhi= Number(isRound ? p.last_round_reps  : p.last_set_reps);
  const steps=[];
  for (let i=0;i<n;i++){
    const t = n>1 ? i/(n-1) : 0;
    steps.push({ load_pct_1rm: isFinite(lo)&&isFinite(hi)? Math.round(lo+(hi-lo)*t):null,
                 reps:         isFinite(rlo)&&isFinite(rhi)? Math.round(rlo+(rhi-rlo)*t):null });
  }
  b[rk] = steps.length ? steps : [newRampStep(), newRampStep()];
}

/* ===== P5.2 — editor de PROGRESIÓN MECÁNICA (mechanical_drop) =====
   array<mechanical_step>. Internamente cada paso usa `exercise` (no exercise_ref)
   para compatibilidad total con la maquinaria de catálogo del compilador (catalog(c),
   distinct_count(...exercise), MDI); el export emite `exercise_ref`. Demanda efectiva
   = difficulty_index_override declarado, o el MDI del catálogo si no se declara. */
function mechKey(b){ return (b.method==='drop' && b.variant==='mechanical_drop') ? 'mechanical_progression' : null; }
function newMechStep(){ return { exercise:null, exercise_name:'', variation_descriptor:'', difficulty_index_override:null }; }
function normalizeMechStep(s){
  const r = newMechStep(); if (!s) return r;
  if (s.exercise===undefined && s.exercise_ref!==undefined) r.exercise = s.exercise_ref;
  else r.exercise = (s.exercise===undefined?null:s.exercise);
  r.exercise_name = s.exercise_name||'';
  r.variation_descriptor = s.variation_descriptor||'';
  r.difficulty_index_override = (s.difficulty_index_override===''||s.difficulty_index_override==null)?null:Number(s.difficulty_index_override);
  return r;
}
function normalizeMech(b){
  const mk = mechKey(b); if (!mk) return;
  if (!Array.isArray(b[mk])) b[mk] = [];
  b[mk] = b[mk].map(normalizeMechStep);
}
let uid = 1;

function newBlock(){
  const mid = Object.keys(DATA.methods)[0];
  return { id:'b'+(uid++), method:mid, variant:Object.keys(DATA.methods[mid].variants)[0],
           exercise:null, components:[], work_per_interval:[], exercises_rotation:[], set_ramp:[], round_plan:[], mechanical_progression:[], round_exercises:[], intent_declared:'', family:'', zone:'', params:{} , _touched:{} };
}
function variantOf(b){ return DATA.methods[b.method].variants[b.variant]; }
function applyDefaults(b){
  const v = variantOf(b); b.params = {};
  for (const [k,spec] of Object.entries(v.params_schema||{})){
    if (isStructural(k,spec)) continue;
    b.params[k] = (v.defaults && v.defaults[k] !== undefined) ? v.defaults[k] : (spec.default !== undefined ? spec.default : '');
  }
  // P6.1 — family es DETERMINISTA por variante (declared immutability, schema §3):
  // se auto-fija read-only desde la variante; el validador la compara contra cualquier
  // family declarada (bloques de v3/import) vía complex_family_mismatch_with_variant.
  b.family = (v && v.family != null) ? v.family : '';
}

/* ================= Validation engine (declarative-style) ================= */
/* Tipos de parámetro:
   numéricos (integer/number/float/percent) → input number + validación de rangos
   enum → select · boolean → select true/false · string/array<*> → texto libre (v0.1)
   ESTRUCTURALES (components, work_per_interval: array<work_unit>/object) → se editan
   con el editor de componentes, NUNCA en el formulario ni en rangeFlags. */
const NUMERIC_T = new Set(['integer','number','float','percent']);
function isStructural(k,spec){ return k==='components' || k==='work_per_interval' ||
  /work_unit|mechanical_step|exercise_ref/.test(spec.type||''); }
  /* arrays estructurados (mechanical_step, exercise_ref) = editores dedicados v0.2 */
function isNumeric(spec){ return NUMERIC_T.has(spec.type||'number'); }

function rangeFlags(b, bi){
  const out = []; const v = variantOf(b);
  for (const [k,spec] of Object.entries(v.params_schema||{})){
    if (isStructural(k,spec)) continue;
    const val = b.params[k];
    if (val === '' || val === null || val === undefined){
      if (spec.required) out.push(F('param_required_missing','hard',bi,
        `Parámetro requerido sin valor: ${k}.`, `Completa ${k} (default: ${spec.default ?? '—'}).`));
      continue;
    }
    if (!isNumeric(spec)) continue;   // enum/bool/string/array: sin validación de rango en v0.1
    const n = Number(val);
    if (spec.type==='integer' && !Number.isInteger(n))
      out.push(F('param_type_invalid','hard',bi,`${k} debe ser entero (valor: ${val}).`,`Usa un entero dentro de [${spec.range_extended?.min}–${spec.range_extended?.max}].`));
    const re = spec.range_extended, rc = spec.range_canonical;
    if (re && (n < re.min || n > re.max))
      out.push(F('param_out_of_extended_range','hard',bi,
        `${k}=${n} fuera del rango extendido [${re.min}–${re.max}].`,
        `El método no está definido fuera de ese rango; ajusta ${k}.`));
    else if (rc && (n < rc.min || n > rc.max))
      out.push(F('param_out_of_canonical_range','informational',bi,
        `${k}=${n} fuera del rango canónico [${rc.min}–${rc.max}] (extendido ok).`,
        `Atípico pero válido: confirma que es intencional.`));
  }
  return out;
}

];

const DRIFT_RULES = [];

/* P2: COVERAGE_MAP DISUELTO en P3.4. El mapping motor→spec ya no vive aquí:

/* ================= P3: reglas compiladas desde rules/prescriptor_rules.yaml =====
   Inyectadas por tools/rule_compiler.py (vía build_prescriptor.py). Misma forma
   {id,sev,applies,test,msg,sugg} que las arrays hardcoded — fin de la
   reimplementación manual. NO editar: regenerar con el build. */
/*__ESTIMATION_HELPERS__*/
/*__COMPILED_RULES__*/

function F(id,sev,scope,msg,sugg,level){ return {id,severity:sev,scope,message:msg,suggestion:sugg,level:level||null}; }

/* Coherencia (decisión arquitectónica §3): overall_coherent=false ⟺ hard OR viability.hard_fail.
   level: warning_mild < warning_strong < hard_fail. Solo hard_fail rompe; null no rompe. */
function breaksCoherence(f){ return f.severity==='hard' || (f.severity==='viability' && f.level==='hard_fail'); }
function isViabWarn(f){ return f.severity==='viability' && f.level!=='hard_fail'; }
/* Clase visual: una viability hard_fail se muestra como hard (es crítica). */
function displaySev(f){ return (f.severity==='viability' && f.level==='hard_fail') ? 'hard' : f.severity; }

function validateBlock(b, bi){
  // P4.1 — normalización defensiva en la frontera del motor: cualquier bloque que
  // entre (UI, import, test, generador v3) se valida en forma canónica de work_units,
  // sea cual sea su formato de origen (reps plano pre-v0.2.0 → work_metric/work_value).
  // Sin mutar el bloque del caller: copia superficial + array de work_units clonado.
  const k = wuArrayKey(b);
  if (Array.isArray(b[k])){
    b = Object.assign({}, b);
    b[k] = b[k].map(normalizeWU);
  }
  // P5.1 — normalización de rampa en la frontera (igual filosofía que work_units):
  // las reglas leen b.set_ramp/b.round_plan en forma {load_pct_1rm, reps} numérica.
  const rk = rampKey(b);
  if (rk && Array.isArray(b[rk])){
    if (b===arguments[0]) b = Object.assign({}, b);   // copia si aún no se clonó
    b[rk] = b[rk].map(normalizeRampStep);
  }
  // P5.2 — normalización de la progresión mecánica en la frontera.
  const mk = mechKey(b);
  if (mk && Array.isArray(b[mk])){
    if (b===arguments[0]) b = Object.assign({}, b);
    b[mk] = b[mk].map(normalizeMechStep);
  }
  let flags = rangeFlags(b, bi);
  const COMPILED = (typeof COMPILED_RULES !== 'undefined') ? COMPILED_RULES : [];
  for (const r of [...STRUCT_RULES, ...DRIFT_RULES, ...COMPAT_RULES, ...COMPILED]){
    try{ if (r.applies(b) && r.test(b)) flags.push(F(r.id, r.sev, bi, r.msg(b), r.sugg(b), r.level)); }
    catch(e){ /* rule guard */ }
  }
  if (!b.intent_declared) flags.push(F('intent_not_declared','hard',bi,
    'intent_declared sin valor — se declara, nunca se infiere.',
    'Declara el intent del bloque (inmutabilidad histórica del sistema).'));
  return flags;
}
/* ---- V3.3: fitness function de SESIÓN (orden + interferencia intra-sesión) ----
   Reglas a nivel sesión que el generador genSession debe satisfacer. Derivan
   del catálogo embebido (mdi/pattern/segment), sin hooks fn:* — mismo criterio
   declarativo que el resto del motor. Severidad informational (el coach puede
   overridear; v3_constraint para el generador). */

/* Ejercicios "primarios" de un bloque: el escalar (b.exercise) o los de sus
   arrays de trabajo (components / work_per_interval / exercises_rotation /
   exercises / mechanical_progression). Devuelve ids resolubles en DATA. */
function _sessionBlockExercises(b){
  const ids = [];
  if (b.exercise) ids.push(b.exercise);
  const arrays = ['components','work_per_interval','exercises_rotation','mechanical_progression'];
  for (const k of arrays){
    if (Array.isArray(b[k])) for (const it of b[k]) if (it && it.exercise) ids.push(it.exercise);
  }
  if (Array.isArray(b.params && b.params.exercises)) for (const e of b.params.exercises){ if (typeof e==='string') ids.push(e); }
  if (Array.isArray(b.exercises)) for (const e of b.exercises){ if (typeof e==='string') ids.push(e); }
  return ids.filter(id => DATA.exercises && DATA.exercises[id]);
}

/* Demanda neural de un bloque (MARCA-FIS, recalibrable). Combina la demanda
   mecánica del ejercicio (mdi, máx de los primarios) con un sesgo de zona: las
   zonas de fuerza máxima / potencia (Z1, Z2) van primero; las metabólicas /
   de conditioning (Z5, Z6) van al final. emom/circuit (conditioning) caen bajo. */
const _ZONE_NEURAL_BIAS = { Z1:2.0, Z2:1.6, Z3:1.2, Z4:1.0, Z5:0.7, Z6:0.5 };
function _neuralDemand(b){
  const ids = _sessionBlockExercises(b);
  let mdi = 0;
  for (const id of ids){ const e=DATA.exercises[id]; if (e && typeof e.mdi==='number' && e.mdi>mdi) mdi=e.mdi; }
  if (!mdi) mdi = 2.0;   // sin ejercicio resoluble: demanda neutra-baja
  const zid = (b.zone || (typeof b.params==='object' && b.params.target_zone)) || null;
  const bias = (zid && _ZONE_NEURAL_BIAS[zid]!=null) ? _ZONE_NEURAL_BIAS[zid] : 1.0;
  // emom/circuit son trabajo metabólico por naturaleza → tope de demanda bajo
  const condMethods = new Set(['emom','circuit']);
  const cond = condMethods.has(b.method) ? 0.6 : 1.0;
  return mdi * bias * cond;
}

/* Segmentos/patrones fatigantes compartidos entre dos bloques contiguos. */
function _sharedFatiguingDim(b1, b2){
  const dim = (b)=>{ const out={pat:new Set(),seg:new Set()};
    for (const id of _sessionBlockExercises(b)){ const e=DATA.exercises[id];
      if (e){ if(e.pattern) out.pat.add(e.pattern); if(e.segment) out.seg.add(e.segment); } }
    return out; };
  const a=dim(b1), c=dim(b2); const shared=[];
  for (const p of a.pat) if (c.pat.has(p)) shared.push('pattern:'+p);
  for (const s of a.seg) if (c.seg.has(s)) shared.push('segment:'+s);
  return shared;
}

/* Reglas de sesión: orden neural descendente + interferencia adyacente.
   bi se pasa como -1 (scope session, no de un bloque concreto). */
function sessionRules(blocks){
  const flags = [];
  if (blocks.length < 2) return flags;
  const demands = blocks.map(_neuralDemand);
  // session_block_order_suboptimal: algún bloque con MÁS demanda que uno anterior.
  // Tolerancia pequeña para no disparar por ruido de empate (MARCA-FIS).
  const TOL = 0.15;
  for (let i=1;i<blocks.length;i++){
    let maxPrev = 0; for (let j=0;j<i;j++) if (demands[j]>maxPrev) maxPrev=demands[j];
    if (demands[i] > maxPrev + TOL){
      const nm = (blocks[i].method||'?')+'/'+(blocks[i].variant||'?');
      flags.push(F('session_block_order_suboptimal','informational','session',
        'El bloque '+(i+1)+' ('+nm+') tiene mayor demanda neural que un bloque anterior — el orden no es descendente por demanda neural.',
        'Ordena los bloques por demanda neural descendente (máxima/potencia primero, metabólico/conditioning al final).'));
      break;   // un disparo por sesión basta (señal, no enumeración)
    }
  }
  // session_interference_adjacent: bloques contiguos con patrón/segmento compartido.
  for (let i=1;i<blocks.length;i++){
    const shared = _sharedFatiguingDim(blocks[i-1], blocks[i]);
    if (shared.length){
      flags.push(F('session_interference_adjacent','informational','session',
        'Bloques contiguos '+i+'→'+(i+1)+' comparten '+shared.join(', ')+' — posible interferencia intra-sesión que degrada la calidad del segundo.',
        'Separa los bloques fatigantes del mismo patrón/segmento, o acepta el solape deliberadamente.'));
      break;
    }
  }
  return flags;
}

function validateSession(){
  let flags = [];
  if (S.blocks.length===0) flags.push(F('session_empty','informational','session',
    'La sesión no tiene bloques.','Agrega al menos un bloque.'));
  S.blocks.forEach((b,i)=>{ flags = flags.concat(validateBlock(b,i)); });
  flags = flags.concat(sessionRules(S.blocks));
  const coherent = !flags.some(breaksCoherence);
  return {flags, coherent};
}

/* Versión PURA (no toca el estado global S): valida una lista de bloques como
   sesión. La usa el generador (genSession) como compuerta, igual que genBlock
   usa validateBlock. */
function validateSessionBlocks(blocks){
  let flags = [];
  if (!blocks || blocks.length===0) flags.push(F('session_empty','informational','session',
    'La sesión no tiene bloques.','Agrega al menos un bloque.'));
  (blocks||[]).forEach((b,i)=>{ flags = flags.concat(validateBlock(b,i)); });
  flags = flags.concat(sessionRules(blocks||[]));
  const coherent = !flags.some(breaksCoherence);
  return {flags, coherent};
}

/* ================= V3.3b — MOTOR DE VOLUMEN (nivel microciclo) =================
   week_structure_logic, nivel microciclo. Computa volumen fraccional efectivo
   por grupo muscular sobre una ventana de 7d, lo compara contra los landmarks
   RP-style (DATA.volume_landmarks), y emite los flags microcycle_plus de volumen,
   frecuencia y slots. Fuente de la fórmula: autoregulation_schema.yaml::volume_engine
   (embebido en DATA por el build). El motor NO reimplementa la spec: la lee.

   Un microciclo aquí = { slots?: [{slot_id, session_template_ref|null, ...}],
                          sessions: [ [block,...], ... ],          // bloques por sesión
                          frequency_targets?: map<pattern,{min,max}>,
                          days_span?: int (default 7) }.
   sessions es la lista materializada de sesiones (cada una su lista de bloques);
   slots es opcional (para microcycle_slot_unfilled). */

/* Sets efectivos que aporta UN bloque, según la tabla method_set_counting de la
   spec. Devuelve un número de "sets de trabajo" computables; 0 para conditioning.
   El umbral de set efectivo (rir<=4) se aplica con el rir resoluble del bloque. */
function _blockEffectiveSets(b){
  const rirMax = (DATA.volume_rir_max!=null) ? DATA.volume_rir_max : 4;
  // rir resoluble: rir reportado ?? rir objetivo (escalar) ?? rir del default.
  let rir = null;
  if (b.params && b.params.rir_reported!=null && b.params.rir_reported!=='') rir = +b.params.rir_reported;
  else if (b.params && b.params.rir_target!=null && b.params.rir_target!=='') rir = +b.params.rir_target;
  else if (b.rir!=null) rir = +b.rir;
  // Sin rir declarado: lo tratamos como trabajo efectivo (default de calidad), no lo excluimos.
  if (rir!=null && rir > rirMax) return 0;   // sets ligeros / técnica / approach: no cuentan

  const tbl = DATA.method_set_counting || {};
  const sets = (b.params && b.params.sets!=null && b.params.sets!=='') ? +b.params.sets : 1;
  switch (b.method){
    case 'straight':   return sets;                              // 1 per set
    case 'cluster':    return sets;                              // 1 per complete cluster set
    case 'amrap':      return 1;                                 // '1'
    case 'rest_pause': return 1.5 * sets;                        // 1.5 fixed (por set)
    case 'drop': {                                               // 1 + 0.5 per drop segment
      const drops = (b.params && b.params.drops_count!=null) ? +b.params.drops_count : 1;
      return (1 + 0.5 * Math.max(0, drops)) * sets;
    }
    case 'pyramid':    return sets;                              // 1 per set above threshold (proxy: sets)
    case 'contrast':   return (b.components||[]).length ? 1 : 1; // 1 per pair (explosive no aporta)
    case 'complex': {                                            // slc: 1/round; ilc: 1/comp/round
      const rounds = (b.params && b.params.rounds!=null) ? +b.params.rounds : 1;
      const ncomp = (b.components||[]).length || 1;
      const ilc = (b.variant && /independent|ilc|pairs/.test(b.variant));
      return ilc ? rounds * ncomp : rounds;
    }
    case 'emom':       return 0;                                 // conditioning bucket
    case 'circuit':    return 0;                                 // conditioning bucket
    default:           return sets;
  }
}

/* Reparte los sets efectivos de un bloque entre grupos musculares, con conteo
   fraccional (primary 1.0 / secondary 0.5). Devuelve { direct:{group:sets},
   indirect:{group:sets} } acumulables. Recorre los ejercicios primarios del
   bloque (mismos que usa la sesión). contrast: solo el componente heavy aporta
   volumen hipertrófico (la spec dice "explosive adds no hypertrophic volume"). */
function _blockMuscleVolume(b){
  const fr = DATA.volume_fractional || {primary:1.0, secondary:0.5};
  const sets = _blockEffectiveSets(b);
  const direct = {}, indirect = {};
  if (sets <= 0) return {direct, indirect};
  // ejercicios que aportan volumen: para contrast, solo el heavy.
  let ids;
  if (b.method==='contrast'){
    const heavy = (b.components||[]).filter(c => c.role==='heavy' || c.role==='heavy_strength');
    ids = heavy.map(c=>c.exercise).filter(Boolean);
    if (!ids.length) ids = _sessionBlockExercises(b).slice(0,1);  // fallback
  } else {
    ids = _sessionBlockExercises(b);
  }
  if (!ids.length) return {direct, indirect};
  const per = sets / ids.length;   // reparte los sets del bloque entre sus ejercicios
  for (const id of ids){
    const e = DATA.exercises[id]; if (!e) continue;
    for (const m of (e.muscles||[]))   direct[m]   = (direct[m]||0)   + per * fr.primary;
    for (const m of (e.secondary||[])) indirect[m] = (indirect[m]||0) + per * fr.secondary;
  }
  return {direct, indirect};
}

/* Agrega el volumen de TODAS las sesiones del microciclo por grupo muscular. */
function _microVolume(sessions){
  const direct = {}, indirect = {};
  for (const blocks of (sessions||[])){
    for (const b of (blocks||[])){
      const v = _blockMuscleVolume(b);
      for (const g in v.direct)   direct[g]   = (direct[g]||0)   + v.direct[g];
      for (const g in v.indirect) indirect[g] = (indirect[g]||0) + v.indirect[g];
    }
  }
  return {direct, indirect};
}

/* Frecuencia por patrón de movimiento sobre el microciclo: nº de SESIONES en que
   aparece cada patrón (frecuencia semanal estándar = sesiones que tocan el patrón,
   no nº de bloques). */
function _microPatternFrequency(sessions){
  const freq = {};
  for (const blocks of (sessions||[])){
    const seen = new Set();
    for (const b of (blocks||[])){
      for (const id of _sessionBlockExercises(b)){
        const e = DATA.exercises[id]; if (e && e.pattern) seen.add(e.pattern);
      }
    }
    for (const p of seen) freq[p] = (freq[p]||0) + 1;
  }
  return freq;
}

function _round1(x){ return Math.round(x*10)/10; }

/* Reglas de microciclo (función PURA). Emite los flags microcycle_plus de
   volumen / frecuencia / slots. Todos informational (los landmarks son
   population_defaults; flags_severity: informational_always en la spec). */
function microcycleRules(micro){
  micro = micro || {};
  const flags = [];
  const sessions = micro.sessions || [];
  const lm = DATA.volume_landmarks || {};

  // --- Volumen por grupo vs landmarks (MEV / MAV_high / MRV) + dominancia indirecta.
  const vol = _microVolume(sessions);
  const groups = new Set([...Object.keys(vol.direct), ...Object.keys(vol.indirect)]);
  for (const g of groups){
    const L = lm[g]; if (!L) continue;
    const d = vol.direct[g] || 0, ind = vol.indirect[g] || 0;
    const total = d + ind;
    // below MEV: volumen DIRECTO insuficiente (el directo es el que progresa el grupo).
    if (d < L.mev){
      flags.push(F('muscle_volume_below_mev','informational','microcycle_plus',
        g+' a '+_round1(d)+' sets efectivos/7d, bajo MEV ('+L.mev+').',
        'Estímulo insuficiente para progresar en '+g+'; considerar agregar volumen.'));
    } else if (total > L.mrv){
      flags.push(F('muscle_volume_exceeded_mrv','informational','microcycle_plus',
        g+' a '+_round1(total)+' sets efectivos/7d, sobre MRV ('+L.mrv+').',
        'Recuperación comprometida; insumo para redistribución o deload local.'));
    } else if (total > L.mav_high){
      flags.push(F('muscle_volume_approaching_mrv','informational','microcycle_plus',
        g+' cruzó MAV alto ('+_round1(total)+'/'+L.mav_high+' sets/7d).',
        'Zona productiva alta; vigilar recuperación.'));
    }
    // dominancia indirecta: >60% del volumen del grupo es indirecto.
    if (total > 0 && ind / total > 0.60 && total >= (L.mev||1)){
      flags.push(F('indirect_volume_dominant','informational','microcycle_plus',
        '>60% del volumen de '+g+' es indirecto ('+_round1(ind)+' de '+_round1(total)+' sets).',
        'Verificar si la dominancia indirecta es intencional.'));
    }
  }

  // --- Frecuencia por patrón vs frequency_targets.
  const ft = micro.frequency_targets || {};
  if (ft && Object.keys(ft).length){
    const freq = _microPatternFrequency(sessions);
    for (const p in ft){
      const t = ft[p] || {}; const actual = freq[p] || 0;
      if (t.min!=null && actual < t.min){
        flags.push(F('microcycle_frequency_below_target','informational','microcycle_plus',
          'Pattern '+p+' appears '+actual+'x, below target min '+t.min+'.',
          'Add a slot covering the pattern or lower the target.'));
      } else if (t.max!=null && actual > t.max){
        flags.push(F('microcycle_frequency_above_target','informational','microcycle_plus',
          'Pattern '+p+' appears '+actual+'x, above target max '+t.max+'.',
          'Reduce slots or raise the target.'));
      }
    }
  }

  // --- Slots sin session_template (draft ok; warning al publicar).
  for (const s of (micro.slots || [])){
    const ref = (s.session_template_ref!==undefined) ? s.session_template_ref : s.session_template;
    if (ref==null){
      flags.push(F('microcycle_slot_unfilled','informational','microcycle_plus',
        'Slot '+(s.slot_id||s.name||'?')+' has no session_template (draft ok, published warning).',
        'Fill the slot before publishing.'));
    }
  }
  return flags;
}

/* Versión PURA que valida un microciclo como compuerta del generador (genMicro),
   análoga a validateSessionBlocks. Incluye la coherencia de cada sesión Y las
   reglas de microciclo. coherent = ninguna sesión rompe coherencia (los flags de
   microciclo son todos informational → nunca rompen). */
function validateMicrocycleBlocks(micro){
  micro = micro || {};
  let flags = [];
  for (const blocks of (micro.sessions || [])){
    flags = flags.concat(validateSessionBlocks(blocks).flags);
  }
  flags = flags.concat(microcycleRules(micro));
  const coherent = !flags.some(breaksCoherence);
  return {flags, coherent, volume: _microVolume(micro.sessions||[]),
          frequency: _microPatternFrequency(micro.sessions||[])};
}


/* ===================================================================
   V3.4.1 — MESOCICLO: reglas de modelo (función PURA).
   Sube del MICROCICLO (V3.3b) al MESOCICLO. Emite los flags de Capa D
   sobre la estructura intra-meso: el flag genérico periodization_model_drift
   (vía las 4 model_drift_rules de DATA — 4 reglas → 1 flag, patrón P3.4
   intent_declared_inconsistent_with_parameters), mesocycle_progression_
   incoherent_with_model y week_modifier_conflict. Todos informational
   (fieles a flag_catalog; el motor NO reescribe severidad).

   v3_constraint: las 4 reglas drift tienen v3_constraint:true en la spec.
   NO las convertimos en hard aquí (eso reescribiría severidad). El generador
   las usa como AUTOCHEQUEO DE CONSTRUCCIÓN: si GEN.meso produce un meso que
   dispara su propio drift de modelo, eso es falla ruidosa (bug del constructor),
   no un meso inválido. Es la lectura correcta de v3_constraint: invariante de
   construcción del generador, no muro de validación del plan humano.

   Modelo de datos del meso (alineado a mesocycle_template del schema):
     meso = { periodization_model, model_variant, duration_weeks, level,
              progression_scheme:{axis, ramp:[{weeks,dimension,per_week|delta,scope}]},
              weeks:[ { week, type, microcycle:{sessions,slots,...}, modifiers:[...] } ] }
   =================================================================== */

/* Semanas estándar (excluye deload/test/intro: el drift se evalúa sobre la
   progresión estándar, no sobre semanas de descarga o calibración). */
function _stdWeeks(meso){
  return (meso.weeks||[]).filter(w => (w.type||'standard')==='standard');
}

/* Carga representativa de una semana: promedio de load_pct_1rm de los bloques
   escalares de fuerza (proxy del eje intensidad). Reusa _sessionBlockExercises
   para barrer cualquier arquetipo. */
function _weekStrengthLoad(w){
  const loads=[];
  for (const blocks of ((w.microcycle&&w.microcycle.sessions)||[])){
    for (const b of (blocks||[])){
      const lp = (b.params && b.params.load_pct_1rm) ?? b.load_pct_1rm;
      if (typeof lp==='number') loads.push(lp);
    }
  }
  return loads.length ? loads.reduce((a,c)=>a+c,0)/loads.length : null;
}

/* Volumen representativo de una semana: total de sets efectivos (reusa el
   motor de volumen de V3.3b a nivel de cada sesión de la semana). */
function _weekVolume(w){
  let tot=0;
  for (const blocks of ((w.microcycle&&w.microcycle.sessions)||[])){
    for (const b of (blocks||[])) tot += _blockEffectiveSets(b);
  }
  return tot;
}

/* Zonas de fuerza distintas tocadas por una semana (para DUP undulating):
   target_zone de los bloques escalares de fuerza. */
function _weekStrengthZones(w){
  const zones=new Set();
  for (const blocks of ((w.microcycle&&w.microcycle.sessions)||[])){
    for (const b of (blocks||[])){
      const z = b.zone || (b.params && b.params.target_zone);
      // solo bloques con carga (fuerza), no conditioning
      const hasLoad = typeof ((b.params&&b.params.load_pct_1rm) ?? b.load_pct_1rm)==='number';
      if (z && hasLoad) zones.add(z);
    }
  }
  return zones;
}

/* ¿La serie de números es monotónica no-decreciente? (tolerancia 0 — los deltas
   semanales son explícitos). null/<2 puntos → true (vacuamente monotónico). */
function _isMonotonicNonDecreasing(arr){
  const xs = arr.filter(x=>typeof x==='number');
  for (let i=1;i<xs.length;i++) if (xs[i] < xs[i-1] - 1e-9) return false;
  return true;
}

/* Edad máxima (en nº de semanas estándar consecutivas) de un mismo ejercicio
   a lo largo del meso, para conjugate_without_rotation (mismos ejercicios ≥6
   semanas = sin rotación). Cuenta en cuántas semanas estándar aparece cada id. */
function _exerciseWeekSpan(stdWeeks){
  const span={};
  for (const w of stdWeeks){
    const seen=new Set();
    for (const blocks of ((w.microcycle&&w.microcycle.sessions)||[])){
      for (const b of (blocks||[])) for (const id of _sessionBlockExercises(b)) seen.add(id);
    }
    for (const id of seen) span[id]=(span[id]||0)+1;
  }
  let max=0; for (const id in span) if (span[id]>max) max=span[id];
  return max;
}

/* strength_load_delta semanal sostenido (concurrent): pendiente media de la
   carga de fuerza entre semanas estándar consecutivas, en puntos %/semana. */
function _sustainedStrengthDelta(stdWeeks){
  const loads = stdWeeks.map(_weekStrengthLoad).filter(x=>typeof x==='number');
  if (loads.length<2) return 0;
  let sum=0,n=0; for (let i=1;i<loads.length;i++){ sum+=(loads[i]-loads[i-1]); n++; }
  return n ? sum/n : 0;
}

/* Las 4 model_drift_rules → 1 flag genérico periodization_model_drift.
   Cada regla aplica solo a su modelo de origen (origin). Lee DATA.model_drift_rules
   (la spec embebida) para origin/target/condition; la DETECCIÓN vive aquí (las
   condiciones de la spec son prosa). Devuelve la lista de reglas disparadas. */
function _modelDriftFired(meso){
  const model = meso.periodization_model || null;
  const variant = meso.model_variant || null;
  const std = _stdWeeks(meso);
  const rules = DATA.model_drift_rules || [];
  const fired = [];
  for (const r of rules){
    const origin = r.origin || '';
    const oModel = origin.split('/')[0];
    const oVariant = origin.includes('/') ? origin.split('/')[1] : null;
    if (oModel !== model) continue;                          // la regla es de otro modelo
    if (oVariant && variant && oVariant !== variant) continue; // variante específica no coincide
    let hit = false;
    switch (r.id){
      case 'linear_ramp_undulates':
        // primary_axis ramp no-monotónico across standard weeks.
        // linear primary_axis = intensity → la carga debe ser monotónica no-decreciente.
        hit = !_isMonotonicNonDecreasing(std.map(_weekStrengthLoad));
        break;
      case 'dup_with_identical_slots':
        // DUP: strength slots comparten target_zones idénticas (no hay ondulación).
        // Dispara si NINGUNA semana estándar presenta ≥2 zonas de fuerza distintas.
        hit = std.length>0 && !std.some(w => _weekStrengthZones(w).size >= 2);
        break;
      case 'concurrent_strength_ramping':
        // strength_load_delta > +2.5%/semana sostenido (conditioning_bias rampea fuerza).
        hit = _sustainedStrengthDelta(std) > 2.5;
        break;
      case 'conjugate_without_rotation':
        // mismos ejercicios ≥6 semanas (sin rotación de placeholders).
        hit = _exerciseWeekSpan(std) >= 6;
        break;
    }
    if (hit) fired.push(r);
  }
  return fired;
}

/* Coherencia del progression_scheme.ramp vs el primary_axis del modelo declarado.
   Emite mesocycle_progression_incoherent_with_model (informational, drift spirit
   del schema). Proxy: el eje declarado del scheme debe casar con el primary_axis
   del modelo (o 'mixed'/'per_block' que aceptan cualquiera). */
function _progressionIncoherent(meso){
  const model = DATA.periodization_models && DATA.periodization_models[meso.periodization_model];
  if (!model) return false;
  const ps = meso.progression_scheme;
  if (!ps || !ps.axis) return false;
  const pa = model.primary_axis;
  if (!pa || pa==='mixed' || pa==='per_block') return false;   // modelos multi-eje no fijan el eje
  // intensity model con scheme axis de volumen puro (o viceversa) = incoherente.
  return ps.axis !== pa && ps.axis !== 'mixed';
}

/* week_modifier_conflict: misma semana + misma dimension + scopes solapados.
   Solape = mismo scope.type Y (scope.value igual O alguno 'all'). */
function _weekModifierConflicts(meso){
  const out=[];
  for (const w of (meso.weeks||[])){
    const mods = w.modifiers || [];
    for (let i=0;i<mods.length;i++) for (let j=i+1;j<mods.length;j++){
      const a=mods[i], b=mods[j];
      if (a.dimension !== b.dimension) continue;
      const as=a.scope||{}, bs=b.scope||{};
      const overlap = (as.type==='all' || bs.type==='all') ||
                      (as.type===bs.type && (as.value??null)===(bs.value??null));
      if (overlap) out.push({week:w.week, dimension:a.dimension});
    }
  }
  return out;
}

/* Reglas de mesociclo (función PURA). Todos los flags informational. */
function mesocycleRules(meso){
  meso = meso || {};
  const flags = [];

  // --- Drift de modelo (4 reglas → 1 flag genérico periodization_model_drift).
  for (const r of _modelDriftFired(meso)){
    flags.push(F('periodization_model_drift','informational','microcycle_plus',
      'Mesociclo declarado '+(meso.periodization_model||'?')+' se comporta como '+
      (r.target||'?')+' (regla '+r.id+').',
      'Ajustar la estructura del meso o redeclarar el modelo de periodización.'));
  }

  // --- progression_scheme incoherente con el modelo.
  if (_progressionIncoherent(meso)){
    const pa = (DATA.periodization_models[meso.periodization_model]||{}).primary_axis;
    flags.push(F('mesocycle_progression_incoherent_with_model','informational','microcycle_plus',
      'El ramp (eje '+meso.progression_scheme.axis+') contradice el eje primario del modelo '+
      meso.periodization_model+' ('+pa+').',
      'Alinear progression_scheme.axis con el primary_axis del modelo o cambiar el modelo.'));
  }

  // --- week_modifier_conflict.
  for (const c of _weekModifierConflicts(meso)){
    flags.push(F('week_modifier_conflict','informational','microcycle_plus',
      'Semana '+c.week+': dos modifiers sobre '+c.dimension+' con scopes solapados.',
      'Se aplican en orden declarado; revisar si el solape es intencional.'));
  }

  // --- mesocycle_duration_out_of_range (canonical 3-6, extended 2-8).
  const dw = meso.duration_weeks ?? (meso.weeks||[]).length;
  if (typeof dw==='number' && (dw<2 || dw>8)){
    flags.push(F('mesocycle_duration_out_of_range','informational','microcycle_plus',
      'Duración '+dw+' semanas fuera del rango extendido [2,8].',
      'Acortar/dividir el mesociclo.'));
  }

  // --- mesocycle_deload_overdue: semanas estándar consecutivas sin planned_deload
  //     vs umbral effective = min(level, model). (mesocycle_deload_overdue, viability_pattern.)
  const level = meso.level || 'intermediate';
  const lvlThr = (DATA.deload_overdue_threshold||{})[level] ?? 5;
  const dp = (DATA.periodization_models[meso.periodization_model]||{}).deload_positioning||{};
  const modelThr = Array.isArray(dp.expected_every_weeks) ? dp.expected_every_weeks[1] : null;
  const thr = modelThr!=null ? Math.min(lvlThr, modelThr) : lvlThr;
  let run=0, maxRun=0;
  for (const w of (meso.weeks||[])){
    if ((w.type||'standard')==='planned_deload'){ run=0; }
    else { run++; if (run>maxRun) maxRun=run; }
  }
  if (maxRun > thr){
    flags.push(F('mesocycle_deload_overdue','informational','microcycle_plus',
      maxRun+' semanas estándar sin planned_deload (umbral '+thr+' = min(nivel '+lvlThr+', modelo '+(modelThr??'—')+')).',
      'Insertar una semana planned_deload.'));
  }

  return flags;
}

/* Versión PURA que valida un mesociclo como compuerta del generador (genMeso),
   análoga a validateMicrocycleBlocks. Incluye la coherencia de cada microciclo
   Y las reglas de meso. coherent = ningún microciclo rompe coherencia (los flags
   de meso son todos informational → nunca rompen por sí mismos). */
function validateMesocycleBlocks(meso){
  meso = meso || {};
  let flags = [];
  for (const w of (meso.weeks||[])){
    const micro = w.microcycle || {};
    flags = flags.concat(validateMicrocycleBlocks(micro).flags);
  }
  flags = flags.concat(mesocycleRules(meso));
  const coherent = !flags.some(breaksCoherence);
  return {flags, coherent, driftFired: _modelDriftFired(meso).map(r=>r.id)};
}


/* ===================================================================
   V3.4.3 — MACROCICLO: reglas de fase/evento/taper (función PURA).
   Sube del MESOCICLO (V3.4.2) al MACRO. Replica en JS las comprobaciones
   estructurales del oráculo validate_macro.py (que opera sobre YAML declarado):
   continuidad de fases, evento dentro del rango, evento A con taper, taper
   adyacente al evento + intensidad mantenida. macrocycle_phase_overlap es
   structural_hard (rompe coherencia → da dientes a la compuerta de GEN.macro);
   el resto informational (fieles a flag_catalog).

   Modelo de datos del macro (alineado a macrocycle/event/phase_entry/taper):
     macro = { start_date, end_date, events:[{id,date,priority,type}],
               phases:[{order, purpose, start_date, weeks, mesocycle:{...meso}}],
               taper?:{ event_ref, start_date, duration_days, deltas:{intensity,...} } }
   Las fechas son días absolutos (epoch-days int) para aritmética sin Date.
   =================================================================== */

function _macroPhaseFlags(macro){
  const flags = [];
  const phases = (macro.phases||[]).slice().sort((a,b)=>(a.order||0)-(b.order||0));
  let cursor = macro.start_date;
  for (const ph of phases){
    const s = ph.start_date, e = s + (ph.weeks||0)*7;
    if (cursor!=null && s!=null){
      if (s < cursor){
        flags.push(F('macrocycle_phase_overlap','hard','microcycle_plus',
          'Fase '+(ph.order)+' ('+ph.purpose+') empieza antes del fin de la anterior.',
          'Reordenar o acortar fases para eliminar el solapamiento.'));
      } else if (s > cursor){
        flags.push(F('macrocycle_timeline_gap','informational','microcycle_plus',
          (s-cursor)+' días sin fase entre el fin de la anterior y la fase '+(ph.order)+'.',
          'Cerrar el hueco o documentar la pausa.'));
      }
    }
    cursor = e;
  }
  return flags;
}

function _macroEventTaperFlags(macro){
  const flags = [];
  const events = macro.events || [];
  const aEvents = events.filter(e=>e.priority==='A');
  for (const ev of events){
    if (macro.start_date!=null && macro.end_date!=null &&
        !(macro.start_date <= ev.date && ev.date <= macro.end_date)){
      flags.push(F('macrocycle_phase_overlap','hard','microcycle_plus',
        'Evento '+ev.id+' cae fuera del rango del macro.',
        'Ajustar fechas del macro o del evento.'));
    }
  }
  const taper = macro.taper;
  for (const ev of aEvents){
    if (!taper || taper.event_ref !== ev.id){
      flags.push(F('event_a_without_taper','informational','microcycle_plus',
        'Evento prioridad A '+ev.id+' sin taper definido.',
        'Definir un taper hacia el evento A.'));
    }
  }
  if (taper){
    const ev = events.find(e=>e.id===taper.event_ref);
    if (ev){
      const tEnd = taper.start_date + (taper.duration_days||0);
      if (ev.priority==='A' && !(taper.duration_days>=8 && taper.duration_days<=14)){
        flags.push(F('taper_duration_atypical','informational','microcycle_plus',
          'Taper de '+taper.duration_days+'d fuera de [8,14] para evento A.',
          'Ajustar la duración del taper.'));
      }
      // El taper debe terminar adyacente al evento (realization_not_adjacent_to_event spirit).
      if (tEnd < ev.date - 1 || taper.start_date >= ev.date){
        flags.push(F('realization_not_adjacent_to_event','informational','microcycle_plus',
          'La ventana de taper no termina adyacente al evento A.',
          'Alinear el fin del taper con la fecha del evento.'));
      }
      // intensidad mantenida = el error clásico (taper_not_producing_freshness spirit).
      if (taper.deltas && taper.deltas.intensity!=null && taper.deltas.intensity!=='maintained'){
        flags.push(F('taper_not_producing_freshness','informational','microcycle_plus',
          'El taper no mantiene la intensidad (error clásico: recorta intensidad en vez de volumen).',
          'Mantener intensidad; recortar volumen (~−50%).'));
      }
    }
  }
  return flags;
}

/* Reglas de macrociclo (función PURA). */
function macrocycleRules(macro){
  macro = macro || {};
  return _macroPhaseFlags(macro).concat(_macroEventTaperFlags(macro));
}

/* Compuerta PURA del generador (genMacro): coherencia de cada mesociclo de cada
   fase + reglas de macro. coherent = ningún meso incoherente Y ningún phase_overlap
   /evento-fuera-de-rango (structural_hard). */
function validateMacrocycleBlocks(macro){
  macro = macro || {};
  let flags = [];
  for (const ph of (macro.phases||[])){
    if (ph.mesocycle) flags = flags.concat(validateMesocycleBlocks(ph.mesocycle).flags);
  }
  flags = flags.concat(macrocycleRules(macro));
  const coherent = !flags.some(breaksCoherence);
  return {flags, coherent};
}

const $ = s=>document.querySelector(s);
function esc(t){ return String(t).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

function blockStatus(b,i){
  const fl = validateBlock(b,i);
  if (fl.some(breaksCoherence)) return 'hard';
  if (fl.some(isViabWarn)) return 'viab';
  if (fl.length) return 'info'; return 'ok';
}
function renderBlocks(){
  const el = $('#blocks-list'); el.innerHTML='';
  S.blocks.forEach((b,i)=>{
    const st = blockStatus(b,i);
    const exName = MULTI.has(b.method)
      ? (b.components.map(c=>c.exercise?DATA.exercises[c.exercise].name:'—').join(' → ')||'— componentes —')
      : (b.exercise?DATA.exercises[b.exercise].name:'— sin ejercicio —');
    const card = document.createElement('div');
    card.className = 'block-card'+(i===S.activeIdx?' active':'');
    card.innerHTML = `<div class="bc-top"><span class="bc-n">${String(i+1).padStart(2,'0')}</span>
      <span class="bc-method">${b.method}<span style="color:var(--faint)">/</span>${b.variant}</span>
      <span class="bc-dot dot-${st}"></span></div>
      <div class="bc-ex">${esc(exName)}</div>
      <div class="bc-actions">
        <button data-act="up" title="Subir">↑</button><button data-act="down" title="Bajar">↓</button>
        <button data-act="dup" title="Duplicar">⧉</button><button data-act="del" title="Eliminar" style="margin-left:auto;color:var(--hard)">✕</button>
      </div>`;
    card.addEventListener('click', e=>{
      const act = e.target.dataset.act;
      if (act){ e.stopPropagation();
        if (act==='del'){ S.blocks.splice(i,1); S.activeIdx = Math.min(S.activeIdx, S.blocks.length-1); }
        if (act==='dup'){ const c = JSON.parse(JSON.stringify(b)); c.id='b'+(uid++); S.blocks.splice(i+1,0,c); }
        if (act==='up' && i>0){ [S.blocks[i-1],S.blocks[i]]=[S.blocks[i],S.blocks[i-1]]; if(S.activeIdx===i)S.activeIdx=i-1; }
        if (act==='down' && i<S.blocks.length-1){ [S.blocks[i+1],S.blocks[i]]=[S.blocks[i],S.blocks[i+1]]; if(S.activeIdx===i)S.activeIdx=i+1; }
      } else S.activeIdx = i;
      renderAll();
    });
    el.appendChild(card);
  });
}

function fieldHTML(k, spec, val){
  if (isStructural(k,spec)) return '';
  const lab = `<label for="p-${k}">${k}${spec.required?' *':''}</label>`;
  if (spec.type==='enum'){
    return `<div class="field">${lab}<select id="p-${k}" data-param="${k}" data-ptype="enum">
      ${(spec.values||[]).map(o=>`<option ${o===val?'selected':''}>${o}</option>`).join('')}</select></div>`;
  }
  if (spec.type==='boolean'){
    return `<div class="field">${lab}<select id="p-${k}" data-param="${k}" data-ptype="boolean">
      <option value="true" ${val===true||val==='true'?'selected':''}>true</option>
      <option value="false" ${val===false||val==='false'?'selected':''}>false</option></select></div>`;
  }
  if (!isNumeric(spec)){
    return `<div class="field">${lab}<input id="p-${k}" type="text" data-param="${k}" data-ptype="text" value="${esc(val??'')}">
      <div class="hint">${esc(spec.type||'texto')} · edición libre v0.1</div></div>`;
  }
  const rc = spec.range_canonical, re = spec.range_extended;
  const hint = (rc?`canónico <b>${rc.min}–${rc.max}</b>`:'') + (re?` · ext ${re.min}–${re.max}`:'');
  return `<div class="field">${lab}
    <input id="p-${k}" type="number" step="any" data-param="${k}" data-ptype="number" value="${val??''}">
    ${hint?`<div class="hint">${hint}</div>`:''}</div>`;
}

}

        const agsFields = isAGS
          ? `<div class="field"><label>par</label><input type="number" data-cpair="${ci}" value="${c.pair_index??''}" min="0" placeholder="#"></div>
             <div class="field"><label>rol pareo</label><select data-crip="${ci}"><option value="">—</option><option ${c.role_in_pair==='agonist'?'selected':''}>agonist</option><option ${c.role_in_pair==='antagonist'?'selected':''}>antagonist</option></select></div>`
          : '';
        return `<div class="wu-row"${isAGS?' style="grid-template-columns:1.4fr 64px 88px 1fr 1fr 30px"':''}>
          <div class="wu-ex">${exPickerHTML('c'+ci, c.exercise)}</div>
          ${isAGS ? agsFields : roleField}
          <div class="field"><label>trabajo</label><div class="wu-pair">${wmSel}${wmVal}</div></div>
          <div class="field"><label>carga</label><div class="wu-pair">${lmSel}${loadInput}</div></div>
          <button data-cdel="${ci}" class="ghost" style="color:var(--hard)">✕</button>
        </div>`;
      }).join('') +
      `</div><button id="btn-add-comp" style="margin-top:8px">+ Work unit</button></div>`;
  } else {
    html += `<div class="ed-section"><span class="eyebrow">Ejercicio</span>${exPickerHTML('main', b.exercise)}</div>`;
  }
  let pfields = Object.entries(v.params_schema||{}).map(([k,spec])=>fieldHTML(k,spec,b.params[k])).join('');
  html += `<div class="ed-section"><span class="eyebrow">Parámetros · ${b.method}/${b.variant}</span>
    <div class="grid3">${pfields}</div>
  </div>`;
  // P5.1 (D2/D5) — editor de rampa explícita (solo load_progression == custom)
  if (rampActive(b)){
    const rk = rampKey(b);
    if (!Array.isArray(b[rk]) || !b[rk].length) seedRamp(b);
    const isRound = rk==='round_plan';
    const unit = isRound ? 'Ronda' : 'Set';
    html += `<div class="ed-section"><span class="eyebrow">Rampa custom · ${rk} (por ${unit.toLowerCase()})</span>
      <div class="components-list">` +
      b[rk].map((s,si)=>`<div class="wu-row" style="grid-template-columns:48px 1fr 1fr 30px">
        <div class="field"><label>${unit}</label><input type="number" value="${si+1}" disabled></div>
        <div class="field"><label>% 1RM</label><input type="number" data-rload="${si}" value="${s.load_pct_1rm??''}" min="0" max="102" placeholder="%"></div>
        <div class="field"><label>reps</label><input type="number" data-rreps="${si}" value="${s.reps??''}" min="0" placeholder="reps"></div>
        <button data-rdel="${si}" class="ghost" style="color:var(--hard)">✕</button>
      </div>`).join('') +
      `</div><button id="btn-add-ramp" style="margin-top:8px">+ ${unit}</button></div>`;
  }
  // P5.2 — editor de progresión mecánica (drop/mechanical_drop)
  const mk = mechKey(b);
  if (mk){
    if (!Array.isArray(b[mk])) b[mk] = [];
    html += `<div class="ed-section"><span class="eyebrow">Progresión mecánica · mechanical_progression (demanda decreciente)</span>
      <div class="components-list">` +
      b[mk].map((s,si)=>`<div class="wu-row" style="grid-template-columns:40px 1.4fr 1fr 88px 30px">
        <div class="field"><label>paso</label><input type="number" value="${si+1}" disabled></div>
        <div class="wu-ex">${exPickerHTML('m'+si, s.exercise)}</div>
        <div class="field"><label>variación</label><input type="text" data-mvar="${si}" value="${esc(s.variation_descriptor||'')}" placeholder="p.ej. box / incline"></div>
        <div class="field"><label>MDI override</label><input type="number" step="0.1" data-mdiff="${si}" value="${s.difficulty_index_override??''}" placeholder="MDI"></div>
        <button data-mdel="${si}" class="ghost" style="color:var(--hard)">✕</button>
      </div>`).join('') +
      `</div><button id="btn-add-mech" style="margin-top:8px">+ Paso</button>
      <div class="variant-desc">Demanda efectiva = MDI override declarado, o el MDI del catálogo del ejercicio si se deja vacío. Debe decrecer paso a paso.</div></div>`;
  }
  $('#editor').innerHTML = html;
  bindEditor(b);
}

function bindEditor(b){
  $('#sel-method').onchange = e=>{ b.method=e.target.value; b.variant=Object.keys(DATA.methods[b.method].variants)[0];
    if (hasWUList(b)){ const k=wuArrayKey(b);
      const min = b.method==='emom' ? 1 : 2;   // EMOM: 1 work_unit por intervalo; cadenas: ≥2
      if (!Array.isArray(b[k])) b[k]=[];
      while (b[k].length < min) b[k].push(newWorkUnit()); }
    applyDefaults(b); renderAll(); };
  $('#sel-variant').onchange = e=>{ b.variant=e.target.value; applyDefaults(b); renderAll(); };
  $('#sel-intent').onchange = e=>{ b.intent_declared=e.target.value; renderAll(false); };
  if ($('#sel-zone')) $('#sel-zone').onchange = e=>{ b.zone=e.target.value; renderAll(false); };
  document.querySelectorAll('[data-param]').forEach(inp=>{
    const h = ()=>{ const t = inp.dataset.ptype;
      b.params[inp.dataset.param] = t==='number' ? (inp.value===''?'':Number(inp.value))
        : t==='boolean' ? (inp.value==='true') : inp.value;
      // P5.1 — load_progression gobierna la visibilidad del editor de rampa: re-render
      // del editor (no solo validación) para mostrar/ocultar la sección custom.
      if (inp.dataset.param==='load_progression' && rampKey(b)){ renderEditor(); return; }
      renderValidation(); renderBlocks(); };
    inp.oninput = h; inp.onchange = h;
  });
  document.querySelectorAll('[data-exsearch]').forEach(inp=>{
    const pref = inp.dataset.exsearch;
    const res = document.querySelector(`[data-exresults="${pref}"]`);
    inp.oninput = ()=>{
      const q = inp.value.toLowerCase().trim();
      const hits = Object.entries(DATA.exercises).filter(([id,e])=>
        !q || e.name.toLowerCase().includes(q) || (e.name_es||'').toLowerCase().includes(q) ||
        e.pattern.includes(q) || e.implement.includes(q) || id.includes(q)).slice(0,40);
      res.innerHTML = hits.map(([id,e])=>`<div class="ex-item" data-exsel="${id}" data-expref="${pref}">
        <span class="xi-name">${esc(e.name)}</span><span class="xi-meta">${e.pattern} · ${e.implement} · MDI ${e.mdi}</span></div>`).join('')
        || `<div class="ex-item" style="color:var(--faint)">sin resultados</div>`;
      res.classList.add('open');
      res.querySelectorAll('[data-exsel]').forEach(it=>it.onclick=()=>{
        setExercise(b, it.dataset.expref, it.dataset.exsel); renderAll(); });
    };
    inp.onfocus = inp.oninput;
  });
  document.querySelectorAll('[data-exclear]').forEach(btn=>btn.onclick=()=>{ setExercise(b, btn.dataset.exclear, null); renderAll(); });
  const L = ()=>wuList(b);
  /* Sincronizador c.reps RETIRADO en P4.1 (MARCA P4.0 §6 cumplida): las únicas
     reglas que leían c.reps (contrast_explosive_reps_high, slc_component_reps_atypical)
     migraron al compilador y ahora leen la forma canónica work_metric/work_value
     directamente. Ninguna regla ni el export dependen ya de c.reps. */
  document.querySelectorAll('[data-crole]').forEach(s=>s.onchange=()=>{ L()[+s.dataset.crole].role=s.value; renderValidation(); });
  // P5.3 — AGS: pair_index / role_in_pair
  document.querySelectorAll('[data-cpair]').forEach(s=>s.oninput=()=>{ L()[+s.dataset.cpair].pair_index = s.value===''?null:Number(s.value); renderValidation(); });
  document.querySelectorAll('[data-crip]').forEach(s=>s.onchange=()=>{ L()[+s.dataset.crip].role_in_pair = s.value; renderValidation(); });
  document.querySelectorAll('[data-cwmetric]').forEach(s=>s.onchange=()=>{ const c=L()[+s.dataset.cwmetric]; c.work_metric=s.value; renderEditor(); });
  document.querySelectorAll('[data-cwval]').forEach(s=>s.oninput=()=>{ const c=L()[+s.dataset.cwval]; c.work_value=s.value===''?'':Number(s.value); renderValidation(); });
  document.querySelectorAll('[data-clmetric]').forEach(s=>s.onchange=()=>{ const c=L()[+s.dataset.clmetric]; c.load_metric=s.value;
    /* limpiar campos de carga que no aplican al nuevo metric */
    if (s.value!=='percent_1rm') c.load_pct_1rm=null;
    if (!['absolute_load','time','distance'].includes(s.value)){ c.load_value=null; c.load_unit=''; }
    renderEditor(); });
  document.querySelectorAll('[data-clpct]').forEach(s=>s.oninput=()=>{ L()[+s.dataset.clpct].load_pct_1rm=s.value===''?null:Number(s.value); renderValidation(); });
  document.querySelectorAll('[data-clval]').forEach(s=>s.oninput=()=>{ L()[+s.dataset.clval].load_value=s.value===''?null:Number(s.value); renderValidation(); });
  document.querySelectorAll('[data-clunit]').forEach(s=>s.oninput=()=>{ L()[+s.dataset.clunit].load_unit=s.value; renderValidation(); });
  document.querySelectorAll('[data-cdel]').forEach(btn=>btn.onclick=()=>{ L().splice(+btn.dataset.cdel,1); renderAll(); });
  const ac = $('#btn-add-comp'); if (ac) ac.onclick = ()=>{ L().push(newWorkUnit()); renderAll(); };
  // P5.1 (D2/D5) — handlers de la rampa custom
  const rk = rampKey(b);
  if (rk){
    document.querySelectorAll('[data-rload]').forEach(s=>s.oninput=()=>{ b[rk][+s.dataset.rload].load_pct_1rm = s.value===''?null:Number(s.value); renderValidation(); });
    document.querySelectorAll('[data-rreps]').forEach(s=>s.oninput=()=>{ b[rk][+s.dataset.rreps].reps = s.value===''?null:Number(s.value); renderValidation(); });
    document.querySelectorAll('[data-rdel]').forEach(btn=>btn.onclick=()=>{ b[rk].splice(+btn.dataset.rdel,1); renderAll(); });
    const ar = $('#btn-add-ramp'); if (ar) ar.onclick = ()=>{ b[rk].push(newRampStep()); renderAll(); };
  }
  // P5.2 — handlers de la progresión mecánica
  const mk = mechKey(b);
  if (mk){
    document.querySelectorAll('[data-mvar]').forEach(s=>s.oninput=()=>{ b[mk][+s.dataset.mvar].variation_descriptor = s.value; renderValidation(); });
    document.querySelectorAll('[data-mdiff]').forEach(s=>s.oninput=()=>{ b[mk][+s.dataset.mdiff].difficulty_index_override = s.value===''?null:Number(s.value); renderValidation(); });
    document.querySelectorAll('[data-mdel]').forEach(btn=>btn.onclick=()=>{ b[mk].splice(+btn.dataset.mdel,1); renderAll(); });
    const am = $('#btn-add-mech'); if (am) am.onclick = ()=>{ b[mk].push(newMechStep()); renderAll(); };
  }
}
function setExercise(b, pref, exId){
  if (pref==='main') b.exercise = exId;
  else if (pref[0]==='m') b.mechanical_progression[+pref.slice(1)].exercise = exId;
  else wuList(b)[+pref.slice(1)].exercise = exId;
}

let lastVerdict = null;
function renderValidation(){
  const {flags, coherent} = validateSession();
  const seal = $('#seal');
  const viabWarns = flags.filter(isViabWarn).length;
  const cls = !coherent ? 's-hard' : (viabWarns ? 's-warn' : (flags.length ? 's-info' : 's-ok'));
  const verdict = !coherent ? 'INVALID' : (viabWarns ? 'COHERENT·CAUTION' : (flags.length ? 'COHERENT·REVIEW' : 'COHERENT'));
  seal.className = cls;
  if (verdict !== lastVerdict){ seal.classList.add('pulse'); setTimeout(()=>seal.classList.remove('pulse'),350); lastVerdict = verdict; }
  seal.querySelector('.s-verdict').textContent = verdict;
  const hards = flags.filter(f=>f.severity==='hard').length;
  const viab = flags.filter(f=>f.severity==='viability').length;
  const info = flags.length - hards - viab;
  seal.querySelector('.s-sub').textContent = `overall_coherent: ${coherent} · ${hards} hard · ${viab} viability · ${info} informational`;
  $('#flags').innerHTML = flags.length ? flags.map(f=>`
    <div class="flag sev-${displaySev(f)}">
      <span class="f-scope">${f.scope==='session'?'session':'bloque '+(f.scope+1)}${f.severity==='viability'&&f.level?' · '+f.level:''}</span>
      <div class="f-id">${f.id}</div>
      <div class="f-msg">${esc(f.message)}</div>
      <div class="f-sugg">${esc(f.suggestion)}</div>
    </div>`).join('') : `<div class="no-flags">— sin flags —<br>prescripción limpia</div>`;
}
function renderAll(reEditor=true){ renderBlocks(); if (reEditor) renderEditor(); renderValidation(); }

/* ================= Export / Import ================= */
function yamlVal(v){ return typeof v==='string' && /[:#{}\[\],&*?|>'"%@`]/.test(v) ? JSON.stringify(v) : v; }
function exportYAML(){
  let y = `# Generado por Prescriptor v2 v0.1 — template-time (cargas relativas)\nsession_template:\n  name: ${JSON.stringify(S.name)}\n`;
  if (S.intent) y += `  intent: ${S.intent}\n`;
  y += `  blocks:\n`;
  S.blocks.forEach(b=>{
    y += `    - method: ${b.method}\n      variant: ${b.variant}\n`;
    const fam = variantOf(b).family; if (fam) y += `      family: ${fam}\n`;
    y += `      intent_declared: ${b.intent_declared||'null'}\n`;
    if (b.family) y += `      family: ${b.family}\n`;
    if (b.zone) y += `      zone: ${b.zone}\n`;
    if (hasWUList(b)){
      const k = wuArrayKey(b);
      y += `      ${k}:\n`;
      wuList(b).forEach(c=>{
        y += `        - exercise: { type: concrete, ref: ${c.exercise||'null'} }\n`;
        if (c.role) y += `          role: ${c.role}\n`;
        // P5.3 — AGS: estructura de pareo (solo si declarada)
        if (c.pair_index!=null) y += `          pair_index: ${c.pair_index}\n`;
        if (c.role_in_pair) y += `          role_in_pair: ${c.role_in_pair}\n`;
        // métrica de trabajo (work_unit canónico: reps | duration_sec | distance_m)
        if (c.work_value!=='' && c.work_value!=null) y += `          ${c.work_metric}: ${c.work_value}\n`;
        // carga (load_metric + campo correspondiente)
        y += `          load_metric: ${c.load_metric}\n`;
        if (c.load_metric==='percent_1rm' && c.load_pct_1rm!=null) y += `          load_pct_1rm: ${c.load_pct_1rm}\n`;
        else if (['absolute_load','time','distance'].includes(c.load_metric) && c.load_value!=null){
          y += `          load_value: ${c.load_value}\n`;
          if (c.load_unit) y += `          load_unit: ${yamlVal(c.load_unit)}\n`;
        }
      });
    } else {
      y += `      exercise: { type: concrete, ref: ${b.exercise||'null'} }\n`;
    }
    y += `      params:\n`;
    Object.entries(b.params).forEach(([k,v])=>{ if(v!=='' && v!=null) y += `        ${k}: ${yamlVal(v)}\n`; });
    // P5.1 — rampa custom (set_ramp / round_plan) en forma plana {load_pct_1rm, reps}
    const rk = rampKey(b);
    if (rk && Array.isArray(b[rk]) && b[rk].length && (b.params||{}).load_progression==='custom'){
      y += `      ${rk}:\n`;
      b[rk].forEach(s=>{
        y += `        -`;
        const parts=[];
        if (s.load_pct_1rm!=null) parts.push(` load_pct_1rm: ${s.load_pct_1rm}`);
        if (s.reps!=null) parts.push(` reps: ${s.reps}`);
        y += (parts.length? ` {${parts.join(',').trim()}}` : ' {}') + `\n`;
      });
    }
    // P5.2 — progresión mecánica (array<mechanical_step>); emite exercise_ref.
    const mk = mechKey(b);
    if (mk && Array.isArray(b[mk]) && b[mk].length){
      y += `      mechanical_progression:\n`;
      b[mk].forEach(s=>{
        y += `        - exercise_ref: ${s.exercise||'null'}\n`;
        if (s.exercise_name) y += `          exercise_name: ${yamlVal(s.exercise_name)}\n`;
        if (s.variation_descriptor) y += `          variation_descriptor: ${yamlVal(s.variation_descriptor)}\n`;
        if (s.difficulty_index_override!=null) y += `          difficulty_index_override: ${s.difficulty_index_override}\n`;
      });
    }
  });
  return y;
}
function openModal(title, text, actionLabel, action){
  $('#m-title').textContent = title; $('#m-text').value = text;
  const btn = $('#m-action'); btn.textContent = actionLabel; btn.onclick = action;
  $('#modal').classList.add('open');
}
function closeModal(){ $('#modal').classList.remove('open'); }
function toast(t){ const el=$('#toast'); el.textContent=t; el.classList.add('show'); setTimeout(()=>el.classList.remove('show'),1800); }

$('#btn-export').onclick = ()=>openModal('Export YAML — session_template', exportYAML(), 'Copiar',
  ()=>{ navigator.clipboard.writeText($('#m-text').value).then(()=>toast('YAML copiado')); });
$('#btn-export-json').onclick = ()=>openModal('Export JSON (round-trip)', JSON.stringify({name:S.name,intent:S.intent,blocks:S.blocks},null,1), 'Copiar',
  ()=>{ navigator.clipboard.writeText($('#m-text').value).then(()=>toast('JSON copiado')); });
$('#btn-import').onclick = ()=>openModal('Importar JSON (pega y aplica)', '', 'Aplicar', ()=>{
  try{
    const d = JSON.parse($('#m-text').value);
    S.name = d.name||S.name; S.intent = d.intent||''; S.blocks = d.blocks||[];
    S.blocks.forEach(b=>{ if(!b.id) b.id='b'+(uid++); if(!b.components) b.components=[]; if(!b.work_per_interval) b.work_per_interval=[]; if(!b.params) b.params={};
      normalizeBlockWUs(b); });   // shim: work_units viejos (reps plano) → forma canónica
    S.activeIdx = S.blocks.length?0:-1;
    $('#session-name').value = S.name; $('#session-intent').value = S.intent;
    closeModal(); renderAll(); toast('Sesión importada');
  }catch(e){ toast('JSON inválido: '+e.message); }
});

/* ================= Init ================= */
$('#session-name').oninput = e=>{ S.name = e.target.value; };
$('#session-intent').innerHTML = '<option value="">intent global —</option>' + DATA.intents.map(i=>`<option>${i}</option>`).join('');
$('#session-intent').onchange = e=>{ S.intent = e.target.value; };
$('#btn-add-block').onclick = ()=>{
  const b = newBlock(); applyDefaults(b);
  if (MULTI.has(b.method)) b.components=[{exercise:null,role:'',reps:''},{exercise:null,role:'',reps:''}];
  S.blocks.push(b); S.activeIdx = S.blocks.length-1; renderAll();
};
document.addEventListener('click', e=>{
  if (!e.target.closest('.ex-picker')) document.querySelectorAll('.ex-results').forEach(r=>r.classList.remove('open'));
});
document.addEventListener('keydown', e=>{ if (e.key==='Escape') closeModal(); });
renderAll();
