<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Taxonomy v2 — Explorador</title>
<style>
:root{--bg:#faf9f5;--surface:#fff;--text:#1a1a17;--muted:#6b6a64;--hint:#9b9a93;--border:rgba(0,0,0,.12);--border2:rgba(0,0,0,.22);--accent:#534AB7;--accent-bg:#EEEDFE;--accent-tx:#3C3489;--teal:#0F6E56;--teal-bg:#E1F5EE;--teal-tx:#085041;--coral:#993C1D;--coral-bg:#FAECE7;--amber-bg:#FAEEDA;--amber-tx:#854F0B;--r:10px}
@media(prefers-color-scheme:dark){:root{--bg:#1c1c1a;--surface:#262624;--text:#ecebe6;--muted:#a5a49d;--hint:#7a7973;--border:rgba(255,255,255,.14);--border2:rgba(255,255,255,.26);--accent:#AFA9EC;--accent-bg:#3C3489;--accent-tx:#CECBF6;--teal:#5DCAA5;--teal-bg:#085041;--teal-tx:#9FE1CB;--coral:#F0997B;--coral-bg:#712B13;--amber-bg:#633806;--amber-tx:#FAC775}}
*{box-sizing:border-box;margin:0}
body{font-family:ui-sans-serif,system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);font-size:15px;line-height:1.55;padding:24px 16px 64px}
.wrap{max-width:860px;margin:0 auto}
h1{font-size:21px;font-weight:600;margin-bottom:4px}
.sub{color:var(--muted);font-size:13.5px;margin-bottom:20px}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-bottom:20px}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:12px 14px}
.stat .n{font-size:22px;font-weight:600}
.stat .l{font-size:12px;color:var(--muted)}
.tabs{display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap}
.tab{padding:8px 16px;border:1px solid var(--border2);border-radius:20px;background:transparent;color:var(--text);font-size:14px;cursor:pointer}
.tab.on{background:var(--accent-bg);color:var(--accent-tx);border-color:transparent;font-weight:600}
.controls{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
input[type=search],select{padding:8px 12px;border:1px solid var(--border2);border-radius:8px;background:var(--surface);color:var(--text);font-size:14px}
input[type=search]{flex:1;min-width:180px}
.row{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:12px 14px;margin-bottom:8px;cursor:pointer;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.row:hover{border-color:var(--border2)}
.row .nm{font-weight:600;font-size:14.5px;flex:1;min-width:160px}
.row .es{color:var(--hint);font-weight:400;font-size:12.5px;display:block}
.chip{font-size:11.5px;padding:3px 9px;border-radius:12px;background:var(--accent-bg);color:var(--accent-tx);white-space:nowrap}
.chip.t{background:var(--teal-bg);color:var(--teal-tx)}
.chip.a{background:var(--amber-bg);color:var(--amber-tx)}
.bars{display:flex;flex-direction:column;gap:4px;width:130px}
.bar{display:flex;align-items:center;gap:6px;font-size:10.5px;color:var(--muted)}
.bar .tr{flex:1;height:5px;background:var(--border);border-radius:3px;overflow:hidden}
.bar .fl{height:100%;border-radius:3px}
.detail{background:var(--surface);border:1px solid var(--accent);border-radius:var(--r);padding:18px;margin-bottom:14px}
.detail h2{font-size:17px;font-weight:600}
.detail h3{font-size:13px;font-weight:600;color:var(--muted);margin:14px 0 6px;text-transform:uppercase;letter-spacing:.04em}
.kv{display:flex;gap:18px;flex-wrap:wrap;font-size:13px;color:var(--muted);margin-top:6px}
.kv b{color:var(--text);font-weight:600}
table{width:100%;border-collapse:collapse;font-size:13px}
td,th{padding:5px 8px;text-align:left;border-bottom:1px solid var(--border)}
th{color:var(--muted);font-weight:600;font-size:11.5px}
.x{float:right;background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer}
.mcard{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);margin-bottom:10px;overflow:hidden}
.mhead{padding:13px 16px;cursor:pointer;display:flex;align-items:center;gap:10px}
.mhead .nm{font-weight:600;flex:1}
.mbody{padding:0 16px 14px;display:none}
.mcard.open .mbody{display:block}
.vrow{border-top:1px solid var(--border);padding:10px 0}
.vrow .vn{font-weight:600;font-size:14px}
.vrow .vd{font-size:13px;color:var(--muted);margin-top:2px}
.vrow .vf{font-size:12px;color:var(--hint);margin-top:3px;font-family:ui-monospace,monospace}
.empty{color:var(--hint);text-align:center;padding:24px;font-size:14px}
.arrow{color:var(--hint);font-size:12px;transition:transform .15s}
.mcard.open .arrow{transform:rotate(90deg)}
.lnk{color:var(--accent);cursor:pointer;text-decoration:underline dotted}
</style>
</head>

<script>
const D=JSON.parse(document.getElementById('data').textContent);
const EX=D.exercises, ME=D.methods, ZM=D.zone_map;
const $=id=>document.getElementById(id);
const stats=()=>{let v=0;for(const e of Object.values(EX))v+=e.vars.length;$('stN').textContent=Object.keys(EX).length;$('stV').textContent=Object.keys(EX).length+v};
stats();
const pats=[...new Set(Object.values(EX).map(e=>e.pat))].sort();
const imps=[...new Set(Object.values(EX).map(e=>e.imp))].sort();
const segs=[...new Set(Object.values(EX).map(e=>e.seg))].sort();
pats.forEach(p=>$('fPat').insertAdjacentHTML('beforeend',`<option>${p}</option>`));
imps.forEach(p=>$('fImp').insertAdjacentHTML('beforeend',`<option>${p}</option>`));
segs.forEach(p=>$('fSeg').insertAdjacentHTML('beforeend',`<option>${p}</option>`));
const barCol=(v,k)=>k==='md'?(v>=7?'#D85A30':v>=4?'#BA7517':'#1D9E75'):'#7F77DD';
function bars(e){return `<div class="bars">
<div class="bar"><span style="width:52px">demanda</span><div class="tr"><div class="fl" style="width:${e.md*10}%;background:${barCol(e.md,'md')}"></div></div><span>${e.md}</span></div>
<div class="bar"><span style="width:52px">técnica</span><div class="tr"><div class="fl" style="width:${e.tc*10}%;background:${barCol(e.tc,'tc')}"></div></div><span>${e.tc}</span></div></div>`}
function render(){
const q=$('q').value.toLowerCase(),fp=$('fPat').value,fi=$('fImp').value,fs=$('fSeg').value,s=$('srt').value;
let items=Object.entries(EX).filter(([id,e])=>{
if(q&&!(e.name.toLowerCase().includes(q)||(e.es||'').toLowerCase().includes(q)||id.includes(q)))return false;
if(fp&&e.pat!==fp)return false;if(fi&&e.imp!==fi)return false;if(fs&&e.seg!==fs)return false;return true});
items.sort((a,b)=>s==='nm'?a[1].name.localeCompare(b[1].name):b[1][s]-a[1][s]);
$('list').innerHTML=items.length?items.map(([id,e])=>`<div class="row" onclick="show('${id}')">
<div class="nm">${e.name}${e.anchor?' <span class="chip a">ancla</span>':''}<span class="es">${e.es||''}</span></div>
<span class="chip">${e.pat}</span><span class="chip t">${e.imp}</span>${bars(e)}</div>`).join(''):'<div class="empty">Sin resultados</div>'}
function effd(e,v){return Math.round((e.md+v.dmd)*10)/10}
window.show=function(id){
const e=EX[id];if(!e)return;
let h=`<div class="detail"><button class="x" onclick="$('det').innerHTML=''">✕</button><h2>${e.name}</h2>
<div class="kv"><span>patrón <b>${e.pat}</b></span><span>segmento <b>${e.seg}</b></span><span>implemento <b>${e.imp}</b></span><span>carga <b>${e.lm}</b></span><span>demanda <b>${e.md}</b></span><span>técnica <b>${e.tc}</b></span></div>
<div class="kv" style="margin-top:4px"><span>músculos primarios: <b>${e.pm.join(', ')}</b></span></div>`;
if(e.vars.length){h+=`<h3>Variaciones (${e.vars.length}) — demanda efectiva</h3><table><tr><th>variación</th><th>dimensión</th><th>Δ</th><th>efectiva</th></tr>`;
[...e.vars].sort((a,b)=>effd(e,a)-effd(e,b)).forEach(v=>{h+=`<tr><td>${v.name}</td><td>${v.dim.join(', ')}</td><td>${v.dmd>0?'+':''}${v.dmd}</td><td><b>${effd(e,v)}</b></td></tr>`});h+='</table>'}
if(e.prog.length){h+='<h3>Progresa hacia</h3><table><tr><th>destino</th><th>mecanismo</th><th>magnitud</th></tr>';
e.prog.forEach(p=>{const t=EX[p.t];h+=`<tr><td><span class="lnk" onclick="show('${p.t}')">${t?t.name:p.t}</span>${p.tv?' ('+p.tv+')':''}</td><td>${p.mech}</td><td>${p.mag}</td></tr>`});h+='</table>'}
const regs=Object.entries(EX).filter(([rid,r])=>r.prog.some(p=>p.t===id));
if(regs.length){h+='<h3>Regresiones (derivadas)</h3><div class="kv">'+regs.map(([rid,r])=>`<span class="lnk" onclick="show('${rid}')">${r.name}</span>`).join(' · ')+'</div>'}
if(e.eq.length){h+='<h3>Equivalencias</h3><div class="kv">'+e.eq.map(q=>{const t=EX[q.t];return `<span class="lnk" onclick="show('${q.t}')">${t?t.name:q.t}</span> <span style="color:var(--hint)">(${q.sim})</span>`}).join(' · ')+'</div>'}
if(e.sr.length){h+='<h3>Strength ratios</h3><table><tr><th>referencia</th><th>ratio</th><th>confianza</th></tr>';
e.sr.forEach(r=>{const t=EX[r.ref];h+=`<tr><td><span class="lnk" onclick="show('${r.ref}')">${t?t.name:r.ref}</span></td><td>${r.r}</td><td>${r.c}</td></tr>`});h+='</table>'}
h+='</div>';$('det').innerHTML=h;window.scrollTo({top:0,behavior:'smooth'})}
function renderMethods(){
$('mlist').innerHTML=Object.entries(ME).map(([mid,m])=>`<div class="mcard" id="m_${mid}">
<div class="mhead" onclick="document.getElementById('m_${mid}').classList.toggle('open')">
<span class="arrow">▶</span><span class="nm">${m.name}</span>
<span class="chip">${m.variants.length} variante${m.variants.length>1?'s':''}</span>
${m.zone_strategy?`<span class="chip t">${m.zone_strategy}</span>`:''}</div>
<div class="mbody">${m.variants.map(v=>`<div class="vrow"><div class="vn">${v.name}${v.family?` <span class="chip" style="font-size:10.5px">${v.family}</span>`:''}${ZM[mid+'_'+v.id]?` <span class="chip t" style="font-size:10.5px">${ZM[mid+'_'+v.id]}</span>`:''}</div>
${v.desc?`<div class="vd">${v.desc}</div>`:''}
${v.dfl?`<div class="vf">${v.dfl}</div>`:''}</div>`).join('')}</div></div>`).join('')}
