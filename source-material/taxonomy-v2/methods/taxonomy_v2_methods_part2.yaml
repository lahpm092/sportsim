        progression_logic: null

      time_capped_circuit:
        name: "Time-capped circuit (AMRAP multi-ejercicio)"
        family: circuit
        defaults:
          time_cap_min: 20
          rest_between_components_sec: 0
        params_schema:
          time_cap_min:
            type: integer
            range_canonical: { min: 8, max: 30 }
            range_extended: { min: 5, max: 40 }
            default: 20
            required: true
          rest_between_components_sec:
            type: integer
            range_canonical: { min: 0, max: 15 }
            range_extended: { min: 0, max: 30 }
            default: 0
            required: true
          target_rounds:
            type: integer
            required: false
          components:
            type: "array<work_unit>"
            min_length: 3
            max_length: 5
            required: true
        exercise_count_rule_override:
          min: 3
          max: 5
        stopping_rule_override:
          primary_criterion: time_elapsed
          threshold: "elapsed >= time_cap_min"
          failure_action: end_block
        work_unit_extension:
          body_segment: "enum [upper, lower, core, full]"
        work_unit_required_fields:
          - exercise_name
          - one_of: [reps, duration_sec, distance_m]
          - load_metric
          - body_segment
        work_unit_field_renames:
          reps: reps_per_component
        progression_logic: null

