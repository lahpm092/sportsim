          - load_metric
          - body_segment
        work_unit_field_renames:
          reps: reps_per_component
        progression_logic: null

      tabata:
        name: "Tabata protocol"
        family: circuit
        defaults:
          rounds: 8
          work_sec: 20
          rest_sec: 10
          total_duration_min: 4
        params_schema:
          rounds:
            type: integer
            range_canonical: { min: 8, max: 8 }
            range_extended: { min: 6, max: 10 }
            default: 8
            required: true
          work_sec:
            type: integer
            range_canonical: { min: 20, max: 20 }
            range_extended: { min: 15, max: 30 }
            default: 20
            required: true
          rest_sec:
            type: integer
            range_canonical: { min: 10, max: 10 }
            range_extended: { min: 5, max: 15 }
            default: 10
            required: true
          total_duration_min:
            type: integer
            range_canonical: { min: 4, max: 4 }
            range_extended: { min: 3, max: 5 }
