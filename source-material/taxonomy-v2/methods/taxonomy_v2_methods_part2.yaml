          max: 2
        stopping_rule_override:
          primary_criterion: time_elapsed
          threshold: "rounds_completed == 8 OR set_failed"
          failure_action: end_block
        work_unit_extension:
          body_segment: "enum [upper, lower, core, full]"
        work_unit_required_fields:
