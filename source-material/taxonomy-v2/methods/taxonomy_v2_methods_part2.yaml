      fixed_round_circuit:
        name: "Fixed round circuit"
        family: circuit
        defaults:
          total_rounds: 4
          rest_between_components_sec: 0
          rest_inter_round_sec: 60
          target_total_duration_min: 15
        params_schema:
          total_rounds:
            type: integer
            range_canonical: { min: 3, max: 6 }
            range_extended: { min: 2, max: 8 }
            default: 4
            required: true
          rest_between_components_sec:
            type: integer
            range_canonical: { min: 0, max: 15 }
            range_extended: { min: 0, max: 30 }
            default: 0
            required: true
          rest_inter_round_sec:
            type: integer
            range_canonical: { min: 30, max: 180 }
            range_extended: { min: 15, max: 240 }
            default: 60
            required: true
          target_total_duration_min:
            type: integer
            range_canonical: { min: 8, max: 30 }
            range_extended: { min: 5, max: 45 }
            default: 15
            required: false
          components:
            type: "array<work_unit>"
            min_length: 3
            max_length: 8
            required: true
        exercise_count_rule_override:
          min: 3
          max: 8
        work_unit_extension:
          body_segment: "enum [upper, lower, core, full]"
        work_unit_required_fields:
