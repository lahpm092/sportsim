      antagonist_giant_set:
        name: "Antagonist giant set"
        family: independent_load_chain
        description: >
          4-6 ejercicios organizados en pares antagónicos. Cada par alterna
          componentes con grupos musculares opuestos para permitir descanso
          local mientras el antagonista trabaja. Volumen doble vs giant_set
          estándar en el mismo tiempo total. Popular en bodybuilding y
          entrenamiento de hipertrofia con tiempo limitado.
        defaults:
          total_rounds: 3
          pairs_count: 2
          rest_intra_pair_sec: 15
          rest_inter_pair_sec: 60
          rest_inter_round_sec: 120
        params_schema:
          total_rounds:
            type: integer
            range_canonical: { min: 2, max: 4 }
            range_extended: { min: 2, max: 5 }
            default: 3
            required: true
          pairs_count:
            type: integer
            range_canonical: { min: 2, max: 3 }
            range_extended: { min: 2, max: 3 }
            default: 2
            required: true
          rest_intra_pair_sec:
            type: integer
            range_canonical: { min: 10, max: 30 }
            range_extended: { min: 5, max: 45 }
            default: 15
            required: true
          rest_inter_pair_sec:
            type: integer
            range_canonical: { min: 45, max: 90 }
            range_extended: { min: 30, max: 120 }
            default: 60
            required: true
          rest_inter_round_sec:
            type: integer
            range_canonical: { min: 90, max: 180 }
            range_extended: { min: 60, max: 240 }
            default: 120
            required: true
          components:
            type: "array<work_unit>"
            min_length: 4
            max_length: 6
            required: true
        exercise_count_rule_override:
          min: 4
          max: 6
        work_unit_extension:
          body_segment: "enum [upper, lower, core, full]"
          movement_pattern: "string | null"
          pair_index: "integer"
          role_in_pair: "enum [agonist, antagonist]"
        work_unit_required_fields:
          - exercise_name
          - reps
          - load_metric
          - body_segment
          - pair_index
          - role_in_pair
        work_unit_field_renames:
          reps: reps_per_component
        progression_logic: null

