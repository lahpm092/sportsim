        progression_logic: null

      mechanical_drop:
        name: "Mechanical drop"
        family: null
        description: "Load unchanged; mechanical demand reduced through angle, leverage, assistance, or ROM."
        defaults:
          sets: 2
          drops_count: 2
          drop_pct_per_drop: 0
          reps_first_segment: 8
          rest_between_drops_sec: 3
          rest_inter_set_sec: 150
          mechanism: leverage
        params_schema:
          drops_count:
            type: integer
            range_canonical: { min: 1, max: 4 }
            range_extended: { min: 1, max: 4 }
            default: 2
            required: true
          drop_pct_per_drop:
            type: integer
            range_canonical: { min: 0, max: 0 }
            range_extended: { min: 0, max: 0 }
            default: 0
