            type: integer
            range_canonical: { min: 10, max: 25 }
            range_extended: { min: 8, max: 30 }
            default: 15
            required: true
          activation_rir:
            type: integer
            range_canonical: { min: 0, max: 2 }
            range_extended: { min: 0, max: 2 }
            default: 1
            required: true
          mini_tandas_count_target:
            type: integer
            range_canonical: { min: 3, max: 5 }
            range_extended: { min: 2, max: 6 }
            default: 4
            required: true
          rest_intra_set_sec:
            type: integer
            range_canonical: { min: 10, max: 15 }
            range_extended: { min: 8, max: 18 }
            default: 12
            required: true
          load_pct_1rm:
            type: percent
            range_canonical:
              min: 65
              max: 85
            range_extended:
              min: 60
              max: 90
            default: 70
            required: true
          mini_tanda_reps_target:
            type: integer
            range_canonical:
              min: 3
              max: 5
            range_extended:
              min: 2
              max: 8
            default: 4
            required: true
          rest_inter_set_sec:
            type: integer
            range_canonical:
              min: 120
              max: 240
            range_extended:
              min: 90
              max: 360
            default: 180
            required: true
          sets:
            type: integer
            range_canonical:
              min: 1
              max: 3
            range_extended:
              min: 1
              max: 5
            default: 2
            required: true
        work_unit_extension: {}
        work_unit_field_renames:
          reps: activation_reps_target
        progression_logic: null

      dc_style:
