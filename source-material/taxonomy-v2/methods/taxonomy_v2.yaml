          reps_first_segment:
            type: integer
            range_canonical: { min: 6, max: 10 }
            range_extended: { min: 4, max: 12 }
            default: 8
            required: true
          rest_between_drops_sec:
            type: integer
            range_canonical: { min: 0, max: 5 }
            range_extended: { min: 0, max: 8 }
            default: 3
            required: true
          load_pct_1rm:
            type: percent
            range_canonical:
              min: 60
              max: 80
            range_extended:
              min: 50
