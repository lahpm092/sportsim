  # ===========================================================================
  # METHOD: DROP
  # ===========================================================================

  drop:
    id: drop
    name: "Drop sets"
    structure_modifier: intra_set_load

    intent_resolution:
      candidates:
        - intent: intensification
          condition: "first_load_pct_1rm >= 70 AND drops_count <= 2"
        - intent: density
          condition: "drops_count >= 3 OR rest_between_drops_sec < 5"
        - intent: accumulation
          condition: "drops_count >= 3 AND first_load_pct_1rm < 70"
      default: intensification

    time_topology:
      rest_intra_set_sec:
        range_canonical: { min: 0, max: 10 }
        range_extended: { min: 0, max: 15 }
        typical: 5
      rest_inter_set_sec:
        range_canonical: { min: 120, max: 240 }
        range_extended: { min: 90, max: 300 }
        typical: 180

    stopping_rule:
      primary_criterion: failure_reached
      threshold: "rir_estimated <= 0 in each segment"
      failure_action: end_block

    validation_route:
      inputs_required_by_state:
        prescribed: [first_load_pct_1rm, drops_count, drop_pct_per_drop, variant]
        executed: [first_load_pct_1rm, drops_count, drop_pct_per_drop, variant, reps_actual_per_segment]
        partial: [first_load_pct_1rm, drops_count, drop_pct_per_drop, variant]
      inputs_optional: [reps_per_segment_target, rest_between_drops_sec, mechanical_progression]
      inputs_ignored: [reps_target_in_subsequent_sets]
      validator_fn: validate_drop
      flags_specific:
        - drop_pct_below_minimum
        - drop_pct_above_maximum
        - drop_rest_too_long
        - drop_initial_load_too_low
        - drop_initial_load_too_high
        - drop_count_excessive
        - drop_variant_params_inconsistent
        - mechanical_drop_no_progression_declared
        - mechanical_drop_progression_length_mismatch
        - mechanical_drop_rom_changes_exercise
        - drop_exercise_count_invalid

    exercise_count_rule:
      min: 1
      max: 1
      exceptions: [mechanical_drop]

    zone_classification_rule:
      strategy: first_segment
      notes: "First segment defines zone; rest <=10s does NOT change classification (option C from A.9.1)"
      additional_informative: ["zone_if_treated_as_continuous"]

    drift_rules:
      - target_method: rest_pause
        conditions: ["drop_pct_per_drop < 10", "rest_between_drops_sec > 15"]
        severity: informational
        suggestion: "Pequeños cambios de carga con descansos largos sugieren rest_pause."

    variants:
      single_drop:
        name: "Single drop"
        family: null
        defaults:
          load_pct_1rm: 75
          sets: 3
          drops_count: 1
          drop_pct_per_drop: 20
          reps_first_segment: 10
          rest_between_drops_sec: 5
          rest_inter_set_sec: 180
        params_schema:
          drops_count:
            type: integer
            range_canonical: { min: 1, max: 1 }
            range_extended: { min: 1, max: 1 }
            default: 1
            required: true
          drop_pct_per_drop:
            type: integer
            range_canonical: { min: 15, max: 30 }
            range_extended: { min: 10, max: 35 }
            default: 20
            required: true
          reps_first_segment:
            type: integer
            range_canonical: { min: 6, max: 15 }
            range_extended: { min: 5, max: 18 }
            default: 10
            required: true
          rest_between_drops_sec:
            type: integer
            range_canonical: { min: 0, max: 10 }
            range_extended: { min: 0, max: 15 }
            default: 5
            required: true
          load_pct_1rm:
            type: percent
            range_canonical:
              min: 60
              max: 80
            range_extended:
              min: 50
              max: 90
            default: 75
            required: true
          rest_inter_set_sec:
            type: integer
            range_canonical:
              min: 90
              max: 180
            range_extended:
              min: 60
              max: 300
            default: 180
            required: true
          sets:
            type: integer
            range_canonical:
              min: 2
              max: 4
            range_extended:
              min: 1
              max: 6
            default: 3
            required: true
        work_unit_extension: {}
        work_unit_field_renames:
          reps: reps_first_segment
        progression_logic: null

