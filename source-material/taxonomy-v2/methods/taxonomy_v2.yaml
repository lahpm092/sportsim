  # ===========================================================================
  # METHOD: REST_PAUSE
  # ===========================================================================

  rest_pause:
    id: rest_pause
    name: "Rest-pause"
    structure_modifier: intra_set_rest

    intent_resolution:
      candidates:
        - intent: intensification
          condition: "load_pct_1rm >= 75 AND activation_rir <= 1"
        - intent: density
          condition: "rest_intra_set_sec <= 12 AND load_pct_1rm < 75"
        - intent: testing
          condition: "mini_tandas_count >= 4"
      default: intensification

    time_topology:
      rest_intra_set_sec:
        range_canonical: { min: 10, max: 20 }
        range_extended: { min: 8, max: 25 }
        typical: 15
      rest_inter_set_sec:
        range_canonical: { min: 120, max: 240 }
        range_extended: { min: 90, max: 300 }
        typical: 180

    stopping_rule:
      primary_criterion: failure_reached
      threshold: "rir_estimated <= 0 AND reps_in_mini_tanda <= 1"
      failure_action: end_block

    validation_route:
      inputs_required_by_state:
        prescribed: [load_pct_1rm, activation_reps_target, variant]
        executed: [load_pct_1rm, activation_reps_target, variant, reps_actual_per_mini_tanda]
        partial: [load_pct_1rm, activation_reps_target, variant]
      inputs_optional: [mini_tandas_count_target, rest_intra_set_sec, activation_rir]
      inputs_ignored: [reps_target_in_mini_tandas]
      validator_fn: validate_rest_pause
      flags_specific:
        - rp_activation_load_too_low
        - rp_activation_load_too_high
        - rp_rest_too_short
        - rp_rest_too_long
        - rp_mini_tandas_unrealistic
        - rp_variant_params_inconsistent
        - rp_activation_rir_above_threshold
        - rest_pause_exercise_count_invalid

    exercise_count_rule:
      min: 1
      max: 1

    zone_classification_rule:
      strategy: first_continuous_effort
      notes: "primary_unit = activation (activation_reps_target reps)"

    drift_rules:
      - target_method: cluster
        conditions: ["rest_intra_set_sec > 25", "activation_rir >= 2"]
        severity: informational
        suggestion: "Descanso largo + no llegar al fallo sugiere cluster."

    variants:
      myo_reps:
