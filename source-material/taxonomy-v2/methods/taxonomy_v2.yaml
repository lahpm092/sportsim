# =============================================================================
# Training Taxonomy v2.0
# Full method taxonomy for anaerobic / resistance training
# =============================================================================
# Scope: 9 methods with ~37 variants + 5 mechanical_drop mechanisms
#        + 4 parallel categories from v1.1
# Changes from v1.1: methods are first-class citizens with formal schemas
#        + work_unit as canonical base + state lifecycle + drift detection
#        + 6 zone classification strategies + flag severity formalized
# =============================================================================

version: "2.0"
status: "foundation_frozen_for_methods"
last_updated: "2026-06-09"
parent_version: "1.1"

# =============================================================================
# SECTION 1 — ZONES (carried from v1.1, unchanged)
# =============================================================================

zones:
  Z1:
    name: "Neural / Max Strength"
    reps: { min: 1, max: 3 }
    load_pct_1rm: { min: 90, max: 100 }
    rir: { min: 2, max: 3 }
    rest_min: { min: 3, max: 5 }
    dominant_adaptation: ["motor_unit_recruitment", "rate_coding", "intermuscular_coordination"]

  Z2:
    name: "Strength"
    reps: { min: 3, max: 6 }
    load_pct_1rm: { min: 82, max: 90 }
    rir: { min: 1, max: 3 }
    rest_min: { min: 3, max: 5 }
    dominant_adaptation: ["max_strength", "rate_of_force_development"]

  Z3:
    name: "Strength-Hypertrophy"
    reps: { min: 5, max: 8 }
    load_pct_1rm: { min: 75, max: 85 }
    rir: { min: 1, max: 2 }
    rest_min: { min: 2, max: 3 }
    dominant_adaptation: ["functional_strength", "cross_sectional_area"]

  Z4:
    name: "Hypertrophy"
    reps: { min: 8, max: 12 }
    load_pct_1rm: { min: 67, max: 78 }
    rir: { min: 0, max: 2 }
    rest_min: { min: 1.5, max: 2.5 }
    dominant_adaptation: ["mechanical_hypertrophy"]

  Z5:
    name: "Hypertrophy-Endurance"
    reps: { min: 12, max: 20 }
    load_pct_1rm: { min: 55, max: 70 }
    rir: { min: 0, max: 2 }
    rest_min: { min: 1, max: 2 }
    dominant_adaptation: ["metabolic_hypertrophy"]

  Z6:
    name: "Muscular Endurance"
    reps: { min: 20, max: 50 }
    load_pct_1rm: { min: 30, max: 60 }
    rir: { min: 0, max: 1 }
    rest_min: { min: 0.5, max: 1.5 }
    dominant_adaptation: ["local_endurance", "capillarization", "buffer_capacity"]

# =============================================================================
# SECTION 2 — FORCE-VELOCITY MODIFIERS (carried from v1.1, unchanged)
# =============================================================================

fv_modifiers:
  FV1:
    name: "Absolute Strength"
    tempo_concentric: "max_intent"
    bar_velocity_mps: { min: 0.15, max: 0.35 }
    typical_zones: [Z1, Z2]

  FV2:
    name: "Strength-Speed"
    tempo_concentric: "explosive"
    bar_velocity_mps: { min: 0.50, max: 0.75 }
    typical_zones: [Z2, Z3]
    typical_parallel: [olympic, ballistic]

  FV3:
    name: "Speed-Strength"
    tempo_concentric: "ballistic"
    bar_velocity_mps: { min: 0.75, max: 1.00 }
    typical_parallel: [olympic, ballistic, dynamic_effort]

  FV4:
    name: "Speed"
    tempo_concentric: "max_velocity"
    bar_velocity_mps: { min: 1.00, max: 99 }
    typical_parallel: [plyometric, ballistic]

  FV5:
    name: "Controlled / Hypertrophy intent"
    tempo_concentric: "controlled"
    tempo_pattern_range: ["2-0-1", "3-1-1"]
    bar_velocity_mps: null
    typical_zones: [Z3, Z4, Z5]

  FV6:
    name: "Endurance intent"
    tempo_concentric: "fluid"
    tempo_pattern: "1-0-1"
    bar_velocity_mps: null
    typical_zones: [Z5, Z6]

# =============================================================================
# SECTION 3 — PARALLEL CATEGORIES (carried from v1.1, unchanged)
# =============================================================================

parallel_categories:

  ballistic:
    description: "Loaded throws, jumps with weight, projectile-style efforts"
    load_metric: "absolute_or_pct_1rm"
    load_range_pct_1rm: { min: 0, max: 60 }
    reps_per_set: { min: 1, max: 8 }
    sets_typical: { min: 3, max: 6 }
    rest_between_sets_sec: { min: 90, max: 180 }
    intent_default: "max"
    energy_system_default: "alactic"
    fv_modifier_by_load:
      "<30%": FV4
      "30-60%": FV3
      ">60%": FV2

  plyometric:
    description: "Reactive jumps, hops, bounds; SSC-driven"
    classification_axis: "contact_time"
    contact_time_ms:
      short: { max: 250, label: "reactive_strength" }
      long:  { min: 250, label: "power_expression" }
    reps_per_set: { min: 3, max: 10 }
    sets_typical: { min: 3, max: 6 }
    rest_between_sets_sec: { min: 60, max: 180 }
    intent_default: "max"
    energy_system_default: "alactic"
    fv_modifier_by_contact_time:
      "<250ms": FV4
      ">250ms": FV3
    quality_rule: "stop_if_jump_height_drops_more_than_10pct"

  olympic:
    description: "Snatch, clean, jerk, and derivatives (pulls, hangs, push press)"
    load_metric: "percent_1rm"
    load_range_pct_1rm: { min: 60, max: 95 }
    reps_per_set: { min: 1, max: 5 }
    reps_cap: 5
    sets_typical: { min: 3, max: 8 }
    rest_between_sets_sec: { min: 120, max: 300 }
    intent_default: "max"
    energy_system_default: "alactic"
    fv_modifier_by_load:
      "<70%": FV4
      "70-85%": FV3
      ">85%": FV2
    quality_rule: "quality_over_fatigue"

  dynamic_effort:
    description: "Submaximal loads moved with maximal intent (Westside-style DE)"
    load_metric: "percent_1rm"
    load_range_pct_1rm: { min: 40, max: 70 }
    reps_per_set: { min: 1, max: 3 }
    sets_typical: { min: 6, max: 12 }
    rest_between_sets_sec: { min: 45, max: 90 }
    bar_velocity_target_mps: { min: 0.75, max: 1.00 }
    intent_default: "max"
    energy_system_default: "alactic"
    fv_modifier_default: FV3
    quality_rule: "stop_set_if_velocity_drops_more_than_10pct"

# =============================================================================
# SECTION 4 — ZONE CLASSIFICATION PRINCIPLE AND STRATEGIES
# =============================================================================
# Principle refined in A.9.1:
# "Zone = first continuous effort of the set, where continuous means
#  work performed without significant rest (>10s)."
# When the block does not have a single definable continuous effort, or
# when the block operates on a non-neuromechanical physiological axis,
# alternative strategies apply.

zone_classification:

  principle: |
    Zone is inferred from the first continuous effort of the work,
    where 'continuous effort' means work performed without significant
    rest (>10s). Exceptions are declared per method.

  significant_rest_threshold_sec: 10

  strategies:

    first_continuous_effort:
      description: "Zone from the first uninterrupted unit of work"
      applies_to_methods: [straight, cluster, rest_pause, contrast_heavy_component, amrap]
      computation: "classify_zone({reps: primary_unit.reps, load: primary_unit.load, rir: primary_unit.rir})"
      implementation_fn: "classify_first_continuous_effort"

    first_segment:
      description: "Zone from the first segment of a drop set (before any drop)"
      applies_to_methods: [drop]
      computation: "classify_zone({reps: reps_first_segment, load: first_load_pct, rir: 0})"
      implementation_fn: "classify_first_segment"
      additional_informative: ["zone_if_treated_as_continuous"]

    top_set:
      description: "Zone from the peak-intensity set in the block"
      applies_to_methods: [pyramid_ascending, pyramid_descending, pyramid_wave, emom_ascending_load]
      computation: "classify_zone(top_set_of_block)"
      implementation_fn: "classify_top_set"

    dominant_component_distribution:
      description: "Most-frequent zone across components + breakdown reporting"
      applies_to_methods: [pyramid_double, emom_alternating, complex_independent_load_chain]
      computation: "zone_primary = mode(zones_per_component); report breakdown + spread"
      implementation_fn: "classify_dominant_component_distribution"

    chain_complete:
      description: "Whole chain treated as one continuous effort"
      applies_to_methods: [complex_single_load_chain]
      computation: "classify_zone({reps: total_reps_per_round, load: shared_load, rir: estimated_chain_rir})"
      implementation_fn: "classify_chain_complete"

    energy_system_dominant:
      description: "No Z classification; reports energy system dominance and metabolic metrics"
      applies_to_methods: [complex_circuit]
      computation: "zone_inferred=null; compute dominant_energy_system, total_duration, work_to_rest_ratio"
      implementation_fn: "classify_energy_system_dominant"

  method_to_strategy_mapping:
    straight: first_continuous_effort
    cluster: first_continuous_effort
    drop: first_segment
    rest_pause: first_continuous_effort
    amrap: first_continuous_effort
    pyramid_ascending: top_set
    pyramid_descending: top_set
    pyramid_double: dominant_component_distribution
    pyramid_wave: top_set
    pyramid_multi_exercise_pyramid: top_set
    emom_every_minute: first_continuous_effort
    emom_every_n_seconds: first_continuous_effort
    emom_alternating: dominant_component_distribution
    emom_ascending_load: top_set
    contrast_heavy_light: first_continuous_effort
    contrast_french_contrast: first_continuous_effort
    contrast_wave_contrast: first_continuous_effort
    contrast_complex_pairs: first_continuous_effort
    complex_olympic_complex: chain_complete
    complex_strongman_complex: chain_complete
    complex_kb_flow: chain_complete
    complex_mace_flow: chain_complete
    complex_giant_set: dominant_component_distribution
    complex_accessory_complex: dominant_component_distribution
    complex_peripheral_heart_action: dominant_component_distribution
    complex_superset: dominant_component_distribution
    complex_antagonist_giant_set: dominant_component_distribution
    complex_fixed_round_circuit: energy_system_dominant
    complex_time_capped_circuit: energy_system_dominant
    complex_chipper: energy_system_dominant
    complex_tabata: energy_system_dominant

# =============================================================================
# SECTION 5 — WORK_UNIT (canonical atomic unit)
# =============================================================================
# Unifies the legacy 'set' (v1.1) with the polymorphic component objects
# introduced in EMOM, contrast, and complex (A.6-A.8).
# Each method declares an extension via work_unit_extension.

work_unit:

  description: |
    Canonical atomic unit of work within a block. Replaces 'set' (v1.1)
    and the polymorphic component objects (work_per_interval,
    contrast_component, complex_component, etc.) introduced in A.6-A.8.

  base_fields:
    # Identification
    exercise_ref:
      type: "string | null"
      description: "Reference to catalog (Layer B). Null until catalog exists."
    exercise_name:
      type: string
      description: "Free-text fallback when no catalog ref available."

    # Work metrics (at least one required)
    reps:
      type: "integer | null"
    duration_sec:
      type: "integer | null"
    distance_m:
      type: "integer | null"

    # Load
    load_metric:
      type: enum
      values: [percent_1rm, absolute_load, bodyweight, time, distance, none]
    load_pct_1rm:
      type: "number | null"
    load_value:
      type: "number | null"
    load_unit:
      type: "string | null"
      description: "kg, lb, sec, m"

    # Laterality
    side:
      type: "enum | null"
      values: [bilateral, unilateral_alt, unilateral_one_side]

    # Intent and velocity
    intent:
      type: "enum | null"
      values: [max, submax, controlled, technical, max_velocity, max_height,
               max_distance, max_reactive_speed]
    bar_velocity_target_mps:
      type: "number | null"
    tempo:
      type: "string | null"
      format: "4-digit code: ecc-pause_bot-conc-pause_top (X for max intent)"

    # Execution tracking (A.9.6)
    execution_status:
      type: enum
      values: [executed, skipped, interrupted, pending]
      default: pending

    # Actual values (only populated when state=executed or partial)
    reps_actual: "integer | null"
    load_actual: "number | null"
    rir_actual: "integer | null"
    bar_velocity_actual_mps: "number | null"

    # Notes
    notes: "string | null"

  extension_mechanism:
    description: |
      Each method (or variant) declares fields specific to its semantics
      via three keys: work_unit_extension (added fields),
      work_unit_required_fields (validation), work_unit_field_renames
      (semantic aliases for display).

    keys:
      work_unit_extension:
        type: "object"
        description: "Additional fields specific to this method/variant."

      work_unit_required_fields:
        type: "array | object"
        description: |
          List of required field names, or 'one_of' objects for alternative
          requirements. Example: 'one_of: [reps, duration_sec, distance_m]'.

      work_unit_field_renames:
        type: "map<base_field_name, alias>"
        description: |
          Aliases for human readability. The data is stored under the base
          field name; the alias is used in UI and YAML display.

      work_unit_field_constraints:
        type: "object"
        description: |
          Special constraints, e.g. 'load: shared_at_block_level' indicates
          the load is not per-unit but at the block level (single_load_chain).

# =============================================================================
# SECTION 6 — EXERCISE_BLOCK (updated schema)
# =============================================================================

exercise_block:

  fields:
    id:
      type: string

    exercise_ref:
      type: "string | null"
    exercise_name_freetext:
      type: string

    # State lifecycle (A.9.6)
    state:
      type: enum
      values: [prescribed, executed, partial]
      default: prescribed
      required: true
      transitions_allowed:
        - "prescribed → executed"
        - "prescribed → partial"
        - "partial → executed"

    # Three categories (A.9.1)
    category:
      type: enum
      values: [main, parallel, conditioning]
      required: true

    zone:
      type: "enum [Z1..Z6] | null"

    parallel_type:
      type: "enum | null"
      values: [ballistic, plyometric, olympic, dynamic_effort]

    fv_modifier:
      type: "enum [FV1..FV6]"

    energy_system_tag:
      type: "enum | null"
      values: [alactic, lactic, aerobic_power, mixed]

    method:
      type: enum
      values: [straight, cluster, drop, rest_pause, contrast, complex, emom, amrap, pyramid]
      required: true

    method_params:
      type: object
      required_fields:
        - variant
        - family (only when method == complex)
        - intent_declared

    work_units:
      type: "array<work_unit>"
      description: "Replaces 'sets' from v1.1. Each element is a work_unit."

    validation:
      type: validation_result

    notes:
      type: "string | null"

  invariants:
    - if category == main:
        zone is required (Z1..Z6)
        parallel_type must be null
    - if category == parallel:
        parallel_type is required
        zone must be null
    - if category == conditioning:
        zone must be null
        parallel_type must be null
        method must be in [complex] AND method_params.family must be circuit
        energy_system_tag is required

  legacy_aliases:
    - field_name: sets
      alias_of: work_units
      description: "Kept for human readability in straight/cluster/etc. contexts."

# =============================================================================
# SECTION 7 — VALIDATION_RESULT (updated schema)
# =============================================================================

validation_result:

  zone_classification:
    strategy_applied: "enum (one of the 6 strategies)"
    zone_inferred: "enum [Z1..Z6] | null"
    zone_declared: "enum [Z1..Z6] | null"
    zone_coherent: "boolean"

  viability:
    reps_max_teorico: "integer"
    delta: "integer"
    delta_pct: "number"
    level: "enum [ok, warning_mild, warning_strong, hard_fail]"
    flags: "[flag_object]"

  intent:
    declared: "enum"
    inferred_from_rules: "enum"
    match: "boolean"

  method_route: string

  flags:
    informational: "[flag_object]"
    structural_hard: "[flag_object]"
    viability:
      ok: "[flag_object]"
      warning_mild: "[flag_object]"
      warning_strong: "[flag_object]"
      hard_fail: "[flag_object]"

  informative_metrics:
    estimated_total_duration_sec: "integer | null"
    total_reps_estimated: "integer | null"
    total_reps_executed: "integer | null"
    completion_rate_pct: "number | null"

    method_specific: "object"
    family_specific: "object | null"

    zone_classification_auxiliary:
      zones_per_component: "[enum] | null"
      zones_breakdown: "map<zone, count> | null"
      zone_spread: "integer | null"
      zone_if_treated_as_continuous: "enum | null"
      dominant_energy_system: "enum | null"
      work_to_rest_ratio: "number | null"

  overall_coherent: "boolean"
  overall_coherent_rule: "string"

# =============================================================================
# SECTION 8 — METHODS
# =============================================================================
# Each method follows the schema defined in A.0 (refined through A.9):
# - id, name, structure_modifier
# - intent_resolution (with candidates + default)
# - time_topology (with canonical + extended ranges where applicable)
# - stopping_rule
# - validation_route (with inputs_required_by_state)
# - exercise_count_rule
# - zone_classification_rule (strategy reference)
# - drift_rules (declarative drift detection)
# - variants (with their own defaults, params_schema, work_unit_extension)
# =============================================================================

methods:

  # ===========================================================================
  # METHOD: STRAIGHT
  # ===========================================================================

  straight:
    id: straight
    name: "Straight sets"
    structure_modifier: none

    intent_resolution:
      candidates:
        - intent: quality
          condition: "load_pct_1rm >= 82 AND rir_target >= 2"
        - intent: accumulation
          condition: "load_pct_1rm < 80 AND sets >= 4"
        - intent: testing
          condition: "rir_target <= 0"
      default: accumulation

    time_topology:
      rest_inter_set_sec:
        range_canonical: { min: 90, max: 240 }
        range_extended: { min: 30, max: 360 }
        typical: 180

    stopping_rule:
      primary_criterion: reps_completed
      threshold: "reps_actual >= reps_target"
      failure_action: mark_incomplete

    validation_route:
      inputs_required_by_state:
        prescribed: [load_pct_1rm, reps_target, rir_target]
        executed: [load_pct_1rm, reps_target, reps_actual, rir_target, rir_actual]
        partial: [load_pct_1rm, reps_target]
      inputs_optional_by_state:
        executed: [bar_velocity_actual_mps]
      validator_fn: validate_straight
      flags_specific:
        - straight_exercise_count_invalid

    exercise_count_rule:
      min: 1
      max: 1

    zone_classification_rule:
      strategy: first_continuous_effort

    drift_rules: []

    variants:
      default:
        name: "Standard straight set"
        family: null

        defaults:
          load_pct_1rm: 75
          reps_target: 8
          rir_target: 2
          sets: 4
          rest_inter_set_sec: 180

        params_schema:
          load_pct_1rm:
            type: percent
            range_canonical: { min: 60, max: 90 }
            range_extended: { min: 30, max: 100 }
            default: 75
            required: true
          reps_target:
            type: integer
            range_canonical: { min: 3, max: 15 }
            range_extended: { min: 1, max: 50 }
            default: 8
            required: true
          rir_target:
            type: integer
            range_canonical: { min: 0, max: 3 }
            range_extended: { min: 0, max: 5 }
            default: 2
            required: true
          sets:
            type: integer
            range_canonical: { min: 3, max: 5 }
            range_extended: { min: 1, max: 10 }
            default: 4
            required: true

          rest_inter_set_sec:
            type: integer
            range_canonical:
              min: 60
              max: 240
            range_extended:
              min: 30
              max: 420
            default: 180
            required: true
        work_unit_extension: {}
        work_unit_required_fields: [exercise_name, reps, load_metric]
        work_unit_field_renames: {}

        progression_logic: null

  # ===========================================================================
  # METHOD: CLUSTER
  # ===========================================================================

  cluster:
    id: cluster
    name: "Cluster sets"
    structure_modifier: intra_set_rest

    intent_resolution:
      candidates:
        - intent: quality
          condition: "load_pct_1rm >= 80 AND rest_intra_set_sec >= 15"
        - intent: density
          condition: "rest_intra_set_sec < 12 AND load_pct_1rm < 75"
        - intent: accumulation
          condition: "load_pct_1rm >= 80 AND clusters_per_set >= 4"
      default: quality

    time_topology:
      rest_intra_set_sec:
        range_canonical: { min: 15, max: 25 }
        range_extended: { min: 10, max: 30 }
        typical: 20
      rest_inter_set_sec:
        range_canonical: { min: 180, max: 300 }
        range_extended: { min: 120, max: 360 }
        typical: 240

    stopping_rule:
      primary_criterion: rep_quality
      threshold: "velocity_drop_pct > 10 OR rir_estimated <= 0"
      failure_action: end_block

    validation_route:
      inputs_required_by_state:
        prescribed: [load_pct_1rm, reps_per_cluster, clusters_per_set, rest_intra_set_sec, variant]
        executed: [load_pct_1rm, reps_per_cluster, clusters_per_set, rest_intra_set_sec, variant, reps_actual_per_cluster_per_set]
        partial: [load_pct_1rm, reps_per_cluster, clusters_per_set, rest_intra_set_sec, variant]
      inputs_optional: [bar_velocity_target_mps, total_reps]
      validator_fn: validate_cluster
      flags_specific:
        - cluster_intra_rest_too_short
        - cluster_intra_rest_too_long
        - cluster_load_too_low_for_quality
        - cluster_total_reps_inconsistent
        - cluster_size_exceeds_zone_reps
        - cluster_variant_params_inconsistent
        - cluster_exercise_count_invalid

    exercise_count_rule:
      min: 1
      max: 1

    zone_classification_rule:
      strategy: first_continuous_effort
      notes: "primary_unit = first cluster (reps_per_cluster reps)"

    drift_rules:
      - target_method: rest_pause
        conditions: ["rest_intra_set_sec > 30", "load_pct_1rm < 70", "reps_per_cluster >= 4"]
        severity: informational
        suggestion: "Las características sugieren rest_pause."

    variants:
      singles:
        name: "Singles"
        family: null
        description: "Single reps separated by short rests. Max velocity per rep."
        defaults:
          load_pct_1rm: 88
          sets: 5
          reps_per_cluster: 1
          clusters_per_set: 5
          rest_intra_set_sec: 18
          rest_inter_set_sec: 240
        params_schema:
          reps_per_cluster:
            type: integer
            range_canonical: { min: 1, max: 1 }
            range_extended: { min: 1, max: 1 }
            default: 1
            required: true
          clusters_per_set:
            type: integer
            range_canonical: { min: 3, max: 8 }
            range_extended: { min: 2, max: 10 }
            default: 5
            required: true
          rest_intra_set_sec:
            type: integer
            range_canonical: { min: 15, max: 25 }
            range_extended: { min: 12, max: 30 }
            default: 18
            required: true
          load_pct_1rm:
            type: percent
            range_canonical:
              min: 80
              max: 95
            range_extended:
              min: 70
              max: 100
            default: 88
            required: true
          rest_inter_set_sec:
            type: integer
            range_canonical:
              min: 180
              max: 300
            range_extended:
              min: 120
              max: 420
            default: 240
            required: true
          sets:
            type: integer
            range_canonical:
              min: 3
              max: 6
            range_extended:
              min: 2
              max: 8
            default: 5
            required: true
        stopping_rule_override:
          threshold: "velocity_drop_pct > 5 OR rir_estimated <= 1"
        work_unit_extension: {}
        work_unit_field_renames:
          reps: reps_per_cluster
        progression_logic: null

      doubles_triples:
        name: "Doubles / triples"
        family: null
        description: "2-3 rep mini-groups. Volume + velocity preservation."
        defaults:
          load_pct_1rm: 85
          sets: 4
          reps_per_cluster: 2
          clusters_per_set: 3
          rest_intra_set_sec: 22
