        family: null
        defaults:
          load_pct_1rm: 70
          sets: 2
          activation_reps_target: 15
          activation_rir: 1
          mini_tandas_count_target: 4
          mini_tanda_reps_target: 4
          rest_intra_set_sec: 12
          rest_inter_set_sec: 180
        params_schema:
