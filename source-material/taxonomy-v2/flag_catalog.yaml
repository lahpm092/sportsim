    suggestion_template: "Verify if the declared zone is intentional, or adjust parameters."
    related_methods: [straight, cluster, drop, rest_pause, amrap, pyramid, emom, contrast, complex]

  # ---------------------------------------------------------------------------
  # SECTION B — Viability flags (graduated by level)
  # ---------------------------------------------------------------------------

  overprescribed_or_load_too_high:
    id: overprescribed_or_load_too_high
    applies_at: block
    severity: viability
    level_computation: "based on delta_pct"
    message_template: "Prescribed {reps_target} reps at {load_pct}% 1RM; theoretical max is {reps_max_teorico} (delta {delta_pct:+}%)."
    detail_schema: viability_pattern
    level_thresholds:
      warning_mild: "0 < delta_pct <= 15"
      warning_strong: "15 < delta_pct <= 30"
      hard_fail: "delta_pct > 30"
    suggestion_template: "Reduce load to ~{suggested_load}% or reduce reps to ~{suggested_reps}."
    related_methods: [straight, cluster, drop, rest_pause, amrap, pyramid, emom]

  underloaded_for_rep_range:
    id: underloaded_for_rep_range
    applies_at: block
    severity: viability
