# =============================================================================
# Flag Catalog — Training Taxonomy v2.0
# =============================================================================
# Companion to: taxonomy_v2.yaml, taxonomy_v2_methods_part2.yaml,
#               validator_functions_spec.md
#
# All flags the validator can produce, with:
#   - id (unique snake_case)
#   - severity: informational | structural_hard | viability
#   - level: ok | warning_mild | warning_strong | hard_fail (viability only)
#   - message_template: human-readable string with {placeholders}
#   - detail_schema: which of the 4 base patterns it uses, or 'custom'
#   - suggestion_template: optional auto-generated suggestion
#   - related_methods: which methods can raise this flag
#
# Detail schemas (from A.9.3.4):
#   component_pattern   — flags about specific components
#   viability_pattern   — flags about physiological viability
#   drift_pattern       — flags suggesting alternative method
#   consistency_pattern — flags about internal consistency
#   custom              — flag-specific schema
# =============================================================================

version: "2.0"
parent: "taxonomy_v2.yaml"
total_flags_catalogued: 177

# =============================================================================
# DETAIL SCHEMAS (base patterns from A.9.3.4)
# =============================================================================

detail_schemas:

  component_pattern:
    description: "Flags about specific components in a multi-component block"
    fields:
      component_index: integer
      component_name: string
      expected_value: any
      actual_value: any
      pattern_declared: "string | null"

  viability_pattern:
    description: "Flags about physiological viability"
    fields:
      metric_name: string
      threshold_value: number
      actual_value: number
      delta: number
      delta_pct: number
      level_thresholds:
        warning_mild: "range"
        warning_strong: "range"
        hard_fail: "range"

  drift_pattern:
    description: "Flags suggesting an alternative method captures intent better"
    fields:
      current_method: string
      current_variant: string
      suggested_method: string
      suggested_variant: "string | null"
      matching_indicators: "[string]"

  consistency_pattern:
    description: "Flags about internal data consistency"
    fields:
      computed_value: any
      declared_value: any
      delta: any
      field_name: string

# =============================================================================
# FLAG CATALOG
# =============================================================================

flags:

  # ---------------------------------------------------------------------------
  # SECTION A — Zone classification flags (foundational)
  # ---------------------------------------------------------------------------

  no_coherent_zone:
    id: no_coherent_zone
    applies_at: block
    severity: structural_hard
    level: null
    message_template: "No coherent zone classification (max score {max_score} < threshold 0.70)."
    detail_schema: custom
    detail_fields:
      max_score: number
      scores_per_zone: "map<zone, float>"
      threshold: number
    suggestion_template: "Review reps, load, and RIR. Values may be outside any zone's range."
    related_methods: [straight, cluster, drop, rest_pause, amrap, pyramid, emom, contrast]

  zone_declared_inconsistent_with_inferred:
    id: zone_declared_inconsistent_with_inferred
    applies_at: block
    severity: informational
    level: null
