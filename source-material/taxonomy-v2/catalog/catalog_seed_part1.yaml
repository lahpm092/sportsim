  overhead_press:
    name: "Overhead press"
    name_es: "Press militar"
    aliases: [OHP, military_press, press_militar]
    movement_pattern: push_v
    body_segment: upper
    primary_muscles: [anterior_deltoid, lateral_deltoid, triceps]
    secondary_muscles: [upper_back, abdominals]
    kinetic_chain: open
    laterality_default: bilateral
    implement: barbell
