# =============================================================================
# Exercise Catalog Seed — Part 1: Loaded Exercises
# Training Taxonomy v2 — Layer B
# =============================================================================
# Barbell core, dumbbell counterparts, olympic derivatives, machines/cables,
# free-weight isolation. ~60 exercises.
# Part 2 (bodyweight lines, KB, HYROX) in catalog_seed_part2.yaml.
# =============================================================================

catalog_version: "1.0-seed"
part: 1
schema_ref: "taxonomy_v2 Layer B (B.0-B.5)"

# =============================================================================
# STRENGTH HUBS + INTER-HUB RATIOS (B.4)
# =============================================================================

strength_hubs:
  lower_squat: back_squat
  lower_hinge: deadlift_conventional
  upper_push_h: bench_press_barbell
  upper_push_v: overhead_press
  upper_pull_v: pull_up
  upper_pull_h: barbell_row
  olympic: power_clean
  global_hub: back_squat

inter_hub_ratios:
  - { pair: [deadlift_conventional, back_squat], ratio: 1.20, confidence: high }
  - { pair: [bench_press_barbell, back_squat], ratio: 0.75, confidence: medium }
  - { pair: [overhead_press, bench_press_barbell], ratio: 0.62, confidence: medium }
  - { pair: [barbell_row, bench_press_barbell], ratio: 0.70, confidence: medium }
  - { pair: [power_clean, back_squat], ratio: 0.68, confidence: medium }
  - { pair: [pull_up, bench_press_barbell], ratio: 0.85, confidence: low }

# =============================================================================
# EXERCISES
# =============================================================================

exercises:

  # ---------------------------------------------------------------------------
  # BARBELL CORE (hubs y derivados)
  # ---------------------------------------------------------------------------

  back_squat:
    name: "Back squat"
    name_es: "Sentadilla trasera"
    movement_pattern: squat
    body_segment: lower
    primary_muscles: [quadriceps, glutes]
    secondary_muscles: [hamstrings, spinal_erectors, adductors]
    kinetic_chain: closed
    laterality_default: bilateral
    implement: barbell
    load_metric_primary: percent_1rm
    load_metrics_supported: [percent_1rm, absolute_load]
    mechanical_demand_index: 4.0
    technical_complexity_index: 4.0
    typical_time_per_rep_sec: 3.5
    is_anchor: true
    variations:
      - { id: pause, name: "Pause squat", modifies: [tempo], mechanical_demand_delta: 0.5, technical_complexity_delta: 0.3 }
      - { id: tempo_311, name: "Tempo 3-1-1", modifies: [tempo], mechanical_demand_delta: 0.4, technical_complexity_delta: 0.2 }
      - { id: box, name: "Box squat", modifies: [rom], mechanical_demand_delta: -0.5, technical_complexity_delta: 0.0 }
      - { id: pin, name: "Pin squat", modifies: [rom], mechanical_demand_delta: 0.6, technical_complexity_delta: 0.3 }
      - { id: ssb_bar, name: "Safety bar", modifies: [bar_type], mechanical_demand_delta: 0.3, technical_complexity_delta: -0.3 }
    tags: [powerlifting, hub]

  front_squat:
    name: "Front squat"
    name_es: "Sentadilla frontal"
    movement_pattern: squat
    body_segment: lower
    primary_muscles: [quadriceps, glutes]
    secondary_muscles: [spinal_erectors, abdominals, upper_back]
    kinetic_chain: closed
    laterality_default: bilateral
    implement: barbell
    load_metric_primary: percent_1rm
    load_metrics_supported: [percent_1rm, absolute_load]
    mechanical_demand_index: 4.3
    technical_complexity_index: 5.5
    typical_time_per_rep_sec: 3.5
    strength_ratio_vs:
      - { reference: back_squat, expected_ratio: 0.85, confidence: high }
    variations:
      - { id: pause, name: "Pause", modifies: [tempo], mechanical_demand_delta: 0.5, technical_complexity_delta: 0.3 }
      - { id: cross_grip, name: "Cross grip", modifies: [grip], mechanical_demand_delta: 0.0, technical_complexity_delta: -0.8 }
    tags: [weightlifting]

  deadlift_conventional:
    name: "Conventional deadlift"
    name_es: "Peso muerto convencional"
    movement_pattern: hinge
    body_segment: lower
    primary_muscles: [hamstrings, glutes, spinal_erectors]
    secondary_muscles: [quadriceps, lats, forearms, upper_back]
    kinetic_chain: closed
    laterality_default: bilateral
    implement: barbell
    load_metric_primary: percent_1rm
    load_metrics_supported: [percent_1rm, absolute_load]
    mechanical_demand_index: 4.5
    technical_complexity_index: 5.0
    typical_time_per_rep_sec: 3.0
    is_anchor: true
    variations:
      - { id: deficit, name: "Deficit", modifies: [rom], mechanical_demand_delta: 0.6, technical_complexity_delta: 0.4 }
      - { id: block_pull, name: "Block pull", modifies: [rom], mechanical_demand_delta: -0.8, technical_complexity_delta: -0.5 }
      - { id: sumo, name: "Sumo stance", modifies: [stance], mechanical_demand_delta: -0.2, technical_complexity_delta: 0.3 }
      - { id: trap_bar, name: "Trap bar", modifies: [bar_type], mechanical_demand_delta: -0.5, technical_complexity_delta: -1.0 }
      - { id: pause_below_knee, name: "Pause below knee", modifies: [tempo], mechanical_demand_delta: 0.5, technical_complexity_delta: 0.3 }
    tags: [powerlifting, hub]

  rdl_barbell:
    name: "Romanian deadlift"
    name_es: "Peso muerto rumano"
    movement_pattern: hinge
    body_segment: lower
    primary_muscles: [hamstrings, glutes]
    secondary_muscles: [spinal_erectors, forearms]
    kinetic_chain: closed
    laterality_default: bilateral
