      - { id: close_grip, name: "Close grip", modifies: [grip], mechanical_demand_delta: 0.3, technical_complexity_delta: 0.1 }
      - { id: pause, name: "Competition pause", modifies: [tempo], mechanical_demand_delta: 0.3, technical_complexity_delta: 0.2 }
      - { id: pin_press, name: "Pin press", modifies: [rom], mechanical_demand_delta: 0.2, technical_complexity_delta: 0.0 }
