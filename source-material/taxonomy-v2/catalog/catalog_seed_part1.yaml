    laterality_default: bilateral
    implement: barbell
    load_metric_primary: percent_1rm
    load_metrics_supported: [percent_1rm, absolute_load]
    mechanical_demand_index: 2.5
    technical_complexity_index: 2.5
    typical_time_per_rep_sec: 2.5
