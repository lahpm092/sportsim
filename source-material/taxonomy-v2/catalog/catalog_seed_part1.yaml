    variations:
      - { id: pause_top, name: "Pause at top", modifies: [tempo], mechanical_demand_delta: 0.4, technical_complexity_delta: 0.0 }
      - { id: single_leg, name: "Single leg", modifies: [stance], mechanical_demand_delta: 1.5, technical_complexity_delta: 0.8 }
    tags: [hypertrophy, glutes]

  bench_press_barbell:
    name: "Bench press (barbell)"
    name_es: "Press banca con barra"
    movement_pattern: push_h
    body_segment: upper
    primary_muscles: [pectorals, triceps]
