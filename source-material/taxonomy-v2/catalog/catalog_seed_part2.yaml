    tags: [calisthenics, skill_track, planche_line]

  full_planche:
    name: "Full planche"
    name_es: "Plancha completa"
    movement_pattern: push_h
    body_segment: full
    primary_muscles: [anterior_deltoid, pectorals]
    secondary_muscles: [forearms, abdominals, upper_back, glutes, spinal_erectors]
    kinetic_chain: closed
    laterality_default: bilateral
    implement: bodyweight
    load_metric_primary: time
    load_metrics_supported: [time]
    mechanical_demand_index: 9.8
    technical_complexity_index: 9.0
    typical_time_per_rep_sec: 4.0
    tags: [calisthenics, skill_track, planche_line]

  pseudo_planche_push_up:
    name: "Pseudo-planche push-up"
    name_es: "Flexión pseudo-plancha"
    movement_pattern: push_h
    body_segment: upper
    primary_muscles: [anterior_deltoid, pectorals, triceps]
    secondary_muscles: [forearms, abdominals, biceps]
    kinetic_chain: closed
    laterality_default: bilateral
    implement: bodyweight
    load_metric_primary: bodyweight_ratio
    load_metrics_supported: [bodyweight_ratio]
    mechanical_demand_index: 8.5
    technical_complexity_index: 5.5
    typical_time_per_rep_sec: 2.5
    is_anchor: true
    progressions:
      - { target: { exercise: planche_push_up, variation: straddle }, mechanism: leverage, magnitude: large }
    tags: [calisthenics, skill_track, planche_line]

  planche_push_up:
    name: "Planche push-up (full)"
    name_es: "Flexión en plancha completa"
    movement_pattern: push_h
    body_segment: full
    primary_muscles: [anterior_deltoid, pectorals, triceps]
    secondary_muscles: [forearms, abdominals, upper_back, glutes]
    kinetic_chain: closed
    laterality_default: bilateral
    implement: bodyweight
    load_metric_primary: bodyweight_ratio
    load_metrics_supported: [bodyweight_ratio]
    mechanical_demand_index: 10.0
    technical_complexity_index: 9.5
    typical_time_per_rep_sec: 3.0
    is_anchor: true
    variations:
      - { id: straddle, name: "Straddle planche push-up", modifies: [load_position], mechanical_demand_delta: -0.5, technical_complexity_delta: -0.5 }
