# =============================================================================
# Exercise Catalog Seed — Part 2: Bodyweight, Skill Tracks, KB, HYROX
# Training Taxonomy v2 — Layer B
# =============================================================================

catalog_version: "1.0-seed"
part: 2
schema_ref: "taxonomy_v2 Layer B (B.0-B.5)"

# Cross-file edges whose SOURCE lives in part 1, plus variation-sourced edges
edges_addenda:
  - { source: { exercise: lat_pulldown }, target: { exercise: pull_up }, mechanism: assistance, magnitude: medium, notes: "external load → bodyweight" }
  - { source: { exercise: assisted_pullup_machine }, target: { exercise: pull_up }, mechanism: assistance, magnitude: medium }
  - { source: { exercise: push_up, variation: incline }, target: { exercise: pike_push_up }, mechanism: angle, magnitude: small, notes: "shoulder-dominant rebias; incline (3.0) → pike (3.5)" }

exercises:

  # ---------------------------------------------------------------------------
  # PUSH_H LINE (bodyweight)
  # ---------------------------------------------------------------------------

  push_up:
    name: "Push-up"
    name_es: "Flexión de brazos"
    movement_pattern: push_h
    body_segment: upper
    primary_muscles: [pectorals, triceps]
    secondary_muscles: [anterior_deltoid, abdominals]
    kinetic_chain: closed
    laterality_default: bilateral
    implement: bodyweight
    load_metric_primary: bodyweight_ratio
    load_metrics_supported: [bodyweight_ratio, absolute_load]
    is_loadable_external: true
    mechanical_demand_index: 4.0
    technical_complexity_index: 2.0
    typical_time_per_rep_sec: 1.5
    is_anchor: true
    variations:
      - { id: wall, name: "Wall push-up", modifies: [assistance], mechanical_demand_delta: -3.0, technical_complexity_delta: -1.0 }
      - { id: knees, name: "Knee push-up", modifies: [assistance], mechanical_demand_delta: -1.5, technical_complexity_delta: -0.5 }
      - { id: incline, name: "Incline (hands elevated)", modifies: [assistance], mechanical_demand_delta: -1.0, technical_complexity_delta: -0.3 }
      - { id: deficit, name: "Deficit", modifies: [rom], mechanical_demand_delta: 0.8, technical_complexity_delta: 0.2 }
      - { id: decline, name: "Decline (feet elevated)", modifies: [angle], mechanical_demand_delta: 0.7, technical_complexity_delta: 0.2 }
      - { id: diamond, name: "Diamond", modifies: [grip], mechanical_demand_delta: 0.6, technical_complexity_delta: 0.2 }
      - { id: archer, name: "Archer", modifies: [load_position], mechanical_demand_delta: 2.0, technical_complexity_delta: 1.0 }
    progressions:
      - { target: { exercise: one_arm_push_up }, mechanism: leverage, magnitude: large, notes: "enter via archer ladder" }
      - { target: { exercise: planche_lean }, mechanism: leverage, magnitude: medium }
      - { target: { exercise: dip }, mechanism: angle, magnitude: small }
    tags: [calisthenics, fundamental]

  one_arm_push_up:
    name: "One-arm push-up"
    name_es: "Flexión a un brazo"
    movement_pattern: push_h
    body_segment: upper
    primary_muscles: [pectorals, triceps]
    secondary_muscles: [anterior_deltoid, obliques, abdominals]
    kinetic_chain: closed
    laterality_default: unilateral_one_side
    implement: bodyweight
    load_metric_primary: bodyweight_ratio
    load_metrics_supported: [bodyweight_ratio]
    mechanical_demand_index: 7.5
    technical_complexity_index: 5.0
    typical_time_per_rep_sec: 2.0
    is_anchor: true
    variations:
      - { id: incline, name: "Incline OAP", modifies: [assistance], mechanical_demand_delta: -1.0, technical_complexity_delta: -0.3 }
    tags: [calisthenics, advanced]

  # ---------------------------------------------------------------------------
  # PLANCHE LINE (skill track stress test — B.3 marca)
  # ---------------------------------------------------------------------------

  planche_lean:
    name: "Planche lean"
    name_es: "Inclinación de plancha"
    movement_pattern: push_h
    body_segment: upper
    primary_muscles: [anterior_deltoid, pectorals]
    secondary_muscles: [forearms, abdominals, biceps]
    kinetic_chain: closed
    laterality_default: bilateral
    implement: bodyweight
    load_metric_primary: time
    load_metrics_supported: [time]
    mechanical_demand_index: 5.5
    technical_complexity_index: 4.0
    typical_time_per_rep_sec: 15.0
    progressions:
      - { target: { exercise: tuck_planche }, mechanism: leverage, magnitude: large }
    tags: [calisthenics, skill_track, planche_line]

  tuck_planche:
