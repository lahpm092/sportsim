    is_loadable_external: true
    mechanical_demand_index: 5.0
    technical_complexity_index: 3.0
    typical_time_per_rep_sec: 2.0
    is_anchor: true
    variations:
      - { id: band_assisted, name: "Band assisted", modifies: [assistance], mechanical_demand_delta: -1.5, technical_complexity_delta: -0.3 }
      - { id: negative_only, name: "Negative only", modifies: [assistance], mechanical_demand_delta: -1.0, technical_complexity_delta: -0.3 }
