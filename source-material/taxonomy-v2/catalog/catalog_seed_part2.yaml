    primary_muscles: [anterior_deltoid, pectorals]
    secondary_muscles: [forearms, abdominals, biceps, upper_back]
    kinetic_chain: closed
    laterality_default: bilateral
    implement: bodyweight
    load_metric_primary: time
    load_metrics_supported: [time]
    mechanical_demand_index: 7.0
    technical_complexity_index: 6.0
    typical_time_per_rep_sec: 10.0
    variations:
      - { id: advanced, name: "Advanced tuck (flat back)", modifies: [load_position], mechanical_demand_delta: 1.0, technical_complexity_delta: 0.5 }
    progressions:
