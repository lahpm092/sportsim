# ===================================================================
# athlete_profile — schema (V3.0 §3, materializado en V3.2)
# Perfil del atleta que parametriza al generador: fuerza, condición,
# debilidades, DISPONIBILIDAD (equipo) y lesiones. La selección de
# ejercicios (V3.2) consume availability.equipment + injuries +
# weak_stations; la carga absoluta consume strength.*_e1rm.
#
# v3.0 NO personaliza con datos reales de Martin (eso es producto):
# se construye contra el perfil de MUESTRA de abajo.
# ===================================================================
schema_version: 1
fields:
  event:
    date:        { type: iso_date, note: "la única fecha inmóvil (decisión D #13)" }
    discipline:  { type: enum, values: [hyrox, powerlifting, general], default: hyrox }
  strength:                      # e1RM de hubs; el grafo de fuerza (P7) deriva el resto
    "<hub>_e1rm":  { type: kg, note: "back_squat_e1rm es el global_hub / ancla" }
  conditioning:                  # HYROX-específico, opcional en v3.0
    "<station>_sec": { type: int }
  weak_stations:   { type: list, item: pattern_or_segment,
                     note: "V3.2: sesga la urna de selección (duplica candidatos que matchean)" }
  availability:
    days_per_week:   { type: int }
    session_minutes: { type: int }
    equipment:       { type: list, item: implement,
                       note: "V3.2: LISTA BLANCA. Si está presente, todo implemento fuera queda bloqueado." }
  injuries:          { type: list, item: pattern_or_segment,
                       note: "V3.2: patrones/segmentos a EVITAR; ningún ejercicio de esos se selecciona." }
  landmarks:                     # MEV/MAV/MRV por grupo — MARCA-FIS, default del spec C.3
    "<muscle_group>": { mev: int, mav: int, mrv: int }
  calibration:
    signal_confidence: { type: enum, values: [high, medium, low], default: medium }
    deload_style:      { type: enum, values: [default, volume, intensity, full], default: default }
    bar_increment_kg:  { type: kg, default: 2.5, note: "redondeo de carga absoluta (MARCA-FIS)" }
