# =============================================================================
# Periodization Models — Training Taxonomy v2, Layer D (D.3)
# =============================================================================
# Five first-class models. Same elevation pattern as A methods: label -> schema.
# week_structure_logic is the D-level analog of A's progression_logic hook:
# v2 validates expectations; v3 executes them to BUILD weeks.
# =============================================================================

version: "1.0"
schema_ref: periodization_schema.yaml

models:

  linear:
    name: "Linear periodization"
    description: "Intensity rises, volume falls, week over week."
    primary_axis: intensity
    intensity_volume_relation: inverse
    week_structure_logic: "monotonic intensity ramp across standard weeks; v3 hook"
    deload_positioning: { expected_every_weeks: [3, 5] }
    suitable_for: [strength, beginner_progression, peaking_simple]
    validation_rules:
      - "primary_axis ramp monotonic non-decreasing across standard weeks"
      - "inverse relation: if load_pct rises, sets must not rise"
    variants:
      classic_linear: { axis: intensity_up_volume_down }
      reverse_linear: { axis: volume_up_intensity_down,
                        suitable_for: [hypertrophy_peak, endurance] }

  undulating:
    name: "Undulating periodization"
    description: "Intensity and volume wave within or between weeks."
    primary_axis: mixed
    intensity_volume_relation: wave
    week_structure_logic: "DUP: strength slots differ in target_zones within
                           the microcycle; WUP: weekly emphasis alternates"
    deload_positioning: { expected_every_weeks: [4, 6],
                          threshold_override: { advanced: 5 } }
    suitable_for: [strength, hypertrophy, intermediate_advanced]
    validation_rules:
      - "DUP: >= 2 strength slots with distinct target_zones in microcycle"
    variants:
      daily_undulating: { granularity: within_microcycle }
      weekly_undulating: { granularity: between_weeks }
    marked: "emphasis/specialization (lagging muscle-group priority) to be
             built as future variant here or as transversal mesocycle
             attribute — USER DECISION D.3; pairs with C.3 asymmetric
             landmarks (target group elevated, rest at MEV maintenance)"

  block:
    name: "Block periodization (Issurin)"
    description: "Sequential concentrated loads. One mesocycle = one block;
                  the A->T->R sequence lives at macro level (D.4)."
    primary_axis: per_block
    intensity_volume_relation: independent
    week_structure_logic: "per-variant concentration; v3 hook"
    deload_positioning: { expected_every_weeks: [3, 5] }
    suitable_for: [advanced, peaking, sport_specific]
    validation_rules:
      - "accumulation: volume axis dominant, intensity capped"
      - "realization: duration_weeks <= 3"
      - "macro-level: realization block final week adjacent to event A
         (realization_not_adjacent_to_event otherwise)"
    variants:
      accumulation: { focus: "high volume, moderate intensity — capacity" }
      transmutation: { focus: "intensity up, volume cut — specific conversion" }
      realization: { focus: "minimal load, maximal expression — peak" }

  conjugate:
    name: "Conjugate (Westside-style)"
    description: "Max effort + dynamic effort concurrent, high exercise rotation."
    primary_axis: mixed
    intensity_volume_relation: parallel
    week_structure_logic: "weekly ME + DE slots; rotation via placeholders +
                           equivalence graph; v3 hook"
    deload_positioning: { expected_every_weeks: [5, 7],
                          threshold_override: { advanced: 5 },
                          rationale: "exercise rotation IS built-in local
                                      fatigue management" }
    suitable_for: [advanced_strength, powerlifting]
    validation_rules:
      - "microcycle contains Z1-Z2 slots (max effort) AND power/dynamic slots
         (FV2-FV3) every week"
      - "exercise rotation expected: fixed exercises 6+ weeks -> drift"
    note: "first intensive consumer of placeholders (D.0.9) and the
           equivalence graph as rotation engine"

  concurrent_hybrid:
    name: "Concurrent hybrid"
    description: "Multiple qualities in parallel with priority bias.
                  Interference is its constitutive problem."
    primary_axis: mixed
    intensity_volume_relation: independent
    week_structure_logic: "bias declares which axis ramps and which maintains;
                           v3 hook"
    deload_positioning: { expected_every_weeks: [3, 4],
                          rationale: "dual load accumulates fastest —
                                      tightest threshold of the five" }
    suitable_for: [hyrox, crossfit, tactical, team_sport_offseason]
    validation_rules:
      - "microcycle interference_rules MANDATORY (not optional) for this model"
      - "conditioning_budget declared mandatory"
      - "conditioning_bias: weekly strength_load_delta ~= 0 expected"
    variants:
      strength_bias: { ramps: strength, maintains: conditioning }
      conditioning_bias: { ramps: conditioning, maintains: strength,
                           strength_dose: "minimal effective (cluster/contrast,
                                           low volume high quality)" }
      balanced: { ramps: alternating_emphasis_between_microcycles }

# =============================================================================
# MODEL DRIFT RULES (D.3.3) — same pattern as A method drift
# =============================================================================

model_drift_rules:
  - id: linear_ramp_undulates
    origin: linear
    target: undulating
    condition: "primary_axis ramp non-monotonic across standard weeks"
    severity: informational
    v3_constraint: true
  - id: dup_with_identical_slots
    origin: undulating/daily_undulating
    target: linear
    condition: "strength slots share identical target_zones"
    severity: informational
    v3_constraint: true
  - id: concurrent_strength_ramping
    origin: concurrent_hybrid/conditioning_bias
    target: concurrent_hybrid/strength_bias
    condition: "strength_load_delta > +2.5%/week sustained"
    severity: informational
    v3_constraint: true
  - id: conjugate_without_rotation
    origin: conjugate
    target: linear
    condition: "same exercises >= 6 weeks (no placeholder rotation)"
    severity: informational
    v3_constraint: true

summary:
  models: 5
  variants: 10            # linear 2, undulating 2, block 3, conjugate 0, concurrent 3
  drift_rules: 4
  v3_hooks: [week_structure_logic_per_model, drift_v3_constraints]
